ACT.submitTimeReq=()=>{
  const my=me();
  const start=$('#to-start').value,endRaw=$('#to-end').value;
  const end=endRaw<start?start:endRaw;
  const days=weekdaysBetween(start,end);
  const type=$('#to-type').value;
  const req={id:uid('TO'),employeeId:my.id,type,start,end,days,note:$('#to-note').value.trim(),status:'pending',submittedAt:todayISO()};
  if(days>5&&my.managerId)req.chain=[{label:'Manager',id:my.managerId,status:'pending'},{label:'People team',id:'E021',status:'pending'}];
  DB.timeoff.unshift(req);
  const mgr=emp(my.managerId);
  if(mgr)notify(mgr.id,'🏖️',`${my.name} requested ${days}d ${TO_TYPES[type].label.toLowerCase()} (${fmtDshort(start)}–${fmtDshort(end)})`,'#/time');
  audit('Time-off requested',`${my.name} · ${days}d ${type}`);
  Store.save();UI.closeModal();render();
  UI.toast(`Request sent to <b>${esc(mgr?mgr.name:'your manager')}</b> — it's already in their inbox`,'🏖️');

ACT.decideTO=arg=>{
  const [id,decision]=arg.split('|');
  const t=byId(DB.timeoff,id);if(!t)return;
  const e=emp(t.employeeId);
  /* multi-step chain: approve advances; deny ends */
  if(t.chain&&decision==='approved'){
    const cur=chainCurrent(t.chain);
    if(cur){cur.status='approved';cur.by=DB.me.employeeId;cur.at=todayISO();}
    if(!chainDone(t.chain)){
      const next=chainCurrent(t.chain);
      notify(next.id,'⛓️',`${e.name}'s ${t.days}d request cleared step ${t.chain.indexOf(next)} — your sign-off is next`,'#/time');
      notify(e.id,'👍',`Your request passed ${cur.label} approval — now with ${next.label}`,'#/time');
      audit('Time-off step approved',e.name+' · '+cur.label);
      Store.save();render();
      UI.toast(`Step approved — routed to <b>${esc((emp(next.id)||{}).name||next.label)}</b> for final sign-off`,'⛓️');
      return;
    }
  }
  t.status=decision;t.approverId=DB.me.employeeId;t.decidedAt=todayISO();
  if(decision==='approved'){
    if(t.type==='vacation'){e.pto.vacBalance=Math.max(0,e.pto.vacBalance-t.days);e.pto.vacUsed+=t.days;}
    if(t.type==='sick'){e.pto.sickBalance=Math.max(0,e.pto.sickBalance-t.days);e.pto.sickUsed+=t.days;}
  }
  notify(e.id,decision==='approved'?'✅':'❌',`Your ${TO_TYPES[t.type].label.toLowerCase()} request (${fmtDshort(t.start)}–${fmtDshort(t.end)}) was ${decision}`,'#/time');
  audit('Time-off '+decision,e.name+' · '+t.days+'d '+t.type);
  Store.save();render();
  UI.toast(decision==='approved'?`Approved — <b>${esc(e.name)}</b>'s balance updated & calendar synced`:`Request denied — ${esc(e.name)} has been notified`,decision==='approved'?'✅':'📭');
};

function headcountTrend(){
  const labels=[],counts=[];
  for(let i=11;i>=0;i--){
    const d=new Date();d.setMonth(d.getMonth()-i);
    const mEnd=iso(new Date(d.getFullYear(),d.getMonth()+1,0));
    const hc=DB.employees.filter(e=>e.hireDate<=mEnd&&e.status!=='terminated').length
      +DB.former.filter(f=>f.termDate>mEnd).length;
    labels.push(monthName(d.getMonth()));counts.push(hc);
  }
  return {labels,counts};
}

function insightsLearning(){

  const topCourses=[...COURSES].sort((a,b)=>DB.enrollments.filter(x=>x.courseId===b.id).length-DB.enrollments.filter(x=>x.courseId===a.id).length).slice(0,6);
  const goals=DB.goals.filter(g=>g.scope!=='company');
  return `
  <div class="grid g4 mb16">

    ${statCard('Learning hours',hours,'completed company-wide','var(--c-time)')}
    ${statCard('Active goals',goals.filter(g=>g.status!=='done').length,goals.filter(g=>g.status==='at-risk'||g.status==='behind').length+' need attention','var(--c-grow)')}

    <div class="card"><div class="card-head"><h3>Goal health — company-wide</h3></div><div class="card-body">
      ${Chart.donut([{label:'On track',v:goals.filter(g=>g.status==='on-track').length,color:'var(--ok)'},{label:'At risk',v:goals.filter(g=>g.status==='at-risk').length,color:'var(--warn)'},{label:'Behind',v:goals.filter(g=>g.status==='behind').length,color:'var(--bad)'},{label:'Done',v:goals.filter(g=>g.status==='done').length,color:'var(--c-time)'}],165)}

ACT.submitCase=()=>{
  const subject=$('#hc-subject').value.trim()||'Quick question';
  const c={id:'HD-'+rint(110,999),employeeId:DB.me.employeeId,subject,cat:$('#hc-cat').value,status:'open',priority:$('#hc-pri').value,assigneeId:'E021',createdAt:todayISO(),
    messages:[{at:todayISO(),fromId:DB.me.employeeId,text:$('#hc-body').value.trim()||subject}]};
  DB.cases.unshift(c);
  notify('E021','🎟️',`New ${c.priority} case from ${me().name}: ${subject}`,'#/help');

ACT.openCase=cid=>{
  const c=byId(DB.cases,cid);if(!c)return;
  const e=emp(c.employeeId);
  const isPeopleTeam=isAdmin()||me().dept==='people';
  UI.drawer({
    head:`<span class="notif-ic" style="background:var(--rose-soft);font-size:15px">🎟️</span><div class="col" style="gap:1px">
      <div class="row" style="gap:8px"><b style="font-size:15px">${esc(c.subject)}</b>${badge(c.status)}</div>
      <span class="tiny muted">${c.id} · ${c.cat} · ${badge(c.priority)} · opened ${rel(c.createdAt)}</span></div>`,
    body:`
      <div class="row mb16" style="gap:9px">${av(e,'sm')}<span class="small">From <b>${esc(e.name)}</b> — ${esc(e.title)}</span>
        <span class="spacer"></span><span class="tiny faint">assigned to ${esc((emp(c.assigneeId)||{}).name||'People Ops')}</span></div>
      <div class="col" style="gap:10px">${c.messages.map(m=>{const from=emp(m.fromId);const isReq=m.fromId===c.employeeId;
        return `<div style="max-width:88%;${isReq?'':'align-self:flex-end'}">
          <div style="padding:11px 14px;border-radius:13px;background:${isReq?'var(--card2)':'var(--rose-soft)'};font-size:13px;line-height:1.6">${esc(m.text)}</div>

      ${c.status!=='solved'?`<div class="field mt16"><label>Reply</label><textarea id="case-reply" placeholder="${isPeopleTeam?'Answer with policy links where you can…':'Add more details…'}"></textarea></div>`:
      `<div class="card pad mt16" style="background:var(--ok-soft);border-color:transparent;box-shadow:none"><b class="small" style="color:var(--ok)">✓ Solved${c.csat?' · rated '+c.csat+'/5 by '+esc(e.name.split(' ')[0]):''}</b></div>`}`,
    foot:c.status!=='solved'?`${isPeopleTeam&&c.cat==='Verification'?`<button class="btn soft" data-act="genVerifyLetter" data-arg="${c.employeeId}">${I.doc} Generate letter</button>`:''}
      <button class="btn ghost" data-act="replyCase" data-arg="${c.id}">Send reply</button>
      ${isPeopleTeam?`<button class="btn primary" style="--brand:var(--ok);--brand-deep:#0d9668" data-act="solveCase" data-arg="${c.id}">${I.check} Resolve case</button>`:''}`:''
  });
};
ACT.replyCase=cid=>{
  const c=byId(DB.cases,cid);const inp=$('#case-reply');
  if(!c||!inp||!inp.value.trim())return;
  c.messages.push({at:todayISO(),fromId:DB.me.employeeId,text:inp.value.trim()});
  if(DB.me.employeeId!==c.employeeId){c.status='waiting';notify(c.employeeId,'💬',`Reply on your case ${c.id}: ${c.subject}`,'#/help');}
  else c.status='open';
  Store.save();ACT.openCase(cid);UI.toast('Reply sent','💬');
};
ACT.solveCase=cid=>{
  const c=byId(DB.cases,cid);if(!c)return;
  c.status='solved';c.csat=5;
  notify(c.employeeId,'✅',`Your case ${c.id} was resolved — mind rating it?`,'#/help');
  audit('Case resolved',c.id);
  Store.save();UI.closeDrawer();render();UI.toast('Case resolved — CSAT survey sent','✅');
};

/* ============================================================
   DOCUMENT ENGINE — real PDFs, hand-rolled (zero libraries)
   ============================================================ */
const pdfSan=s=>String(s).normalize('NFKD').replace(/[̀-ͯ]/g,'').replace(/[‘’]/g,"'").replace(/[“”]/g,'"').replace(/[–—]/g,'-').replace(/[^\x20-\x7E]/g,'').replace(/\\/g,'\\\\').replace(/\(/g,'\\(').replace(/\)/g,'\\)');
function pdfWrap(t,max){const out=[];String(t).split('\n').forEach(par=>{const words=par.split(/\s+/);let cur='';
  words.forEach(w=>{if((cur+' '+w).trim().length>max){out.push(cur.trim());cur=w;}else cur+=' '+w;});out.push(cur.trim());});
  return out.length?out:[''];}
function makePDF(blocks){
  let y=712,ops='';
  /* letterhead: the four mosaic tiles + wordmark + rule */
  [[0.39,0.40,0.95],[0.94,0.39,0.55],[0.08,0.72,0.65],[0.96,0.62,0.04]].forEach((c,i)=>{
    ops+=`${c[0]} ${c[1]} ${c[2]} rg ${72+(i%2)*11} ${i<2?751:740} 9 9 re f\n`;});
  ops+=`BT /F2 14 Tf 0.07 0.09 0.17 rg 98 747 Td (Mosaic) Tj ET\n`;
  ops+=`BT /F1 8 Tf 0.54 0.56 0.65 rg 98 737 Td (${pdfSan(COMPANY.name+' | '+COMPANY.hq+' | '+COMPANY.domain)}) Tj ET\n`;
  ops+=`0.85 0.86 0.93 RG 1.2 w 72 726 m 540 726 l S\n`;
  blocks.forEach(b=>{
    const size=b.size||10.5,lh=size*1.5;
    const col=b.color||[0.10,0.11,0.18];
    pdfWrap(b.t,Math.floor(470/(size*0.52))).forEach(line=>{
      ops+=`BT /${b.bold?'F2':'F1'} ${size} Tf ${col[0]} ${col[1]} ${col[2]} rg 72 ${Math.round(y)} Td (${pdfSan(line)}) Tj ET\n`;
      y-=lh;});
    y-=(b.gap!=null?b.gap:5);
  });
  ops+=`BT /F1 7.5 Tf 0.6 0.62 0.7 rg 72 48 Td (${pdfSan('Generated by Mosaic for '+COMPANY.name+' on '+fmtD(todayISO())+' - demo document, fictional data')}) Tj ET\n`;
  const objs=[];
  objs[1]='<</Type/Catalog/Pages 2 0 R>>';
  objs[2]='<</Type/Pages/Kids[3 0 R]/Count 1>>';
  objs[3]='<</Type/Page/Parent 2 0 R/MediaBox[0 0 612 792]/Resources<</Font<</F1 4 0 R/F2 5 0 R>>>>/Contents 6 0 R>>';
  objs[4]='<</Type/Font/Subtype/Type1/BaseFont/Helvetica>>';
  objs[5]='<</Type/Font/Subtype/Type1/BaseFont/Helvetica-Bold>>';
  objs[6]='<</Length '+ops.length+'>>\nstream\n'+ops+'endstream';
  let out='%PDF-1.4\n';const offs=[0];
  for(let i=1;i<=6;i++){offs[i]=out.length;out+=i+' 0 obj\n'+objs[i]+'\nendobj\n';}
  const xref=out.length;
  out+='xref\n0 7\n0000000000 65535 f \n';
  for(let i=1;i<=6;i++)out+=String(offs[i]).padStart(10,'0')+' 00000 n \n';
  out+='trailer\n<</Size 7/Root 1 0 R>>\nstartxref\n'+xref+'\n%%EOF';
  return out;
}

/* ============================================================
   FLIGHT RISK — rule-based retention signals (illustrative)
   ============================================================ */
function flightRisk(e){
  if(!e||e.status!=='active')return {score:0,tier:'low',reasons:[]};
  const rs=[];let s=0;
  const cr=e.comp.base/bandFor(e.level,e.dept)[1];
  if(cr<0.9){s+=25;rs.push('Paid '+Math.round((1-cr)*100)+'% below band mid');}
  const gl=DB.goals.filter(g=>g.ownerId===e.id);
  if(gl.some(g=>g.status==='behind')){s+=15;rs.push('Goal behind schedule');}
  else if(gl.some(g=>g.status==='at-risk')){s+=8;rs.push('Goal at risk');}
  const praise=DB.feedback.filter(f=>f.toId===e.id).sort((a,b)=>b.at.localeCompare(a.at))[0];
  if(!praise||between(praise.at,todayISO())>60){s+=12;rs.push('No recognition in 60+ days');}
  if(!e.compHistory.some(h=>h.type==='Promotion')&&between(e.hireDate,todayISO())>900){s+=18;rs.push('No growth event in '+tenure(e.hireDate));}
  const sv=DB.surveys.find(x=>x.status==='live');
  if(sv&&!sv.respondedIds.includes(e.id)){s+=7;rs.push('Skipped latest pulse');}
  if(DB.timeoff.some(t=>t.employeeId===e.id&&t.status==='denied'&&between(t.decidedAt||t.start,todayISO())<90)){s+=10;rs.push('PTO denied in last 90d');}
  const mgr=emp(e.managerId);
  if(mgr&&reportsOf(mgr.id).length>8){s+=5;rs.push('Manager has '+reportsOf(mgr.id).length+' directs');}
  s=clamp(s,0,100);
  return {score:s,tier:s>=50?'high':s>=28?'watch':'low',reasons:rs};
}
const riskPill=r=>`<span class="risk-pill risk-${r.tier}" title="Rule-based signal, not a prediction">${r.tier==='high'?'🔥':r.tier==='watch'?'👀':'🌿'} ${r.tier==='high'?'High risk':r.tier==='watch'?'Watch':'Healthy'} · ${r.score}</span>`;

      <b class="small">Estimated PTO payout: ${fmt$(e.pto.vacBalance*e.comp.base/260)}</b>
      <span class="tiny muted" style="display:block;margin-top:2px">${e.pto.vacBalance} unused vacation days × daily rate. Final check is queued automatically.</span></div>`,
    foot:`<button class="btn ghost" data-act="closeModal">Cancel</button><button class="btn danger" data-act="confirmOffboard" data-arg="${eid}">Start offboarding</button>`});
};
ACT.confirmOffboard=eid=>{
  const e=emp(eid);if(!e)return;
  const lastDay=$('#ob-last').value||daysAhead(14);
  const reason=$('#ob-reason').value;
  const regret=$('#ob-regret').checked;
  e.status='offboarding';e.lastDay=lastDay;
  DB.offboarding.push({id:uid('OFFB'),employeeId:eid,lastDay,reason,regret,
    tasks:OFFB_TEMPLATE.map((t,k)=>({id:uid('OT'),title:t.title,owner:t.owner,due:iso(new Date(new Date(lastDay).getTime()+t.offset*DAY)),cat:t.cat,done:false,doneAt:null}))});
  const payout=Math.round(e.pto.vacBalance*e.comp.base/260);
  if(e.managerId)notify(e.managerId,'👋',`${e.name}'s offboarding has started — last day ${fmtDshort(lastDay)}`,'#/onboard');
  notify('E007','👋',`Offboarding started for ${e.name} (${reason})`,'#/onboard');
  audit('Offboarding started',`${e.name} · last day ${lastDay} · ${reason}`);
  Store.save();UI.closeModal();
  UI.modal({title:'🧩 Offboarding wired through everything',sub:e.name+' — last day '+fmtD(lastDay),body:`
    <div class="col" style="gap:9px">
      ${[['🪪','People','Status → Offboarding · visible in directory filters','#/people/'+eid],
        ['✅','Journeys','10-task exit journey scheduled around the last day','#/onboard'],
        ['🔐','Security','Okta deprovisioning queued for '+fmtDshort(lastDay),'#/admin'],
        ['💸','Pay',`Final check + <b>${fmt$(payout)}</b> PTO payout queued`,'#/pay'],
        ['📊','Engagement','Exit survey scheduled — feeds attrition themes','#/engage'],
        ['📈','Insights','Headcount projection & attrition analytics updated','#/insights']]
        .map(x=>`<a class="row card pad hovercard" style="gap:11px;box-shadow:none;background:var(--card2);color:inherit;padding:11px 14px" href="${x[3]}" data-act="closeModalSoft">
        <span style="font-size:17px">${x[0]}</span><span class="col" style="gap:0"><b class="small">${x[1]}</b><span class="tiny muted">${x[2]}</span></span><span class="spacer"></span>${I.chev}</a>`).join('')}
    </div>`,
    foot:`<button class="btn ghost" data-act="backfillReq" data-arg="${eid}">🧲 Open backfill req</button><button class="btn primary" data-act="closeModal">Done</button>`});
  render();
};
ACT.backfillReq=eid=>{
  const e=emp(eid);if(!e)return;
  const band=bandFor(e.level,e.dept);
  const id='R-'+(Math.max(...DB.reqs.map(r=>+r.id.split('-')[1]))+1);
  DB.reqs.unshift({id,title:e.title,dept:e.dept,team:e.team,level:e.level,loc:e.location,hmId:e.managerId||'E007',recruiterId:'E022',status:'open',openedAt:todayISO(),target:daysAhead(45),type:'Backfill',salary:[band[0],band[2]],priority:'high'});
  audit('Backfill req opened',id+' for '+e.name+'\'s seat');
  Store.save();UI.closeModal();UI.toast(`Backfill req <b>${id}</b> opened — Recruiting has it`,'🧲');nav('#/recruit/'+id);
};
ACT.toggleOffbTask=arg=>{
  const [obId,taskId]=arg.split('|');
  const ob=byId(DB.offboarding,obId);if(!ob)return;
  const t=byId(ob.tasks,taskId);if(!t)return;
  t.done=!t.done;t.doneAt=t.done?todayISO():null;
  if(t.done&&t.title.includes('Okta'))UI.toast('SCIM deprovision request sent — access ends on last day','🔐');
  const e=emp(ob.employeeId);
  if(ob.tasks.every(x=>x.done)&&e.status==='offboarding'){
    e.status='terminated';
    DB.former.unshift({id:uid('X'),name:e.name,dept:e.dept,termDate:ob.lastDay,reason:ob.reason,regret:ob.regret});
    notify('E007','🕊️',`${e.name}'s offboarding is complete — moved to alumni`,'#/insights');
    audit('Offboarding completed',e.name+' → alumni');
    UI.toast(`<b>${esc(e.name)}</b>'s journey is complete — attrition analytics updated 🕊️`,'👋');
  }
  Store.save();render();
};

/* ============================================================
   LIFE-EVENT WIZARD (qualifying events → benefits changes)
   ============================================================ */
const LIFE={step:1,data:{}};
const LIFE_EVENTS=[['💍','Marriage'],['🍼','Birth or adoption'],['🛡️','Loss of other coverage'],['📦','Moved to a new state']];
ACT.lifeEvent=()=>{LIFE.step=1;LIFE.data={};lifeRender();};
function lifeRender(){
  const el=DB.benefits.find(b=>b.employeeId===DB.me.employeeId)||{};
  const meds=BEN_PLANS.filter(p=>p.type==='Medical');
  let body='',foot='';
  if(LIFE.step===1){
    body=`<p class="small muted mb12">Life changes outside open enrollment? If it's a qualifying event, you have <b>30 days</b> to update your elections.</p>
      <div class="grid g2">${LIFE_EVENTS.map(ev=>`<button class="card pad hovercard" style="text-align:center;cursor:pointer;${LIFE.data.event===ev[1]?'border-color:var(--c-pay);box-shadow:0 0 0 3px var(--ok-soft)':''}" data-act="lifePick" data-arg="${ev[1]}">
      <div style="font-size:26px">${ev[0]}</div><b class="small" style="display:block;margin-top:6px">${ev[1]}</b></button>`).join('')}</div>`;
    foot=`<button class="btn ghost" data-act="closeModal">Cancel</button><button class="btn primary" style="--brand:var(--c-pay);--brand-deep:#0d9668" data-act="lifeNext" ${LIFE.data.event?'':'disabled'}>Next</button>`;
  }else if(LIFE.step===2){
    body=`<div class="field"><label>When did it happen${LIFE.data.event==='Marriage'?' (congratulations! 🎊)':LIFE.data.event==='Birth or adoption'?' (congratulations! 🎉)':''}?</label>
      <input type="date" id="le-date" value="${LIFE.data.date||daysAgo(3)}"></div>
      <div class="field"><label>Dependents to add</label><select id="le-deps">${[0,1,2,3].map(n=>`<option ${n===(LIFE.data.deps!=null?LIFE.data.deps:1)?'selected':''}>${n}</option>`).join('')}</select></div>
      <div class="field"><label>Medical plan</label><select id="le-plan">${meds.map(p=>`<option value="${p.id}" ${p.id===(LIFE.data.plan||el.medical)?'selected':''}>${p.name} — you pay ${fmt$(p.premium)}/mo</option>`).join('')}</select></div>`;
    foot=`<button class="btn ghost" data-act="lifeBack">Back</button><button class="btn primary" style="--brand:var(--c-pay);--brand-deep:#0d9668" data-act="lifeNext2">Review</button>`;
  }else{
    const deadline=iso(new Date(new Date(LIFE.data.date).getTime()+30*DAY));
    const late=deadline<todayISO();
    const plan=byId(BEN_PLANS,LIFE.data.plan);
    body=`<div class="card pad" style="box-shadow:none;background:var(--card2)">
      <dl class="kv"><dt>Event</dt><dd>${LIFE.data.event}</dd><dt>Date</dt><dd>${fmtD(LIFE.data.date)}</dd>
      <dt>Deadline</dt><dd style="${late?'color:var(--bad);font-weight:700':''}">${fmtD(deadline)}${late?' — window closed':''}</dd>
      <dt>Dependents</dt><dd>+${LIFE.data.deps}</dd><dt>Medical</dt><dd>${plan?esc(plan.name):'—'}</dd></dl></div>
      ${late?`<p class="small mt12" style="color:var(--bad)">This event is past its 30-day window — changes will need to wait for open enrollment (Nov 1–15), or contact People Ops for exceptions.</p>`
      :'<p class="tiny faint mt12">Submitting updates your elections immediately and notifies payroll for the next cycle. Documentation may be requested.</p>'}`;
    foot=`<button class="btn ghost" data-act="lifeBack">Back</button>${late?'<button class="btn ghost" data-act="openNewCase">Ask People Ops</button>':`<button class="btn primary" style="--brand:var(--c-pay);--brand-deep:#0d9668" data-act="lifeSubmit">Submit changes</button>`}`;
  }
  UI.modal({title:'Report a life event',sub:'Step '+LIFE.step+' of 3',body,foot});
}
ACT.lifePick=ev=>{LIFE.data.event=ev;lifeRender();};
ACT.lifeNext=()=>{if(!LIFE.data.event)return;LIFE.step=2;lifeRender();};
ACT.lifeBack=()=>{if(LIFE.step===2){LIFE.data.date=($('#le-date')||{}).value;}LIFE.step=Math.max(1,LIFE.step-1);lifeRender();};
ACT.lifeNext2=()=>{LIFE.data.date=$('#le-date').value||daysAgo(3);LIFE.data.deps=+$('#le-deps').value;LIFE.data.plan=$('#le-plan').value;LIFE.step=3;lifeRender();};
ACT.lifeSubmit=()=>{
  let el=DB.benefits.find(b=>b.employeeId===DB.me.employeeId);
  if(!el){el={employeeId:DB.me.employeeId,medical:null,dental:null,vision:null,k401:0,dependents:0};DB.benefits.push(el);}
  el.medical=LIFE.data.plan||el.medical;
  el.dependents=(el.dependents||0)+(LIFE.data.deps||0);
  me().docs.unshift({name:'Life Event Confirmation — '+LIFE.data.event+'.pdf',date:todayISO(),kind:'Benefits'});
  notify('E021','🧾',`${me().name} reported a life event (${LIFE.data.event}) — elections updated`,'#/pay');
  audit('Life event processed',LIFE.data.event+' · +'+LIFE.data.deps+' dependents');
  Store.save();UI.closeModal();render();
  UI.toast('Elections updated — payroll picks it up next cycle. Confirmation saved to your documents 🧾','✅');
};

/* ============================================================
   GOAL ALIGNMENT TREE
   ============================================================ */
function goalTreeRow(g,depth){
  const owner=g.ownerId?emp(g.ownerId):null;
  const kids=DB.goals.filter(x=>x.parentId===g.id);
  const color=g.status==='behind'?'var(--bad)':g.status==='at-risk'?'var(--warn)':g.status==='done'?'var(--c-time)':'var(--c-grow)';
  return `<div class="gt-row">${depth?'<span class="gt-elbow"></span>':''}
    ${owner?av(owner,'sm'):`<span class="av sm" style="background:linear-gradient(135deg,var(--brand),#9333ea);font-size:11px">🏁</span>`}
    <span class="col" style="gap:0;flex:1;min-width:0"><b class="small" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(g.title)}</b>
    <span class="tiny faint">${owner?esc(owner.name):'Company OKR'} · due ${fmtDshort(g.due)}</span></span>
    ${badge(g.status)}<span class="gt-bar">${progressBar(g.progress,color)}</span></div>
    ${kids.length?`<div class="gt-kids">${kids.map(k=>goalTreeRow(k,depth+1)).join('')}</div>`:''}`;
}
function goalTree(){
  const roots=DB.goals.filter(g=>g.scope==='company');
  const orphans=DB.goals.filter(g=>g.scope==='individual'&&!g.parentId);
  return `<div class="card pad">
    <div class="row between wrap mb12"><b>Alignment tree — every goal ladders up</b><span class="tiny faint">company → department → individual</span></div>
    ${roots.map(r=>goalTreeRow(r,0)).join('<div class="divider"></div>')}
    ${orphans.length?`<div class="divider"></div><div class="tiny faint mb8" style="font-weight:700;letter-spacing:.05em;text-transform:uppercase">Personal growth goals (intentionally unaligned)</div>${orphans.map(o=>goalTreeRow(o,0)).join('')}`:''}
  </div>`;
}

/* ============================================================
   ASK MOSAIC — assistant (rule-based demo; swap for Claude API in prod)
   ============================================================ */
const Assist={
  open:false,hist:[],
  toggle(){this.open=!this.open;if(this.open&&!this.hist.length)this.greet();this.render();},
  greet(){
    const my=me();
    this.hist.push({who:'bot',html:`Hey ${esc(my.name.split(' ')[0])} 👋 I'm <b>Ask Mosaic</b>. I can answer from your live HR data — balances, approvals, people, policies — or draft things for you. Try a chip below.`});
  },
  chips(){
    const role=myRole();
    const base=['How much PTO do I have?','Who\'s out this week?','What courses are due?'];
    if(role==='admin')return base.concat(['Who\'s a flight risk?','Draft a JD for a robotics engineer','How\'s the pulse looking?']);
    if(role==='manager')return base.concat(['What\'s waiting on me?','Draft praise for Jordan']);
    return base.concat(['How does the 401k match work?','What\'s our parental leave?']);
  },
  send(q){
    if(!q.trim())return;
    this.hist.push({who:'user',html:esc(q)});
    const a=this.answer(q.toLowerCase(),q);
    this.hist.push(Object.assign({who:'bot'},a));
    this.render();
  },
  answer(q,raw){
    const my=me();
    /* PTO balance */
    if(/(pto|vacation|time off|sick).*(left|balance|have|much|many|remain)|^balance/.test(q))
      return {html:`You have <b>${my.pto.vacBalance} vacation days</b> (${my.pto.vacUsed} used this year) and <b>${my.pto.sickBalance} sick days</b> left. Weekends and holidays never count against you.`,actions:[{label:'Request time off',act:'openTimeReq'},{label:'Open Time Off',act:'nav',arg:'#/time'}]};
    /* who's out */
    if(/who.?s?\s?(out|off|away)|out (this|next) week/.test(q)){
      const out=whosOut(7);
      return {html:out.length?`<b>${out.length} ${out.length===1?'person is':'people are'} out in the next 7 days:</b><br>${out.slice(0,6).map(t=>`• ${esc(t.emp.name)} — ${TO_TYPES[t.type].label}, ${fmtDshort(t.start)}–${fmtDshort(t.end)}`).join('<br>')}`:'Nobody\'s scheduled out in the next 7 days. Full house!',actions:[{label:'Team calendar',act:'nav',arg:'#/time'}]};}
    /* holidays */
    if(/holiday/.test(q)){const hs=DB.holidays.filter(h=>h.date>=todayISO()).slice(0,3);
      return {html:`<b>Upcoming holidays:</b><br>${hs.map(h=>`• ${esc(h.name)} — ${fmtD(h.date)}`).join('<br>')}`};}
    /* my goals */
    if(/my goals?|goals? (doing|status|progress)/.test(q)){const gl=DB.goals.filter(g=>g.ownerId===my.id);
      return {html:gl.length?`<b>Your ${gl.length} goals:</b><br>${gl.map(g=>`• ${esc(g.title)} — ${g.progress}% (${g.status})`).join('<br>')}`:'No goals on record yet — worth raising in your next 1:1.',actions:[{label:'Open Performance',act:'nav',arg:'#/grow'}]};}
    /* learning due */
    if(/(course|learning|training).*(due|overdue|left)|due.*(course|training)|what courses/.test(q)){
      const due=DB.enrollments.filter(en=>en.employeeId===my.id&&en.progress<100);
      return {html:due.length?`<b>${due.length} course${due.length===1?'':'s'} to finish:</b><br>${due.slice(0,5).map(en=>{const c=courseOf(en.courseId);return `• ${esc(c.title)} — ${en.progress}%${en.due?', due '+rel(en.due):''}`;}).join('<br>')}`:'You\'re fully caught up on learning 🎓',actions:[{label:'Open Learning',act:'nav',arg:'#/learn'}]};}
    /* waiting on me */
    if(/waiting on me|my (inbox|approvals|tasks)|what.?s (pending|waiting)/.test(q)){
      const items=inboxFor(my.id);
      return {html:items.length?`<b>${items.length} thing${items.length===1?'':'s'} waiting on you:</b><br>${items.slice(0,5).map(i=>`${i.icon} ${esc(i.text)}`).join('<br>')}`:'Inbox zero — nothing needs you right now 🌤️',actions:[{label:'Go to Home',act:'nav',arg:'#/home'}]};}
    /* headcount */
    if(/headcount|how many (people|employees|staff)/.test(q))
      return {html:`<b>${activeEmps().length} people</b> at ${esc(COMPANY.name)} right now — ${DB.employees.filter(e=>e.status==='onboarding').length} onboarding, ${DB.reqs.filter(r=>r.status==='open').length} open requisitions.`,actions:canSee('insights')?[{label:'Open Insights',act:'nav',arg:'#/insights'}]:[]};
    /* flight risk */
    if(/flight risk|attrition risk|retention|who might leave/.test(q)){
      if(!isAdmin())return {html:'Retention signals are visible to People admins only — switch to the Admin persona to see them.'};
      const risks=DB.employees.filter(e=>e.status==='active').map(e=>({e,r:flightRisk(e)})).filter(x=>x.r.tier!=='low').sort((a,b)=>b.r.score-a.r.score).slice(0,4);
      return {html:`<b>Top retention signals</b> (rule-based, illustrative):<br>${risks.map(x=>`• ${esc(x.e.name)} — score ${x.r.score} (${esc(x.r.reasons[0]||'')})`).join('<br>')}`,actions:[{label:'See watchlist',act:'nav',arg:'#/insights'}]};}
    /* pulse / enps */
    if(/pulse|enps|engagement (score|results)|how.?s the (team|pulse|mood)/.test(q)){
      const sv=DB.surveys.find(s=>s.status==='live');
      if(!sv)return {html:'No live survey right now.'};
      const taken=sv.respondedIds.includes(my.id);
      if(myRole()==='employee')return {html:`The <b>${esc(sv.name)}</b> closes ${rel(sv.closes)}.${taken?' You\'ve already responded — thank you!':' Two minutes, fully anonymous.'}`,actions:taken?[]:[{label:'Take it now',act:'openSurvey',arg:sv.id}]};
      return {html:`<b>${esc(sv.name)}:</b> eNPS <b>${sv.enps}</b> (+4 vs March), participation ${pct(sv.respondedIds.length,sv.audience)}%. Strongest driver: Manager support (4.2). Watch item: Compensation fairness (3.4).`,actions:[{label:'Open Engagement',act:'nav',arg:'#/engage'}]};}
    /* draft a JD */
    let m=q.match(/(?:jd|job description)(?: for)?(?: an?)? (.+)/);
    if(/draft|write|create/.test(q)&&m){
      const role=cap(m[1].replace(/[?.!]/g,'').trim());
      const dept=/engineer|developer|firmware|robotic/.test(m[1])?'eng':/design/.test(m[1])?'design':/market/.test(m[1])?'mktg':/sale|account/.test(m[1])?'sales':/data|analyst/.test(m[1])?'data':/people|hr|recruit/.test(m[1])?'people':'ops';
      const band=bandFor('IC4',dept);
      return {html:`<b>${esc(role)} — ${esc(COMPANY.name)}</b><br><br><b>About us:</b> ${esc(COMPANY.tagline)}. We're ${activeEmps().length} people making home robotics genuinely useful.<br><br><b>What you'll do:</b><br>• Own meaningful pieces of the ${deptName(dept).toLowerCase()} roadmap end-to-end<br>• Partner across Product, Design and Engineering on the Home Hub platform<br>• Raise the bar on craft through reviews, docs and mentorship<br>• Talk to customers; let reality shape the work<br><br><b>What you'll bring:</b> 4+ years of relevant experience, strong collaboration instincts, and curiosity (it's our first company value).<br><br><b>Range:</b> ${fmtK(band[0])}–${fmtK(band[2])} + bonus + equity. ${esc(COMPANY.name)} is an equal-opportunity employer.<br><br><i>Copy it, tweak it, post it.</i>`,actions:canSee('recruit')?[{label:'Open a req',act:'openNewReq'}]:[]};}
    /* draft praise */
    m=raw.match(/praise (?:for )?([A-Za-z]+)/i);
    if(/praise/.test(q)&&m){
      const who=DB.employees.find(e=>e.status!=='terminated'&&e.name.toLowerCase().includes(m[1].toLowerCase()));
      if(who)return {html:`Good instinct — recognition lands best within days of the moment. I'll open the praise composer addressed to <b>${esc(who.name)}</b>; name the specific thing they did and tag a value.`,actions:[{label:'Praise '+esc(who.name.split(' ')[0]),act:'openPraise',arg:who.id}]};}
    /* benefits FAQs from KB */
    if(/401k|401\(k\)|match|retirement/.test(q))return {html:`<b>401(k):</b> Meridian matches <b>100% of your first 4%</b> — free money, immediately vested. Change contributions any time; updates apply the next pay period.`,actions:[{label:'Full article',act:'nav',arg:'#/help/KB-6'},{label:'My benefits',act:'nav',arg:'#/pay'}]};
    if(/parental|maternity|paternity|baby/.test(q))return {html:`<b>Parental leave:</b> 16 weeks at 100% pay for all new parents, usable within 12 months of birth or adoption. Loop in People Ops ~60 days ahead and we'll build your coverage plan.`,actions:[{label:'Full article',act:'nav',arg:'#/help/KB-7'}]};
    if(/i-?9|e-?verify/.test(q))return {html:`<b>Form I-9:</b> bring one List A document (like a U.S. passport) OR one List B + one List C. Section 1 on day one, verification within 3 business days — we run E-Verify for all U.S. hires.`,actions:[{label:'Full article',act:'nav',arg:'#/help/KB-4'},{label:'I-9 course',act:'nav',arg:'#/learn/L-101'}]};
    /* who is X */
    m=raw.match(/who (?:is|'s) ([A-Za-z .'-]+)/i);
    if(m){const who=DB.employees.find(e=>e.status!=='terminated'&&e.name.toLowerCase().includes(m[1].trim().toLowerCase()));
      if(who){const mgr=emp(who.managerId);
        return {html:`<b>${esc(who.name)}</b> — ${esc(who.title)}, ${deptName(who.dept)} (${esc(who.location)}). ${tenure(who.hireDate)} at Meridian${mgr?', reports to '+esc(mgr.name):''}.`,actions:[{label:'View profile',act:'nav',arg:'#/people/'+who.id}]};}}
    /* open roles */
    if(/open (req|role|job|position)|hiring|we hiring/.test(q)){const open=DB.reqs.filter(r=>r.status==='open');
      return {html:`<b>${open.length} open roles:</b><br>${open.slice(0,6).map(r=>`• ${esc(r.title)} — ${deptName(r.dept)}, ${esc(r.loc)}`).join('<br>')}${open.length>6?'<br>…and more':''}`,actions:canSee('recruit')?[{label:'Open Recruiting',act:'nav',arg:'#/recruit'}]:[]};}
    /* KB keyword fallback */
    const words=q.replace(/[^a-z0-9 ]/g,'').split(/\s+/).filter(w=>w.length>3);
    if(words.length){
      const scored=DB.kb.map(k=>({k,s:words.filter(w=>(k.title+' '+k.body).toLowerCase().includes(w)).length})).filter(x=>x.s>0).sort((a,b)=>b.s-a.s);
      if(scored.length)return {html:`From the knowledge base — <b>${esc(scored[0].k.title)}</b>:<br>${esc(scored[0].k.body.slice(0,180))}…`,actions:[{label:'Read full article',act:'nav',arg:'#/help/'+scored[0].k.id}]};}
    return {html:`I didn't catch that one. I'm best at things like:<br>• “How much PTO do I have?”<br>• “Who's out next week?”<br>• “Draft a JD for a data analyst”<br>• “What's our parental leave?”<br>• “Who is Priya?”`,actions:[{label:'Browse Help Center',act:'nav',arg:'#/help'}]};
  },
  render(){
    const p=$('#assist-panel');
    if(!this.open){p.classList.remove('open');return;}
    p.innerHTML=`
      <div class="as-head">${logoSVG(26)}<div class="col" style="gap:0;flex:1"><b style="font-size:14px">Ask Mosaic</b><span class="tiny faint">answers from your live HR data</span></div>
        <button class="iconbtn" data-act="toggleAssist">${I.x}</button></div>
      <div class="as-body" id="as-body">${this.hist.map(msg=>`<div class="as-msg ${msg.who}">${msg.html}</div>
        ${msg.actions&&msg.actions.length?`<div class="as-actions">${msg.actions.map(a=>`<button class="btn xs soft" data-act="${a.act}" ${a.arg?`data-arg="${a.arg}"`:''}>${a.label}</button>`).join('')}</div>`:''}`).join('')}</div>
      <div class="as-chips">${this.chips().map(c=>`<span class="chip" data-act="assistChip" data-arg="${esc(c)}">${esc(c)}</span>`).join('')}</div>
      <div class="as-foot"><input id="as-input" placeholder="Ask anything about work here…" autocomplete="off" onkeydown="if(event.key==='Enter')ACT.assistSend()">
        <button class="btn primary" data-act="assistSend" style="padding:9px 13px">${I.send}</button></div>
      <div class="as-note">Rule-based demo assistant · production version would plug in the Claude API</div>`;
    p.classList.add('open');
    const b=$('#as-body');if(b)b.scrollTop=b.scrollHeight;
    const inp=$('#as-input');if(inp)inp.focus();
  },
};
ACT.toggleAssist=()=>Assist.toggle();
ACT.assistSend=()=>{const inp=$('#as-input');if(inp){Assist.send(inp.value);}};
ACT.assistChip=a=>Assist.send(a);

/* ============================================================
   MOBILE TAB BAR
   ============================================================ */
function renderTabbar(){
  const my=me();
  const items=[['home','Home','home','var(--c-home)'],['time','Time','time','var(--c-time)'],['learn','Learn','learn','var(--c-learn)'],['grow','Grow','grow','var(--c-grow)']];
  const onMe=ROUTE.mod==='people'&&ROUTE.param===my.id;
  $('#tabbar').innerHTML=items.map(it=>`
    <button class="${ROUTE.mod===it[0]&&!onMe?'on':''}" style="--mod:${it[3]}" data-act="nav" data-arg="#/${it[0]}">${I[it[2]]}${it[1]}</button>`).join('')+
    `<button class="${onMe?'on':''}" style="--mod:var(--c-people)" data-act="nav" data-arg="#/people/${my.id}">${I.people}Me</button>`;
}

/* ============================================================
   GOLDEN-THREAD TOUR
   ============================================================ */
const Tour={
  i:0,active:false,
  steps:[
    {center:true,title:'Welcome to Mosaic 🧩',text:'One platform for the entire employee journey — HRIS, recruiting, onboarding, learning, performance, time, pay, engagement, analytics and helpdesk. The point of this tour: showing they\'re truly <b>one system</b>, not eleven tabs.'},
    {sel:'#role-switch',title:'One app, three seats',text:'Mosaic re-permissions itself live. <b>Employee</b> sees self-service, <b>Manager</b> sees their team and approvals, <b>Admin</b> sees everything. Try all three after the tour.'},
    {route:'#/home',sel:'#inbox-card',title:'The unified action inbox',text:'Approvals, reviews, overdue training, onboarding tasks, surveys — drawn live from <b>every module</b> and sorted by urgency. No more "check five systems."'},
    {route:'#/recruit/R-104',sel:'.kanban',title:'Here\'s the golden thread',text:'<b>Alex Rivera</b> is sitting at the Offer stage for Senior Robotics Engineer. Open the card and click <b>🎉 Mark hired</b> (or drag it to Hired) — one action will create the HRIS record, spawn onboarding, assign compliance training, seed 30/60/90 goals, open benefits and update headcount.'},
    {center:true,title:'Everything else is one ⌘K away',text:'Hit <b>⌘K</b> anywhere to jump to any person, candidate, course, goal or policy. Demo data is yours to play with — <b>Reset demo</b> on Home rebuilds the world. Enjoy!'},
  ],
  start(){this.i=0;this.active=true;this.show();},
  show(){
    const s=this.steps[this.i];if(!s){this.end();return;}
    const go=()=>{
      this.clearHl();
      const pop=$('#tour-pop'),veil=$('#tour-veil');
      veil.classList.add('open');
      let target=null;
      if(s.sel){target=$(s.sel);if(target)target.classList.add('tour-hl');}
      pop.innerHTML=`<div class="row between mb8"><b style="font-family:var(--font-display)">${s.title}</b>
        <button class="iconbtn" onclick="Tour.end()">${I.x}</button></div>
        <p class="small muted" style="line-height:1.65">${s.text}</p>
        <div class="row between mt16"><span class="tour-step-dots">${this.steps.map((_,k)=>`<i class="${k===this.i?'on':''}"></i>`).join('')}</span>
        <span class="row" style="gap:7px">${this.i>0?'<button class="btn sm ghost" onclick="Tour.prev()">Back</button>':''}
        <button class="btn sm primary" onclick="Tour.next()">${this.i===this.steps.length-1?'Finish':'Next'}</button></span></div>`;
      pop.classList.add('open');
      if(s.center||!target){
        pop.style.left='50%';pop.style.top='50%';pop.style.transform='translate(-50%,-50%)';
      }else{
        const r=target.getBoundingClientRect();
        pop.style.transform='none';
        let top=r.bottom+12,left=clamp(r.left,12,window.innerWidth-342);
        if(top+230>window.innerHeight)top=Math.max(12,r.top-12-pop.offsetHeight-180);
        pop.style.top=clamp(top,12,window.innerHeight-260)+'px';pop.style.left=left+'px';
        target.scrollIntoView({block:'nearest',behavior:'smooth'});
      }
    };
    if(s.route&&location.hash!==s.route){nav(s.route);setTimeout(go,300);}else go();
  },
  next(){this.i++;if(this.i>=this.steps.length)this.end();else this.show();},
  prev(){this.i=Math.max(0,this.i-1);this.show();},
  clearHl(){$$('.tour-hl').forEach(e=>e.classList.remove('tour-hl'));},
  end(){if(!this.active&&!$('#tour-pop').classList.contains('open'))return;this.active=false;this.clearHl();
    $('#tour-pop').classList.remove('open');$('#tour-veil').classList.remove('open');
    try{localStorage.setItem('mosaic-toured','1');}catch(e){}},
};
window.Tour=Tour;

/* ============================================================
   BOOT
   ============================================================ */
(function init(){
  try{if(localStorage.getItem('mosaic-theme')==='dark')document.documentElement.classList.add('dark');}catch(e){}
  Store.load();
  if(!location.hash)history.replaceState(null,'','#/home');
  render();
  /* first visit? run the golden-thread tour once */
  let toured=null;try{toured=localStorage.getItem('mosaic-toured');}catch(e){}
  if(!toured)setTimeout(()=>Tour.start(),900);
  console.log('%c🧩 Mosaic — one platform, every piece','font:700 14px Inter;color:#6366f1','· seeded world:',DB.employees.length,'employees ·',DB.candidates.length,'candidates ·',COURSES.length,'courses');
})();
</script>
