  </div>`;
}

/* ============================================================
   ASK MOSAIC — assistant (rule-based demo; swap for Claude API in prod)
   ============================================================ */
const Assist={
  open:false,hist:[],
  toggle(){this.open=!this.open;if(this.open&&!this.hist.length)this.greet();this.render();},
  greet(){
    const my=me();
    this.hist.push({who:'bot',html:`Hey ${esc(my.name.split(' ')[0])} 👋 I'm <b>Ask Mosaic</b>. I can answer from your live HR data — balances, approvals, people, policies — or draft things for you. Try a chip below.`});
  },
  chips(){
    const role=myRole();
    const base=['How much PTO do I have?','Who\'s out this week?','What courses are due?'];
    if(role==='admin')return base.concat(['Who\'s a flight risk?','Draft a JD for a robotics engineer','How\'s the pulse looking?']);
    if(role==='manager')return base.concat(['What\'s waiting on me?','Draft praise for Jordan']);
    return base.concat(['How does the 401k match work?','What\'s our parental leave?']);
  },
  send(q){
    if(!q.trim())return;
    this.hist.push({who:'user',html:esc(q)});
    const a=this.answer(q.toLowerCase(),q);
    this.hist.push(Object.assign({who:'bot'},a));
    this.render();
  },
  answer(q,raw){
    const my=me();
    /* daily briefing — synthesis across every module */
    if(/brief(ing)?( me)?|start my day|good morning|my day\b/.test(q)){
      const evs=weekEventsFor(todayISO());
      const items=inboxFor(my.id).slice(0,3);
      const un=(DB.chatMsgs||[]).filter(ms=>ms.at===todayISO()&&ms.fromId!==my.id&&(DB.channels||[]).some(ch=>ch.id===ms.ch&&chanVisible(ch))).length;
      const sv=DB.surveys.find(s=>s.status==='live');
      return {html:`<b>Good ${now().getHours()<12?'morning':'afternoon'}, ${esc(my.name.split(' ')[0])} — your day:</b><br><br>📅 <b>${evs.length}</b> on the calendar${evs.length?': '+evs.slice(0,2).map(ev=>ev.time+' '+esc(ev.title)).join(' · ')+(evs.length>2?' +'+(evs.length-2)+' more':''):''}<br>⚡ <b>${items.length}</b> action item${items.length===1?'':'s'}${items.length?': '+items.map(i=>esc(i.text.slice(0,42))).join('; '):' — clear inbox 🌤️'}<br>💬 <b>${un}</b> new message${un===1?'':'s'}${sv&&!sv.respondedIds.includes(my.id)?`<br>📊 The ${esc(sv.name)} closes ${rel(sv.closes)} — two anonymous minutes`:''}`,
        sources:[{label:'Calendar',link:'#/cal'},{label:'Action inbox',link:'#/home'},{label:'Messages',link:'#/chat'}]};}
    /* follow-up about the last person discussed (lightweight context) */
    if(Assist.ctx&&Assist.ctx.person&&/\b(her|his|their|she|he|they)\b/.test(q)&&/(team|manager|report|where|location|based|title|role|email)/.test(q)){
      const p=Assist.ctx.person,mgr=emp(p.managerId);
      return {html:`<b>${esc(p.name)}</b> — ${esc(p.title)}, ${deptName(p.dept)} (${esc(p.team)}), based in ${esc(p.location)}${mgr?', reports to '+esc(mgr.name):''}. Reach them at ${esc(p.email)}.`,sources:[{label:'Profile',link:'#/people/'+p.id}]};}
    /* PTO balance */
    if(/(pto|vacation|time off|sick).*(left|balance|have|much|many|remain)|^balance/.test(q))
      return {html:`You have <b>${my.pto.vacBalance} vacation days</b> (${my.pto.vacUsed} used this year) and <b>${my.pto.sickBalance} sick days</b> left. Weekends and holidays never count against you.`,actions:[{label:'Request time off',act:'openTimeReq'},{label:'Open Time Off',act:'nav',arg:'#/time'}],sources:[{label:'KB: How PTO accrual works',link:'#/help/KB-1'}]};
    /* who's out */
    if(/who.?s?\s?(out|off|away)|out (this|next) week/.test(q)){
      const out=whosOut(7);
      return {html:out.length?`<b>${out.length} ${out.length===1?'person is':'people are'} out in the next 7 days:</b><br>${out.slice(0,6).map(t=>`• ${esc(t.emp.name)} — ${TO_TYPES[t.type].label}, ${fmtDshort(t.start)}–${fmtDshort(t.end)}`).join('<br>')}`:'Nobody\'s scheduled out in the next 7 days. Full house!',actions:[{label:'Team calendar',act:'nav',arg:'#/time'}]};}
    /* holidays */
    if(/holiday/.test(q)){const hs=DB.holidays.filter(h=>h.date>=todayISO()).slice(0,3);
      return {html:`<b>Upcoming holidays:</b><br>${hs.map(h=>`• ${esc(h.name)} — ${fmtD(h.date)}`).join('<br>')}`};}
    /* my goals */
    if(/my goals?|goals? (doing|status|progress)/.test(q)){const gl=DB.goals.filter(g=>g.ownerId===my.id);
      return {html:gl.length?`<b>Your ${gl.length} goals:</b><br>${gl.map(g=>`• ${esc(g.title)} — ${g.progress}% (${g.status})`).join('<br>')}`:'No goals on record yet — worth raising in your next 1:1.',actions:[{label:'Open Performance',act:'nav',arg:'#/grow'}]};}
    /* learning due */
    if(/(course|learning|training).*(due|overdue|left)|due.*(course|training)|what courses/.test(q)){
      const due=DB.enrollments.filter(en=>en.employeeId===my.id&&en.progress<100);
      return {html:due.length?`<b>${due.length} course${due.length===1?'':'s'} to finish:</b><br>${due.slice(0,5).map(en=>{const c=courseOf(en.courseId);return `• ${esc(c.title)} — ${en.progress}%${en.due?', due '+rel(en.due):''}`;}).join('<br>')}`:'You\'re fully caught up on learning 🎓',actions:[{label:'Open Learning',act:'nav',arg:'#/learn'}]};}
    /* waiting on me */
    if(/waiting on me|my (inbox|approvals|tasks)|what.?s (pending|waiting)/.test(q)){
      const items=inboxFor(my.id);
      return {html:items.length?`<b>${items.length} thing${items.length===1?'':'s'} waiting on you:</b><br>${items.slice(0,5).map(i=>`${i.icon} ${esc(i.text)}`).join('<br>')}`:'Inbox zero — nothing needs you right now 🌤️',actions:[{label:'Go to Home',act:'nav',arg:'#/home'}]};}
    /* headcount */
    if(/headcount|how many (people|employees|staff)/.test(q))
      return {html:`<b>${activeEmps().length} people</b> at ${esc(COMPANY.name)} right now — ${DB.employees.filter(e=>e.status==='onboarding').length} onboarding, ${DB.reqs.filter(r=>r.status==='open').length} open requisitions.`,actions:canSee('insights')?[{label:'Open Insights',act:'nav',arg:'#/insights'}]:[]};
    /* flight risk */
    if(/flight risk|attrition risk|retention|who might leave/.test(q)){
      if(!isAdmin())return {html:'Retention signals are visible to People admins only — switch to the Admin persona to see them.'};
      const risks=DB.employees.filter(e=>e.status==='active').map(e=>({e,r:flightRisk(e)})).filter(x=>x.r.tier!=='low').sort((a,b)=>b.r.score-a.r.score).slice(0,4);
      return {html:`<b>Top retention signals</b> (rule-based, illustrative):<br>${risks.map(x=>`• ${esc(x.e.name)} — score ${x.r.score} (${esc(x.r.reasons[0]||'')})`).join('<br>')}`,actions:[{label:'See watchlist',act:'nav',arg:'#/insights'}]};}
    /* pulse / enps */
    if(/pulse|enps|engagement (score|results)|how.?s the (team|pulse|mood)/.test(q)){
      const sv=DB.surveys.find(s=>s.status==='live');
      if(!sv)return {html:'No live survey right now.'};
      const taken=sv.respondedIds.includes(my.id);
      if(myRole()==='employee')return {html:`The <b>${esc(sv.name)}</b> closes ${rel(sv.closes)}.${taken?' You\'ve already responded — thank you!':' Two minutes, fully anonymous.'}`,actions:taken?[]:[{label:'Take it now',act:'openSurvey',arg:sv.id}]};
      return {html:`<b>${esc(sv.name)}:</b> eNPS <b>${sv.enps}</b> (+4 vs March), participation ${pct(sv.respondedIds.length,sv.audience)}%. Strongest driver: Manager support (4.2). Watch item: Compensation fairness (3.4).`,actions:[{label:'Open Engagement',act:'nav',arg:'#/engage'}]};}
    /* draft a JD */
    let m=q.match(/(?:jd|job description)(?: for)?(?: an?)? (.+)/);
    if(/draft|write|create/.test(q)&&m){
      const role=cap(m[1].replace(/[?.!]/g,'').trim());
      const dept=/engineer|developer|firmware|robotic/.test(m[1])?'eng':/design/.test(m[1])?'design':/market/.test(m[1])?'mktg':/sale|account/.test(m[1])?'sales':/data|analyst/.test(m[1])?'data':/people|hr|recruit/.test(m[1])?'people':'ops';
      const band=bandFor('IC4',dept);
      return {html:`<b>${esc(role)} — ${esc(COMPANY.name)}</b><br><br><b>About us:</b> ${esc(COMPANY.tagline)}. We're ${activeEmps().length} people making home robotics genuinely useful.<br><br><b>What you'll do:</b><br>• Own meaningful pieces of the ${deptName(dept).toLowerCase()} roadmap end-to-end<br>• Partner across Product, Design and Engineering on the Home Hub platform<br>• Raise the bar on craft through reviews, docs and mentorship<br>• Talk to customers; let reality shape the work<br><br><b>What you'll bring:</b> 4+ years of relevant experience, strong collaboration instincts, and curiosity (it's our first company value).<br><br><b>Range:</b> ${fmtK(band[0])}–${fmtK(band[2])} + bonus + equity. ${esc(COMPANY.name)} is an equal-opportunity employer.<br><br><i>Copy it, tweak it, post it.</i>`,actions:canSee('recruit')?[{label:'Open a req',act:'openNewReq'}]:[]};}
    /* draft praise */
    m=raw.match(/praise (?:for )?([A-Za-z]+)/i);
    if(/praise/.test(q)&&m){
      const who=DB.employees.find(e=>e.status!=='terminated'&&e.name.toLowerCase().includes(m[1].toLowerCase()));
      if(who)return {html:`Good instinct — recognition lands best within days of the moment. I'll open the praise composer addressed to <b>${esc(who.name)}</b>; name the specific thing they did and tag a value.`,actions:[{label:'Praise '+esc(who.name.split(' ')[0]),act:'openPraise',arg:who.id}]};}
    /* benefits FAQs from KB */
    if(/401k|401\(k\)|match|retirement/.test(q))return {html:`<b>401(k):</b> Meridian matches <b>100% of your first 4%</b> — free money, immediately vested. Change contributions any time; updates apply the next pay period.`,actions:[{label:'Full article',act:'nav',arg:'#/help/KB-6'},{label:'My benefits',act:'nav',arg:'#/benefits'}]};
    if(/parental|maternity|paternity|baby/.test(q))return {html:`<b>Parental leave:</b> 16 weeks at 100% pay for all new parents, usable within 12 months of birth or adoption. Loop in People Ops ~60 days ahead and we'll build your coverage plan.`,actions:[{label:'Full article',act:'nav',arg:'#/help/KB-7'}]};
    if(/i-?9|e-?verify/.test(q))return {html:`<b>Form I-9:</b> bring one List A document (like a U.S. passport) OR one List B + one List C. Section 1 on day one, verification within 3 business days — we run E-Verify for all U.S. hires.`,actions:[{label:'Full article',act:'nav',arg:'#/help/KB-4'},{label:'I-9 course',act:'nav',arg:'#/learn/L-101'}]};
    /* who is X */
    m=raw.match(/who (?:is|'s) ([A-Za-z .'-]+)/i);
    if(m){const who=DB.employees.find(e=>e.status!=='terminated'&&e.name.toLowerCase().includes(m[1].trim().toLowerCase()));
      if(who){const mgr=emp(who.managerId);Assist.ctx={person:who};
        return {html:`<b>${esc(who.name)}</b> — ${esc(who.title)}, ${deptName(who.dept)} (${esc(who.location)}). ${tenure(who.hireDate)} at Meridian${mgr?', reports to '+esc(mgr.name):''}. Ask me a follow-up — "what team is she on?" works.`,actions:[{label:'View profile',act:'nav',arg:'#/people/'+who.id}],sources:[{label:'People directory',link:'#/people'}]};}}
    /* open roles */
    if(/open (req|role|job|position)|hiring|we hiring/.test(q)){const open=DB.reqs.filter(r=>r.status==='open');
      return {html:`<b>${open.length} open roles:</b><br>${open.slice(0,6).map(r=>`• ${esc(r.title)} — ${deptName(r.dept)}, ${esc(r.loc)}`).join('<br>')}${open.length>6?'<br>…and more':''}`,actions:canSee('recruit')?[{label:'Open Recruiting',act:'nav',arg:'#/recruit'}]:[]};}
    /* workspace suite */
    if(/unread|new messages?|chat|slack/.test(q)){
      const un=(DB.chatMsgs||[]).filter(ms=>ms.at===todayISO()&&ms.fromId!==my.id&&(DB.channels||[]).some(c=>c.id===ms.ch&&chanVisible(c))).length;
      return {html:`You have <b>${un}</b> new message${un===1?'':'s'} today across your channels and DMs.`,actions:[{label:'Open Messages',act:'nav',arg:'#/chat'}]};}
    if(/calendar|meeting.{0,8}today|schedule today|what.?s? (on )?today/.test(q)){
      const evs=weekEventsFor(todayISO());
      return {html:evs.length?`<b>Today's calendar:</b><br>${evs.map(ev=>`• ${ev.time} — ${esc(ev.title)}${ev.meet?' 🎥':''}`).join('<br>')}`:'Nothing on your calendar today — protect that focus time 🎉',actions:[{label:'Open Calendar',act:'nav',arg:'#/cal'}]};}
    if(/where('| i)?s|find/.test(q)&&/handbook|press kit|template|deck/.test(q)){
      const f=(DB.files||[]).filter(fileVisible).find(x=>x.kind!=='folder'&&x.name.toLowerCase().includes(q.match(/handbook|press kit|template|deck/)[0].split(' ')[0]));
      if(f)return {html:`Found it in Drive: <b>${esc(f.name)}</b> (${esc((emp(f.ownerId)||{}).name||'')}, updated ${rel(f.updatedAt)}).`,actions:[{label:'Open in Drive',act:'drivePreview',arg:f.id}]};}
    /* KB keyword fallback */
    const words=q.replace(/[^a-z0-9 ]/g,'').split(/\s+/).filter(w=>w.length>3);
    if(words.length){
      const scored=DB.kb.map(k=>({k,s:words.filter(w=>(k.title+' '+k.body).toLowerCase().includes(w)).length})).filter(x=>x.s>0).sort((a,b)=>b.s-a.s);
      if(scored.length){const hits=scored.slice(0,2);
        return {html:`Here's what our docs say:<br><br>“${esc(hits[0].k.body.split('. ').slice(0,2).join('. '))}.”`,
          actions:[{label:'Read full article',act:'nav',arg:'#/help/'+hits[0].k.id}],
          sources:hits.map(h=>({label:'KB: '+h.k.title,link:'#/help/'+h.k.id}))};}}
    return {html:`I didn't catch that one. I'm best at things like:<br>• “How much PTO do I have?”<br>• “Who's out next week?”<br>• “Draft a JD for a data analyst”<br>• “What's our parental leave?”<br>• “Who is Priya?”`,actions:[{label:'Browse Help Center',act:'nav',arg:'#/help'}]};
  },
  render(){
    const p=$('#assist-panel');
    if(!this.open){p.classList.remove('open');return;}
    p.innerHTML=`
      <div class="as-head">${logoSVG(26)}<div class="col" style="gap:0;flex:1"><b style="font-size:14px">Ask Mosaic</b><span class="tiny faint">grounded answers, with sources — across every module</span></div>
        <button class="iconbtn" data-act="assistBig" title="Expand" aria-label="Expand assistant">⤢</button>
        <button class="iconbtn" data-act="toggleAssist" aria-label="Close assistant">${I.x}</button></div>
      <div class="as-body" id="as-body">${this.hist.map(msg=>`<div class="as-msg ${msg.who}">${msg.html}</div>
        ${msg.actions&&msg.actions.length?`<div class="as-actions">${msg.actions.map(a=>`<button class="btn xs soft" data-act="${a.act}" ${a.arg?`data-arg="${a.arg}"`:''}>${a.label}</button>`).join('')}</div>`:''}
        ${msg.sources&&msg.sources.length?`<div class="as-sources"><span class="tiny faint" style="align-self:center">Sources:</span>${msg.sources.map((s,i)=>`<span class="chip" data-act="nav" data-arg="${s.link}">[${i+1}] ${esc(s.label)}</span>`).join('')}</div>`:''}`).join('')}</div>
      <div class="as-chips">${this.chips().map(c=>`<span class="chip" data-act="assistChip" data-arg="${esc(c)}">${esc(c)}</span>`).join('')}</div>
      <div class="as-foot"><input id="as-input" placeholder="Ask anything about work here…" autocomplete="off" onkeydown="if(event.key==='Enter')ACT.assistSend()">
        <button class="btn primary" data-act="assistSend" style="padding:9px 13px">${I.send}</button></div>
      <div class="as-note">Rule-based demo assistant · production version would plug in the Claude API</div>`;
    p.classList.add('open');
    const b=$('#as-body');if(b)b.scrollTop=b.scrollHeight;
    const inp=$('#as-input');if(inp)inp.focus();
  },
};

ACT.openProxy=tab=>{

  const t=tab||'person';
  UI.modal({title:'🎭 Proxy mode',sub:'See Mosaic exactly as someone else sees it — support, troubleshooting, permission debugging. Every proxied action is audit-logged to you.',body:`
    <div class="seg mb16"><button class="${t==='person'?'on':''}" data-act="openProxy" data-arg="person">A person</button><button class="${t==='group'?'on':''}" data-act="openProxy" data-arg="group">A security group</button></div>

      <div id="px-list" style="max-height:300px;overflow-y:auto">${proxyRows('')}</div>`
    :`<div style="max-height:340px;overflow-y:auto">${DB.groups.map(g=>{
        const n=g.members==='*'?'everyone':g.membersRule==='managers'?DB.employees.filter(e=>reportsOf(e.id).length&&e.status==='active').length+' managers':g.members.length+' members';
        return `<button class="pp-row" data-act="proxyGroup" data-arg="${g.id}"><span style="font-size:17px">🛡️</span><span class="col" style="gap:0;flex:1"><b class="small">${esc(g.name)}</b><span class="tiny faint">${n} · modules: ${g.modules&&g.modules.length?g.modules.join(', '):'none (capabilities only)'}</span></span></button>`;}).join('')}</div>`}`});
};
ACT.proxyAs=eid=>{
  const by={byId:DB.me.proxy?DB.me.proxy.byId:DB.me.employeeId,byName:DB.me.proxy?DB.me.proxy.byName:me().name};
  DB.audit.unshift({at:todayISO(),actorId:by.byId,action:'Proxy started',detail:'Viewing as '+((emp(eid)||{}).name||eid)});
  DB.me={employeeId:eid,role:roleOfEmp(eid),proxy:Object.assign({kind:'person'},by)};
  Store.save();UI.closeModal();nav('#/home');render();
  UI.toast(`🎭 Now viewing as <b>${esc(me().name)}</b> — exit from the banner any time`,'🎭');
};
ACT.proxyGroup=gid=>{
  const g=byId(DB.groups,gid);if(!g)return;
  const rep=g.members==='*'?'E030':g.membersRule==='managers'?'E010':(g.members[0]||'E030');
  const by={byId:DB.me.proxy?DB.me.proxy.byId:DB.me.employeeId,byName:DB.me.proxy?DB.me.proxy.byName:me().name};
  DB.audit.unshift({at:todayISO(),actorId:by.byId,action:'Group preview started',detail:g.name});
  DB.me={employeeId:rep,role:roleOfEmp(rep),proxy:Object.assign({kind:'group',label:g.name},by),groupOnly:gid};
  Store.save();UI.closeModal();nav('#/home');render();
  UI.toast(`🛡️ Previewing exactly what <b>${esc(g.name)}</b> grants — nothing more`,'🛡️');
};
ACT.exitProxy=()=>{
  const by=DB.me.proxy;
  DB.audit.unshift({at:todayISO(),actorId:(by&&by.byId)||'E007',action:'Proxy ended',detail:''});
  DB.me={employeeId:(by&&by.byId)||'E007',role:roleOfEmp((by&&by.byId)||'E007')};
  Store.save();nav('#/home');render();UI.toast('Back to yourself 👋','🎭');
};

ACT.openModTab=mod=>{window.open(location.href.split('#')[0]+'#/'+mod,'_blank');UI.toast('Opened '+((modOf(mod)||{}).label||mod)+' in its own tab','↗️');};

/* ---- worker history: every event about one person, one timeline ---- */
function workerHistory(e){
  const ev=[];
  const P=(at,cat,icon,title,detail)=>{if(at)ev.push({at,cat,icon,title,detail:detail||''});};
  e.compHistory.forEach(h=>P(h.date,'job','💸',h.type+' — '+fmt$(h.base),h.note));
  P(e.hireDate,'job','🪪','Hired','as '+e.title.split(',')[0]);
  if(e.lastDay)P(todayISO(),'job','👋','Offboarding initiated','last day '+fmtD(e.lastDay));
  DB.timeoff.filter(t=>t.employeeId===e.id&&t.decidedAt).forEach(t=>P(t.decidedAt,'time','🏖️',TO_TYPES[t.type].label+' '+t.status,t.days+'d · '+fmtDshort(t.start)+'–'+fmtDshort(t.end)));
  (DB.leaves||[]).filter(l=>l.employeeId===e.id).forEach(l=>P(l.start,'time','🌿','Leave of absence ('+l.type+')','returns '+fmtDshort(l.expectedReturn)));
  DB.enrollments.filter(en=>en.employeeId===e.id&&en.completedAt).forEach(en=>{const c=courseOf(en.courseId);if(c)P(en.completedAt,'learn','🎓','Completed: '+c.title,en.score?en.score+'%':'');});
  DB.feedback.filter(f=>fbRecipients(f).includes(e.id)).forEach(f=>P(f.at,'cheer','🎉','Recognized by '+((emp(f.fromId)||{}).name||''),(f.pts?'+'+f.pts+' pts · ':'')+'“'+f.text.slice(0,60)+(f.text.length>60?'…':'')+'”'));
  (DB.envelopes||[]).forEach(env=>{const s=env.signers.find(x=>x.empId===e.id&&x.signedAt);if(s)P(s.signedAt,'process','✍️','Signed: '+env.title,env.id);});
  (DB.flows||[]).filter(f=>f.fields&&f.fields.workerId===e.id).forEach(f=>{const tpl=tplOf(f.templateId);P(f.createdAt,'process',tpl.icon,tpl.name+' — '+tpl.stages[f.stage],f.id+' · by '+((emp(f.requesterId)||{}).name||''));});
  DB.reviews.filter(r=>r.employeeId===e.id&&r.type==='manager'&&r.submittedAt&&r.rating).forEach(r=>{const cy=byId(DB.cycles,r.cycleId);P(r.submittedAt,'perf','📝','Review — '+r.rating+'★',cy?cy.name:'');});
  DB.audit.filter(a=>a.detail&&a.detail.includes(e.name)).slice(0,12).forEach(a=>P(a.at,'process','🧾',a.action,a.detail));
  return ev.sort((a,b)=>String(b.at).localeCompare(String(a.at))).slice(0,60);
}

/* ============================================================
   RECOGNITION ECONOMY — Bonusly-style points, reactions, redemption
   ============================================================ */
const PTS_ALLOWANCE=100;
const allowance=()=>((DB&&DB.cheersAllowance)||PTS_ALLOWANCE);
const REWARDS=[{id:'rw1',name:'$10 coffee card',pts:100,icon:'☕'},{id:'rw2',name:'$25 gift card',pts:250,icon:'🎁'},{id:'rw3',name:'Charity donation $25',pts:250,icon:'💝'},{id:'rw4',name:'Half-day Friday pass',pts:400,icon:'🌴'},{id:'rw5',name:'Meridian robot swag kit',pts:300,icon:'🤖'}];
const allRewards=()=>REWARDS.concat((DB&&DB.customRewards)||[]);
const fbRecipients=f=>f.recipients||(f.toId?[f.toId]:[]);
const monthStart=()=>iso(new Date(now().getFullYear(),now().getMonth(),1));
const ptsGiven=eid=>{let t=0;DB.feedback.forEach(f=>{const n=fbRecipients(f).length||1;
  if(f.fromId===eid&&f.at>=monthStart())t+=(f.pts||0)*n;
  (f.boosts||[]).forEach(b=>{if(b.by===eid&&b.at>=monthStart())t+=b.pts*n;});});return t;};
const ptsLeft=eid=>Math.max(0,allowance()-ptsGiven(eid));
const ptsEarned=eid=>{let t=0;DB.feedback.forEach(f=>{if(!fbRecipients(f).includes(eid))return;
  t+=(f.pts||0);(f.boosts||[]).forEach(b=>t+=b.pts);});
  return t-sum((DB.redemptions||[]).filter(r=>r.employeeId===eid).map(r=>r.pts));};
ACT.react=arg=>{
  const [fid,emo]=arg.split('|');
  const f=byId(DB.feedback,fid);if(!f)return;
  f.reactions=f.reactions||{};f.reactions[emo]=(f.reactions[emo]||0)+1;
  Store.save();render();
};

    <td onclick="event.stopPropagation()"><select onchange="ACT.assignCase('${c.id}|'+this.value)" style="background:var(--bg);border:1px solid var(--line);border-radius:7px;padding:3px 6px;font-size:11.5px;max-width:120px"><option value="">Unassigned</option>${peopleTeam.map(id=>{const p=emp(id);return p?`<option value="${id}" ${id===c.assigneeId?'selected':''}>${esc(p.name.split(' ')[0])}</option>`:'';}).join('')}</select></td>

window.filterAP=()=>{

  $('#ap-rows').innerHTML=apRows(DB.cases.filter(c=>{

ACT.apExport=()=>{

ACT.caseMerge=arg=>{
  const [src,dest]=arg.split('|');if(!dest)return;
  const a2=byId(DB.cases,src),b2=byId(DB.cases,dest);if(!a2||!b2)return;
  b2.messages.push({at:todayISO(),fromId:DB.me.employeeId,text:'— Merged in from '+a2.id+' (“'+a2.subject+'”) —',isInternal:true});
  a2.messages.forEach(m=>b2.messages.push(m));
  a2.status='solved';a2.mergedInto=dest;a2.csat=null;
  audit('Cases merged',a2.id+' → '+b2.id);
  Store.save();UI.closeDrawer();render();
  UI.toast(a2.id+' merged into '+b2.id+' — requester threads combined','🧬');
};
ACT.caseReopen=cid=>{

};
ACT.assignCase=arg=>{const [cid,who]=arg.split('|');const c=byId(DB.cases,cid);if(!c)return;

ACT.casePriority=arg=>{const [cid,p]=arg.split('|');const c=byId(DB.cases,cid);if(!c)return;

const nowTime=()=>{const d=now();let h=d.getHours();const m=String(d.getMinutes()).padStart(2,'0');const ap=h>=12?'PM':'AM';h=h%12||12;return h+':'+m+' '+ap;};
const timeToMin=t=>{if(!t)return 9*60;const ap=/PM/i.test(t)&&!/^12/.test(t)?720:(/AM/i.test(t)&&/^12/.test(t)?-720:0);const[m1,m2]=t.replace(/\s?[AP]M/i,'').split(':');return (+m1)*60+(+m2||0)+ap;};
const deptScopeOk=scope=>scope==='*'||me().dept===scope||isAdmin()||(scope==='people'&&hasCap('hr-admin'));

/* ---------------- MESSAGES (Slack tier) ---------------- */
const chanVisible=c=>c.dm?c.dm.includes(DB.me.employeeId):deptScopeOk(c.scope);
const dmOther=c=>emp(c.dm.find(id=>id!==DB.me.employeeId))||emp(c.dm[0]);
const chMsgs=ch=>DB.chatMsgs.filter(m=>m.ch===ch&&!m.parentId);
const threadOf=mid=>DB.chatMsgs.filter(m=>m.parentId===mid);
const chUnread=ch=>{const seen=((DB.chatRead||{})[DB.me.employeeId]||{})[ch]||0;return Math.max(0,DB.chatMsgs.filter(m=>m.ch===ch).length-seen);};
const statusOf=eid=>(DB.statuses||{})[eid];
function renderMsgText(t){
  let h=esc(t);
  h=h.replace(/@([A-Za-z]+)/g,(full,name)=>{
    const hit=DB.employees.find(e=>e.status!=='terminated'&&e.name.toLowerCase().split(' ').some(w=>w.startsWith(name.toLowerCase())));
    return hit?`<span class="mention">@${esc(hit.name.split(' ')[0])}</span>`:full;});
  return h;
}
function mentionNotify(text,ch){
  uniq([...text.matchAll(/@([A-Za-z]+)/g)].map(x=>x[1].toLowerCase())).forEach(nm=>{
    const hit=DB.employees.find(e=>e.status!=='terminated'&&e.id!==DB.me.employeeId&&e.name.toLowerCase().split(' ').some(w=>w.startsWith(nm)));
    if(hit)notify(hit.id,'💬',`${me().name} mentioned you in ${ch.dm?'a DM':'#'+ch.name}`,'#/chat/'+ch.id);
  });
}

      <span class="m-acts">

    <div class="m-reacts">${Object.entries(m.reactions||{}).map(([emo,n])=>`<span class="chip" data-act="chatReact" data-arg="${m.id}|${emo}">${emo} ${n}</span>`).join('')}

/* ---------------- MAIL (Gmail tier) ---------------- */
const mailMine=()=>{
  const mine=DB.mail.filter(m=>m.ownerId===DB.me.employeeId);
  let woke=false;
  mine.forEach(m=>{if(m.folder==='snoozed'&&m.snoozeUntil&&m.snoozeUntil<=todayISO()){m.folder='inbox';m.read=false;m.snoozeUntil=null;woke=true;}});
  if(woke)Store.save();
  return mine;
};
const threadMsgs=tid=>DB.mail.filter(m=>m.ownerId===DB.me.employeeId&&m.threadId===tid).sort((a,b)=>a.at.localeCompare(b.at));
function mailThreads(folder){
  const mine=mailMine().filter(m=>!m.draft);
  const groups={};
  mine.forEach(m=>{(groups[m.threadId]=groups[m.threadId]||[]).push(m);});
  return Object.values(groups).map(msgs=>{
    msgs.sort((a,b)=>a.at.localeCompare(b.at));
    const latest=msgs[msgs.length-1];
    return {tid:latest.threadId,msgs,latest,unread:msgs.some(m=>!m.read&&m.folder==='inbox'),starred:msgs.some(m=>m.starred),labels:uniq(msgs.flatMap(m=>m.labels||[])),attach:msgs.some(m=>m.attach&&m.attach.length)};
  }).filter(t=>{
    if(folder==='starred')return t.starred;
    return t.msgs.some(m=>m.folder===folder);
  }).sort((a,b)=>b.latest.at.localeCompare(a.latest.at));
}

      <div class="divider"></div><p class="tiny faint" style="padding:0 10px">⌨️ In a thread: <b>e</b> archive · <b>s</b> star · <b>u</b> back</p></div>
    ${open?mailThreadView(open):folder==='drafts'?`
      <div>${drafts.length?drafts.map(d=>`<div class="mail-row" data-act="mailDraftOpen" data-arg="${d.id}">
        <span></span><span class="star">📝</span><span class="m-from" style="color:var(--bad)">Draft</span>

        <span class="tiny faint num">${rel(d.at)}</span></div>`).join(''):'<div class="empty" style="padding:60px"><div class="big">📝</div>No drafts.</div>'}</div>`
    :`<div>
      <div class="bulk-bar">
        <input type="checkbox" ${UIS.mailSel.length&&UIS.mailSel.length===threads.length?'checked':''} onchange="ACT.mailSelAll()" title="Select all" style="width:15px;height:15px;accent-color:#e25141">
        ${UIS.mailSel.length?`
          <span class="tiny" style="font-weight:700">${UIS.mailSel.length} selected</span>
          <button class="btn xs ghost" data-act="mailBulk" data-arg="archive">🗄️ Archive</button>

        <span class="spacer"></span><span class="tiny faint">${threads.length} thread${threads.length===1?'':'s'}</span></div>
      ${threads.length?threads.map(t=>{

        const froms=uniq(t.msgs.map(x=>x.fromName.split(' ')[0]));
        return `<div class="mail-row ${t.unread?'unread':''}" data-act="nav" data-arg="#/mail/${t.tid}">

        <span class="m-from">${esc(froms.slice(0,2).join(', '))}${t.msgs.length>1?` <span class="faint">(${t.msgs.length})</span>`:''}</span>

ACT.mailSelAll=()=>{const threads=mailThreads(UIS.mailFolder||'inbox');UIS.mailSel=UIS.mailSel&&UIS.mailSel.length===threads.length?[]:threads.map(t=>t.tid);render();};
ACT.mailBulk=arg=>{
  const [action,lid]=arg.split('|');
  const sel=[...(UIS.mailSel||[])];if(!sel.length)return;
  sel.forEach(tid=>{const msgs=threadMsgs(tid);
    if(action==='archive')msgs.forEach(m=>{if(m.folder==='inbox')m.folder='archive';});
    else if(action==='trash')msgs.forEach(m=>m.folder='trash');
    else if(action==='read')msgs.forEach(m=>m.read=true);
    else if(action==='label')msgs.forEach(m=>{m.labels=m.labels||[];if(!m.labels.includes(lid))m.labels.push(lid);});});
  UIS.mailSel=[];Store.save();render();
  UI.toast(sel.length+' thread'+(sel.length===1?'':'s')+' — '+(action==='label'?'labeled':action+'d'),'📨');
};
ACT.mailStar=tid=>{const msgs=threadMsgs(tid);if(!msgs.length)return;const on=msgs.some(m=>m.starred);msgs.forEach(m=>m.starred=false);if(!on)msgs[msgs.length-1].starred=true;Store.save();render();};
ACT.mailArchive=tid=>{
  const prev=threadMsgs(tid).filter(m=>m.folder!=='sent').map(m=>({m,f:m.folder}));

ACT.mailSnooze=arg=>{

ACT.mailUnread=tid=>{threadMsgs(tid).forEach(m=>{if(m.folder==='inbox'||m.folder==='archive')m.read=false;});Store.save();nav('#/mail');};

ACT.mailLabelToggle=arg=>{

};

/* ---------------- CALENDAR ---------------- */
function weekEventsFor(dayISO){
  const my=me();const myId=my.id;
  const evs=[];
  const dow=new Date(dayISO+'T12:00:00').getDay();
  /* derived: engineering standup */
  if(dow>=1&&dow<=5&&(my.dept==='eng'||isAdmin()))evs.push({id:'std-'+dayISO,title:'Eng standup',time:'9:30',durMin:15,color:'#6366f1',kind:'meeting',meet:true,attendees:'eng'});
  /* derived: 1:1s (seeded with relative dates) */
  DB.ones.filter(o=>o.when===dayISO&&(o.managerId===myId||o.reportId===myId||isAdmin())).forEach(o=>{
    const a=emp(o.managerId),b=emp(o.reportId);
    evs.push({id:o.id,title:'1:1 — '+(a?a.name.split(' ')[0]:'')+' × '+(b?b.name.split(' ')[0]:''),time:String(timeToMin(o.time)/60|0)+':'+String(timeToMin(o.time)%60).padStart(2,'0'),durMin:30,color:'#8b5cf6',kind:'1:1',meet:true,attendees:[o.managerId,o.reportId]});
  });
  /* derived: interviews for my reqs */
  if(canSee('recruit')){
    DB.candidates.filter(c=>c.stage==='interview').slice(0,3).forEach((c,i)=>{
      const r=byId(DB.reqs,c.reqId);if(!r)return;
      if(dayISO===nextDow(3)&&(r.hmId===myId||isAdmin()))evs.push({id:'iv-'+c.id,title:'Interview · '+c.name,time:(13+i)+':00',durMin:50,color:'#f0648c',kind:'interview',meet:true,attendees:[r.hmId,'E022']});
    });
  }
  /* stored events (incl. weekly recurring) */
  const dow2=new Date(dayISO+'T12:00:00').getDay();
  (DB.events||[]).filter(ev=>ev.date===dayISO||(ev.weekly&&ev.date<=dayISO&&new Date(ev.date+'T12:00:00').getDay()===dow2)).forEach(ev=>{
    const att=ev.attendees;
    const mine=att==='*'||(typeof att==='string'?my.dept===att:att.includes(myId))||ev.organizer===myId||isAdmin();
    if(mine)evs.push(ev);
  });
  return evs.sort((a,b)=>timeToMin(a.time)-timeToMin(b.time));
}
const CAL_LAYERS=[['meeting','Meetings','#2d7ff0'],['1:1','1:1s','#8b5cf6'],['interview','Interviews','#f0648c'],['focus','Focus','#0891b2']];
const layerOn=k=>!(UIS.calOff||{})[k];
const calAnchor=()=>UIS.calAnchor||todayISO();
function calDays(){
  const mode=UIS.calMode||'week';
  const a=new Date(calAnchor()+'T12:00:00');
  if(mode==='day')return [iso(a)];
  const mon=new Date(a);mon.setDate(mon.getDate()-((mon.getDay()+6)%7));
  const n=UIS.calWeekend?7:5;
  return Array.from({length:n},(_,i)=>iso(new Date(mon.getTime()+i*DAY)));
}
function calAllDay(d){
  const out=[];
  const hol=DB.holidays.find(h=>h.date===d);if(hol)out.push({label:'🎉 '+hol.name,color:'var(--c-engage)'});
  whosOut(60).filter(t=>t.start<=d&&t.end>=d).slice(0,2).forEach(t=>out.push({label:initials(t.emp.name)+' · '+(TO_TYPES[t.type]||{label:t.type}).label,color:(TO_TYPES[t.type]||{}).color||'#64748b'}));
  return out;
}
function miniMonth(){
  const a=new Date(calAnchor()+'T12:00:00');
  const y=a.getFullYear(),mo=a.getMonth();
  const first=new Date(y,mo,1);const start=(first.getDay()+6)%7;
  const dim=new Date(y,mo+1,0).getDate();
  const evDates=new Set((DB.events||[]).map(ev=>ev.date).concat(DB.holidays.map(h=>h.date)));
  let cells='',day=1-start;
  let html='<tr>';
  for(let i=0;i<42;i++,day++){
    if(i&&i%7===0)html+='</tr><tr>';
    if(day<1||day>dim){html+='<td class="dim"></td>';continue;}
    const d=iso(new Date(y,mo,day,12));
    html+=`<td class="${d===todayISO()?'today':''} ${evDates.has(d)?'dot':''}" data-act="calGoto" data-arg="${d}">${day}</td>`;
  }
  html+='</tr>';
  return `<div class="mini-month card pad" style="padding:12px">
    <div class="row between mb8"><button class="iconbtn" style="width:20px;height:20px" data-act="calNav" data-arg="m-1">‹</button>
    <b class="tiny" style="font-size:12px">${a.toLocaleDateString('en-US',{month:'long',year:'numeric'})}</b>
    <button class="iconbtn" style="width:20px;height:20px" data-act="calNav" data-arg="m1">›</button></div>
    <table><tr>${['M','T','W','T','F','S','S'].map(d=>`<td style="font-weight:800;color:var(--ink3);cursor:default">${d}</td>`).join('')}</tr>${html}</table></div>`;
}
Views.cal=()=>{
  const mode=UIS.calMode||'week';
  const days=calDays();
  const H0=8,H1=18,ROW=44;
  const nowMin=now().getHours()*60+now().getMinutes();
  const evFor=d=>weekEventsFor(d).filter(ev=>layerOn(ev.kind||'meeting'));
  const a=new Date(calAnchor()+'T12:00:00');
  let main='';
  if(mode==='month'){
    const y=a.getFullYear(),mo=a.getMonth();
    const first=new Date(y,mo,1);const start=(first.getDay()+6)%7;
    const cells=[];
    for(let i=0;i<42;i++){const d=new Date(y,mo,1-start+i,12);cells.push({d:iso(d),dim:d.getMonth()!==mo});}
    main=`<div class="grid" style="grid-template-columns:repeat(7,1fr);gap:6px">
      ${['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map(d=>`<div class="tiny faint" style="text-align:center;font-weight:800">${d}</div>`).join('')}
      ${cells.map(c=>{const evs=c.dim?[]:evFor(c.d);const ad=c.dim?[]:calAllDay(c.d);
        return `<div class="cal-month-day ${c.d===todayISO()?'today':''} ${c.dim?'dim':''}" data-act="calDayOpen" data-arg="${c.d}">
        <b style="font-size:11px;color:var(--ink2)">${+c.d.slice(8)}</b>
        ${ad.slice(0,1).map(x=>`<div class="cm-ev" style="background:${x.color}">${esc(x.label)}</div>`).join('')}
        ${evs.slice(0,3).map(ev=>`<div class="cm-ev" style="background:${ev.color||'#2d7ff0'}">${ev.time} ${esc(ev.title)}</div>`).join('')}
        ${evs.length>3?`<div class="tiny faint">+${evs.length-3} more</div>`:''}</div>`;}).join('')}</div>`;
  }else{
    main=`<div class="cal-week" style="grid-template-columns:46px repeat(${days.length},1fr)">
    <div></div>
    ${days.map(d=>{const dt=new Date(d+'T12:00:00');
      return `<div class="cw-head ${d===todayISO()?'today':''}">${dt.toLocaleDateString('en-US',{weekday:'short'})}<br><span class="dnum">${dt.getDate()}</span>
      <div class="col" style="gap:2px;margin-top:3px">${calAllDay(d).map(x=>`<span class="ev" style="background:${x.color};border-radius:5px;font-size:9px;color:#fff;padding:0 4px;white-space:nowrap;overflow:hidden">${esc(x.label)}</span>`).join('')}</div></div>`;}).join('')}
    <div class="cw-times" style="border-top:1px solid var(--line)">${Array.from({length:H1-H0},(_,i)=>`<div>${H0+i>12?H0+i-12+'p':H0+i===12?'12p':H0+i+'a'}</div>`).join('')}</div>
    ${days.map(d=>{
      const evs=evFor(d);
      return `<div class="cw-col" style="border-top:1px solid var(--line)">
        ${Array.from({length:H1-H0},(_,hi)=>`<div class="cw-cell" data-act="newEventAt" data-arg="${d}|${H0+hi}" title="Create an event at ${H0+hi}:00" ondragover="if(window._calDrag)event.preventDefault()" ondrop="calDrop(event,'${d}',${H0+hi})"></div>`).join('')}
        ${d===todayISO()&&nowMin>H0*60&&nowMin<H1*60?`<div class="cw-now" style="top:${(nowMin-H0*60)/60*ROW}px"></div>`:''}
        ${evs.map(ev=>{const top=(timeToMin(ev.time)-H0*60)/60*ROW;const h=Math.max((ev.durMin||30)/60*ROW-3,18);
          if(top<0||top>(H1-H0)*ROW)return'';
          const movable=!!byId(DB.events||[],ev.id);
          return `<div class="cw-ev" style="top:${top}px;height:${h}px;background:${ev.color||'#2d7ff0'}" data-act="openEvent" data-arg="${ev.id}|${d}" title="${esc(ev.title)}${movable?' — drag to reschedule':''}" ${movable?`draggable="true" ondragstart="window._calDrag='${ev.id}';event.dataTransfer.effectAllowed='move'"`:''}>${esc(ev.title)}${h>30?`<div style="opacity:.85;font-weight:500">${ev.time}${ev.meet?' · 🎥':''}${ev.weekly?' · 🔁':''}</div>`:''}</div>`;}).join('')}
      </div>`;}).join('')}
  </div>`;
  }
  const title=mode==='month'?a.toLocaleDateString('en-US',{month:'long',year:'numeric'})
    :mode==='day'?fmtD(days[0],{weekday:'long',month:'long',day:'numeric'})
    :fmtD(days[0],{month:'long',day:'numeric'})+' – '+fmtD(days[days.length-1],{month:'long',day:'numeric',year:'numeric'});
  return `
  <div class="page-head"><div style="flex:1"><h1 class="page">Calendar</h1><div class="page-sub">1:1s, interviews, PTO and holidays flow in live — click any empty slot to create</div></div>
    ${parityBtn('cal')}
    <div class="seg">${['day','week','month'].map(mm=>`<button class="${mode===mm?'on':''}" data-act="calMode" data-arg="${mm}">${cap(mm)}</button>`).join('')}</div>
    <div class="row" style="gap:7px"><button class="btn sm ghost" data-act="calNav" data-arg="-1">‹</button>
    <button class="btn sm ghost" data-act="calNav" data-arg="0">Today</button>
    <button class="btn sm ghost" data-act="calNav" data-arg="1">›</button>
    <button class="btn primary" style="--brand:#2d7ff0;--brand-deep:#1d6ae0" data-act="openNewEvent">${I.plus} New event</button></div></div>
  <div class="row mb8 wrap" style="gap:8px"><b class="small">${title}</b>${days.includes(todayISO())||mode==='month'&&a.getMonth()===now().getMonth()?'<span class="badge b-info">Current</span>':''}
    <span class="spacer"></span>
    ${CAL_LAYERS.map(l=>`<span class="chip layer-chip ${layerOn(l[0])?'':'off'}" data-act="calLayer" data-arg="${l[0]}"><i class="lbl-dot" style="background:${l[2]}"></i>${l[1]}</span>`).join('')}
    <span class="chip layer-chip ${UIS.calWeekend?'':'off'}" data-act="calWeekendToggle">Sat–Sun</span>
    <span class="tiny faint">GMT-7</span></div>
  <div class="grid cal-layout" style="grid-template-columns:200px 1fr;gap:16px;align-items:start">
    <div class="col cal-side" style="gap:12px">${miniMonth()}
      <div class="card pad" style="padding:12px"><b class="tiny" style="font-size:12px">Up next</b>
        <div class="col mt8" style="gap:7px">${(()=>{let out=[];for(let i=0;i<7&&out.length<4;i++){const d=daysAhead(i);evFor(d).forEach(ev=>{if(out.length<4)out.push({...ev,d});});}
          return out.map(ev=>`<div class="row" style="gap:7px;cursor:pointer" data-act="openEvent" data-arg="${ev.id}|${ev.d}"><i class="lbl-dot" style="background:${ev.color||'#2d7ff0'}"></i><span class="col" style="gap:0"><b class="tiny" style="font-size:11.5px">${esc(ev.title)}</b><span class="tiny faint">${ev.d===todayISO()?'Today':fmtDshort(ev.d)} · ${ev.time}</span></span></div>`).join('')||'<span class="tiny faint">Clear week ahead.</span>';})()}</div></div>
    </div>
    <div class="cal-scroll">${main}</div>
  </div>`;
};

ACT.calNav=arg=>{
  if(arg==='0'){UIS.calAnchor=todayISO();render();return;}
  const mode=arg.startsWith('m')?'month':(UIS.calMode||'week');
  const dir=+(arg.replace('m',''));
  const a=new Date(calAnchor()+'T12:00:00');
  if(mode==='month')a.setMonth(a.getMonth()+dir);
  else if(mode==='day')a.setDate(a.getDate()+dir);
  else a.setDate(a.getDate()+dir*7);
  UIS.calAnchor=iso(a);render();
};

ACT.icsExport=arg=>{

  const [h,m]=ev.time.split(':').map(Number);
  const pad2=n=>String(n).padStart(2,'0');
  const dt=d.replace(/-/g,'');
  const endMin=h*60+m+(ev.durMin||30);
  const ics=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Mosaic//Meridian Labs//EN','BEGIN:VEVENT',
    'UID:'+id+'@mosaic.meridianlabs.com','DTSTART:'+dt+'T'+pad2(h)+pad2(m)+'00','DTEND:'+dt+'T'+pad2(Math.floor(endMin/60))+pad2(endMin%60)+'00',
    'SUMMARY:'+ev.title.replace(/[,;]/g,' '),'DESCRIPTION:Exported from Mosaic'+(ev.meet?' · meet.meridianlabs.com/'+id.toLowerCase():''),
    'END:VEVENT','END:VCALENDAR'].join('\r\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([ics],{type:'text/calendar'}));a.download=deslug(ev.title).replace(/ /g,'-')+'.ics';a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),4000);

window.neConflicts=()=>{
  const el=$('#ne-conf');if(!el)return;
  const date=$('#ne-date').value,t=$('#ne-time').value,dur=+$('#ne-dur').value||30;
  const who=[...$('#ne-who').selectedOptions].map(o=>o.value);
  if(!who.length){el.innerHTML='';return;}
  const start=timeToMin(t),end=start+dur;
  let conflicted=[];
  who.forEach(idw=>{
    const busy=(DB.events||[]).some(ev=>{
      if(ev.date!==date)return false;
      const att=ev.attendees==='*'||(typeof ev.attendees==='string'?(emp(idw)||{}).dept===ev.attendees:ev.attendees.includes(idw));
      if(!att)return false;
      const s2=timeToMin(ev.time),e2=s2+(ev.durMin||30);
      return s2<end&&e2>start;})
      ||DB.ones.some(o=>(o.managerId===idw||o.reportId===idw)&&o.when===date&&Math.abs(timeToMin(o.time)-start)<dur);
    if(busy)conflicted.push((emp(idw)||{}).name);
  });
  el.innerHTML=conflicted.length?`<span class="tiny" style="color:var(--warn);font-weight:700">⚠️ Busy then: ${conflicted.map(esc).join(', ')} — find-a-time suggests shifting an hour.</span>`:'<span class="tiny" style="color:var(--ok);font-weight:650">✓ Everyone looks free.</span>';
};

/* ---------------- DRIVE (Google Drive tier) ---------------- */
const FILE_ICON={folder:'📁',doc:'📄',sheet:'📊',slide:'📽️',pdf:'📕',img:'🖼️',video:'🎬'};
const fileVisible=f=>!f.trashed&&(f.scope==='private'?(f.ownerId===DB.me.employeeId||isAdmin()):deptScopeOk(f.scope));
const scopeLabel=s=>s==='*'?'🌐 Everyone':s==='private'?'🔒 Only owner':'🔒 '+deptName(s);
function driveItems(view,cur,q){
  const myId=DB.me.employeeId;
  const all=DB.files;
  if(q){const ql=q.toLowerCase();return all.filter(f=>fileVisible(f)&&f.name.toLowerCase().includes(ql));}
  switch(view){
    case 'recent':return all.filter(f=>fileVisible(f)&&f.kind!=='folder').sort((a,b)=>b.updatedAt.localeCompare(a.updatedAt)).slice(0,14);
    case 'starred':return all.filter(f=>fileVisible(f)&&f.starred);
    case 'shared':return all.filter(f=>fileVisible(f)&&f.ownerId!==myId&&f.scope!=='private');
    case 'trash':return all.filter(f=>f.trashed&&(f.ownerId===myId||isAdmin()));
    default:return all.filter(f=>f.parent===(cur?cur.id:null)&&fileVisible(f));
  }
}
function driveSorted(items){
  const s=UIS.driveSort||'modified';
  return [...items].sort((a,b)=>(a.kind==='folder'?0:1)-(b.kind==='folder'?0:1)||(s==='name'?a.name.localeCompare(b.name):b.updatedAt.localeCompare(a.updatedAt)));
}
Views.drive=param=>{
  const cur=param&&param!=='root'?byId(DB.files,param):null;
  if(cur&&!fileVisible(cur))return '<div class="card pad empty"><div class="big">🔒</div>This folder is scoped to '+deptName(cur.scope)+'.</div>';
  const view=cur?'my':(UIS.driveView||'my');
  const q=UIS.driveQ||'';
  const items=driveSorted(driveItems(view,cur,q));
  const layout=UIS.driveLayout||'list';
  const crumbs=[];let p=cur;while(p){crumbs.unshift(p);p=p.parent?byId(DB.files,p.parent):null;}
  const usedMB=sum(DB.files.filter(f=>!f.trashed).map(f=>{const m=/([\d.]+)\s?MB/.exec(f.size||'');const k=/([\d.]+)\s?KB/.exec(f.size||'');return m?+m[1]:k?+k[1]/1024:0;}))+1400;
  const views=[['my','🗂️ My Drive'],['recent','🕘 Recent'],['starred','⭐ Starred'],['shared','👥 Shared with me'],['trash','🗑️ Trash']];
  const recent=driveItems('recent').slice(0,4);
  const itemHtml=f=>{
    const openAct=f.trashed?'fileActions':(f.kind==='folder'?'nav':'drivePreview');
    const openArg=f.trashed?f.id:(f.kind==='folder'?'#/drive/'+f.id:f.id);
    if(layout==='grid')return `<div class="dr-card" data-act="${openAct}" data-arg="${openArg}">
      <button class="iconbtn dr-kebab" data-act="fileActions" data-arg="${f.id}" onclick="event.stopPropagation()">⋮</button>
      <div class="big-ic">${FILE_ICON[f.kind]||'📄'}</div>
      <b class="tiny" style="font-size:12px;display:block;margin-top:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${f.starred?'⭐ ':''}${esc(f.name)}</b>
      <span class="tiny faint">${f.kind==='folder'?DB.files.filter(x=>x.parent===f.id&&!x.trashed).length+' items':rel(f.updatedAt)}</span></div>`;
    return `<div class="dr-row" data-act="${openAct}" data-arg="${openArg}">
      <span class="dr-ic">${FILE_ICON[f.kind]||'📄'}</span>
      <span><b class="small">${f.starred?'⭐ ':''}${esc(f.name)}</b>${f.scope!=='*'?` <span title="${scopeLabel(f.scope)}">🔒</span>`:''}</span>
      <span class="muted dr-extra">${esc((emp(f.ownerId)||{}).name||'—')}</span>
      <span class="muted dr-extra">${rel(f.updatedAt)}</span>
      <span class="row" style="gap:4px;justify-content:flex-end"><span class="tiny faint num">${f.size||(f.kind==='folder'?DB.files.filter(x=>x.parent===f.id&&!x.trashed).length+' items':'')}</span>
      <button class="iconbtn dr-kebab" data-act="fileActions" data-arg="${f.id}" onclick="event.stopPropagation()">⋮</button></span></div>`;
  };
  return `
  <div class="page-head"><div style="flex:1"><h1 class="page">Drive</h1><div class="page-sub">Folders, sharing, stars, trash — with the same department security as everything else</div></div>
    ${parityBtn('drive')}
    <button class="btn ghost" data-act="driveNewFolder">${I.plus} Folder</button>
    <button class="btn ghost" data-act="driveNew" data-arg="doc">${I.plus} Doc</button>
    <button class="btn primary" style="--brand:#1fa463;--brand-deep:#178a52" data-act="driveNew" data-arg="upload">⬆️ Upload</button></div>
  <div class="row wrap mb12" style="gap:8px">
    ${views.map(v=>`<button class="space-pill ${view===v[0]&&!q?'on':''}" style="${view===v[0]&&!q?'border-color:#1fa463;color:#1fa463;background:color-mix(in srgb,#1fa463 8%,var(--card))':''}" data-act="driveView" data-arg="${v[0]}">${v[1]}</button>`).join('')}
    <span class="spacer"></span>
    <span class="col" style="gap:3px;min-width:150px"><span class="tiny faint num">${(usedMB/1024).toFixed(1)} GB of 15 GB</span><span class="storage-meter"><i style="width:${clamp(usedMB/15360*100,2,100)}%"></i></span></span></div>
  ${view==='my'&&!cur&&!q&&recent.length?`<div class="row wrap mb12" style="gap:10px">${recent.map(f=>`
    <button class="chip" style="padding:7px 12px" data-act="drivePreview" data-arg="${f.id}">${FILE_ICON[f.kind]} ${esc(f.name.length>26?f.name.slice(0,24)+'…':f.name)}</button>`).join('')}</div>`:''}
  <div class="card" ondragover="event.preventDefault();this.style.outline='2px dashed #1fa463';this.style.outlineOffset='-4px'" ondragleave="this.style.outline=''" ondrop="this.style.outline='';driveDrop(event)" title="Drop files from your computer to add them here">
    <div class="row" style="padding:11px 16px;border-bottom:1px solid var(--line);gap:10px;flex-wrap:wrap">
      ${view==='my'?`<span class="crumbs"><a href="#/drive" onclick="UIS.driveView='my'">My Drive</a>${crumbs.map(c=>`<span class="sep">›</span><a href="#/drive/${c.id}">${esc(c.name)}</a>`).join('')}</span>`
        :`<b class="small">${(views.find(v=>v[0]===view)||[])[1]||''}</b>`}
      ${cur&&cur.scope!=='*'?`<span class="badge b-vio">${scopeLabel(cur.scope)}</span>`:''}
      <span class="spacer"></span>
      <input type="search" placeholder="🔎 Search Drive…" value="${esc(q)}" oninput="UIS.driveQ=this.value;render()" style="background:var(--bg);border:1.5px solid var(--line);border-radius:9px;padding:6px 11px;outline:none;font-size:12.5px;width:190px">
      <select onchange="UIS.driveSort=this.value;render()" style="background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:5px 8px;font-size:12px"><option value="modified" ${(UIS.driveSort||'modified')==='modified'?'selected':''}>Modified</option><option value="name" ${UIS.driveSort==='name'?'selected':''}>Name</option></select>
      <div class="seg"><button class="${layout==='list'?'on':''}" data-act="driveLayout" data-arg="list">☰</button><button class="${layout==='grid'?'on':''}" data-act="driveLayout" data-arg="grid">▦</button></div></div>
    ${items.length?(layout==='grid'?`<div class="dr-grid">${items.map(itemHtml).join('')}</div>`:items.map(itemHtml).join(''))
    :`<div class="empty"><div class="big">${view==='trash'?'🗑️':'🗂️'}</div>${q?'No matches.':view==='trash'?'Trash is empty.':view==='shared'?'Nothing shared with you yet.':'Empty here.'}</div>`}
  </div>
  <p class="tiny faint mt8">Letters and Meet recordings file themselves here automatically. Production swap: Google Drive API behind this exact UI.</p>`;
};

ACT.fileRename=fid=>{const f=byId(DB.files,fid);if(!f)return;f.name=$('#fa-name').value.trim()||f.name;f.updatedAt=todayISO();Store.save();UI.closeModal();render();UI.toast('Renamed','✏️');};
ACT.fileMove=fid=>{const f=byId(DB.files,fid);if(!f)return;f.parent=$('#fa-move').value||null;f.updatedAt=todayISO();Store.save();UI.closeModal();render();UI.toast('Moved','📁');};
ACT.fileShare=fid=>{const f=byId(DB.files,fid);if(!f)return;f.scope=$('#fa-scope').value;audit('File sharing changed',f.name+' → '+f.scope);Store.save();UI.closeModal();render();UI.toast('Sharing updated — '+scopeLabel(f.scope),'🔐');};
ACT.fileStar=fid=>{const f=byId(DB.files,fid);if(!f)return;f.starred=!f.starred;Store.save();UI.closeModal();render();UI.toast(f.starred?'Starred':'Unstarred','⭐');};
ACT.fileTrash=fid=>{const f=byId(DB.files,fid);if(!f)return;f.trashed=true;
  const kids=DB.files.filter(x=>x.parent===fid);kids.forEach(k=>k.trashed=true);
  Store.save();UI.closeModal();render();
  UI.toast('Moved to trash'+(kids.length?' (with '+kids.length+' items inside)':''),'🗑️',{label:'Undo',fn:()=>{f.trashed=false;kids.forEach(k=>k.trashed=false);Store.save();render();}});};
ACT.fileRestore=fid=>{const f=byId(DB.files,fid);if(!f)return;f.trashed=false;DB.files.filter(x=>x.parent===fid).forEach(k=>k.trashed=false);Store.save();UI.closeModal();render();UI.toast('Restored','♻️');};
ACT.fileDeleteForever=fid=>{
  const i=DB.files.findIndex(x=>x.id===fid);if(i<0)return;
  const removed=DB.files.filter(x=>x.id===fid||x.parent===fid);
  DB.files=DB.files.filter(x=>x.id!==fid&&x.parent!==fid);
  Store.save();UI.closeModal();render();
  UI.toast('Deleted forever','💥',{label:'Undo',fn:()=>{DB.files.push(...removed);Store.save();render();}});
};

function meetStage(){
  const M=UIS.meetActive;
  const others=M.parts.map(emp).filter(Boolean);
  onMount(()=>{if(window._meetTimer)clearInterval(window._meetTimer);
    window._meetTimer=setInterval(()=>{const el=$('#meet-timer');if(!el){clearInterval(window._meetTimer);return;}
      const s=Math.floor((Date.now()-M.started)/1000);
      el.textContent=String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
      if(M.captions&&s%4===0){const cap=$('#meet-cap');if(cap){M.capIdx=((M.capIdx||0)+1)%CAPTIONS.length;cap.textContent=(others[0]?others[0].name.split(' ')[0]:'Speaker')+': '+CAPTIONS[M.capIdx];}}
    },1000);});
  const tile=(p,big)=>{
    const isMe=p.id===DB.me.employeeId;
    const bgIdx=isMe?(M.bg||0):0;
    const bgs=['','linear-gradient(135deg,#1e3a8a,#0e7490)','linear-gradient(135deg,#3b0764,#9d174d)','url() , linear-gradient(135deg,#14532d,#a16207)'];

      ${stageInner}
      <div class="meet-bar">
        <button class="meet-btn ${M.muted?'off':''}" data-act="meetMute" title="Mute">${M.muted?'🔇':'🎙️'}</button>
        <button class="meet-btn ${M.cam===false?'off':''}" data-act="meetCam" title="Camera">${M.cam===false?'🚫':'📷'}</button>
        <button class="meet-btn ${M.sharing?'off':''}" data-act="meetShare" title="Share screen">🖥️</button>
        <button class="meet-btn ${M.rec?'off':''}" data-act="meetRec" title="Record">⏺️</button>
        <button class="meet-btn ${M.raised[DB.me.employeeId]?'off':''}" data-act="meetHand" title="Raise hand">✋</button>
        ${['👏','❤️','😂','🎉'].map(e2=>`<button class="meet-btn" data-act="meetReact" data-arg="${e2}" title="React" style="width:40px;font-size:15px">${e2}</button>`).join('')}
        <button class="meet-btn" data-act="meetBg" title="Background">🪄</button>
        <button class="meet-btn ${M.captions?'':'off'}" data-act="meetCaptions" title="Captions" style="font-size:11px;font-weight:800">CC</button>
        <button class="meet-btn ${M.layout==='speaker'?'':'off'}" data-act="meetLayout" title="Layout">▦</button>
        <button class="meet-btn leave" data-act="meetLeave">Leave</button>
      </div>
    </div>
    <div class="meet-panel">
      <div class="mp-head"><button class="${M.panel!=='chat'?'on':''}" data-act="meetPanel" data-arg="parts">👥 People (${allP.length})</button>
      <button class="${M.panel==='chat'?'on':''}" data-act="meetPanel" data-arg="chat">💬 Chat${M.chat.length?' ('+M.chat.length+')':''}</button></div>
      <div class="mp-body" id="mp-body">${M.panel==='chat'?
        (M.chat.map(c2=>`<div style="margin-bottom:9px"><b style="font-size:11.5px">${esc(c2.from)}</b> <span style="opacity:.55;font-size:10px">${c2.t}</span><br>${esc(c2.text)}</div>`).join('')||'<span style="opacity:.5">Say hi — chat is call-only.</span>')
        :allP.map(p=>`<div class="row" style="gap:8px;margin-bottom:9px">${av(p,'sm')}<span class="col" style="gap:0;flex:1"><b style="font-size:12px">${p.id===DB.me.employeeId?'You':esc(p.name)}</b><span style="opacity:.55;font-size:10.5px">${p.id===DB.me.employeeId?(M.muted?'muted':'unmuted'):p.id===(others[1]||{}).id?'muted':'unmuted'}${M.raised[p.id]?' · ✋':''}</span></span>

ACT.meetSchedule=()=>{window._nePrefill={date:todayISO(),time:'15:00'};ACT.openNewEvent();};
ACT.meetJoin=title=>{
  const others=activeEmps().filter(e=>e.id!==DB.me.employeeId&&(me().dept===e.dept||e.managerId===me().managerId||me().id===e.managerId)).slice(0,String(title).includes('1:1')||String(title).includes('Huddle with')?1:4);
  UIS.meetActive={title:title||'Meeting',started:Date.now(),muted:false,cam:true,code:Math.random().toString(36).slice(2,8),parts:others.map(o=>o.id),chat:[],raised:{},sharing:false,rec:false,layout:'grid',bg:0,captions:false,panel:'parts'};

ACT.meetMute=()=>{UIS.meetActive.muted=!UIS.meetActive.muted;render();};
ACT.meetCam=()=>{UIS.meetActive.cam=UIS.meetActive.cam===false?true:false;render();};
ACT.meetShare=()=>{const M=UIS.meetActive;M.sharing=!M.sharing;render();UI.toast(M.sharing?'Presenting to everyone':'Stopped presenting','🖥️');};
ACT.meetRec=()=>{const M=UIS.meetActive;M.rec=!M.rec;render();UI.toast(M.rec?'Recording — participants see the consent banner':'Recording stopped','⏺️');};
ACT.meetHand=()=>{const M=UIS.meetActive;M.raised[DB.me.employeeId]=!M.raised[DB.me.employeeId];render();};
ACT.meetReact=emo=>{
  const stage=$('#meet-stage');if(!stage)return;
  const el=document.createElement('span');el.className='float-emoji';el.textContent=emo;
  el.style.left=(15+Math.random()*70)+'%';el.style.bottom='90px';
  stage.appendChild(el);setTimeout(()=>el.remove(),2400);
};
ACT.meetBg=()=>{const M=UIS.meetActive;M.bg=((M.bg||0)+1)%4;render();UI.toast(['Background off','Deep-sea blue','Galaxy purple','Forest gold'][M.bg],'🪄');};
ACT.meetCaptions=()=>{const M=UIS.meetActive;M.captions=!M.captions;M.capIdx=0;render();};
ACT.meetLayout=()=>{const M=UIS.meetActive;M.layout=M.layout==='speaker'?'grid':'speaker';render();};
ACT.meetPanel=p=>{UIS.meetActive.panel=p;render();setTimeout(()=>{const i=$('#meet-chat-in');if(i)i.focus();},80);};
ACT.meetChatSend=()=>{
  const i=$('#meet-chat-in');if(!i||!i.value.trim())return;
  const M=UIS.meetActive;
  M.chat.push({from:'You',t:nowTime(),text:i.value.trim()});
  if(M.chat.length===1&&M.parts.length){const o=emp(M.parts[0]);if(o)setTimeout(()=>{if(UIS.meetActive){UIS.meetActive.chat.push({from:o.name.split(' ')[0],t:nowTime(),text:'👍 noted!'});render();}},1800);}
  render();setTimeout(()=>{const x=$('#meet-chat-in');if(x)x.focus();},60);
};
ACT.meetLeave=()=>{
  const M=UIS.meetActive;
  const mins=Math.floor((Date.now()-M.started)/60000);
  if(window._meetTimer)clearInterval(window._meetTimer);
  if(M.rec){
    DB.files.push({id:uid('FI'),name:'Recording — '+M.title+' ('+fmtDshort(todayISO())+').mp4',kind:'video',parent:null,ownerId:DB.me.employeeId,scope:'private',updatedAt:todayISO(),size:rint(40,300)+' MB',starred:false});
    Store.save();
  }
  UIS.meetActive=null;render();
  UI.toast('Left after '+(mins||'<1')+' min'+(M.rec?' — 🎬 recording saved to Drive (private to you)':''),'👋');
};

/* ============================================================
   MOSAICSIGN — e-signatures with ESIGN/UETA structural rigor
   ============================================================ */
const envMyTurn=env=>{
  if(env.status!=='out')return null;
  const pend=env.signers.filter(s=>s.status==='pending');
  if(!pend.length)return null;
  const minOrder=Math.min(...pend.map(s=>s.order));
  return pend.find(s=>s.order===minOrder&&s.empId===DB.me.employeeId)||null;
};
const envVisible=env=>isAdmin()||env.createdBy===DB.me.employeeId||env.signers.some(s=>s.empId===DB.me.employeeId);
Views.sign=()=>{
  const mine=DB.envelopes.filter(envVisible);
  const waitingMe=mine.filter(e=>envMyTurn(e));
  const out=mine.filter(e=>e.status==='out'),done=mine.filter(e=>e.status==='completed');
  return `
  <div class="page-head"><div style="flex:1"><h1 class="page">MosaicSign</h1>
    <div class="page-sub">Consent · intent · attribution · tamper-evidence · audit trail — the five pillars of a defensible e-signature</div></div>
    <button class="btn primary" style="--brand:#d97706;--brand-deep:#b45309" data-act="signNew">${I.plus} New envelope</button></div>
  <div class="esign-box mb16">⚖️ <b>Compliance demo:</b> this module demonstrates the structural elements of ESIGN/UETA-defensible signing — recorded consent to do business electronically, explicit intent-to-sign, signer attribution, an immutable event trail, and a tamper-evident document hash. A production deployment additionally needs real identity verification, server-side sealing and counsel review.</div>
  <div class="grid g4 mb16">
    ${statCard('Awaiting you',waitingMe.length,waitingMe.length?'don\'t leave them hanging':'nothing to sign','#d97706')}
    ${statCard('Out for signature',out.length,'envelopes in flight','var(--c-time)')}
    ${statCard('Completed',done.length,'sealed with certificates','var(--c-pay)')}
    ${statCard('Avg turnaround','1.1d','send → sealed','var(--c-grow)')}
  </div>
  ${waitingMe.length?`<div class="card mb16" style="border-color:color-mix(in srgb,#d97706 40%,var(--line))">
    <div class="card-head"><h3>✍️ Awaiting your signature</h3></div>

ACT.signApply=()=>{

const tplOf=id=>WF_TEMPLATES.find(t=>t.id===id);
const flowNeedsMe=f=>{
  const tpl=tplOf(f.templateId);if(!tpl)return false;
  if(f.stage>=tpl.stages.length-1)return false;
  const st=tpl.stages[f.stage];
  const subjId=(f.fields&&f.fields.workerId)||f.requesterId;
  if(st==='Manager approval'){const subj=emp(subjId);return (subj&&subj.managerId===DB.me.employeeId)||isAdmin();}
  if(st==='Finance approval')return groupsOf(DB.me.employeeId).some(g=>g.id==='g-finance')||isAdmin();
  if(st==='HR approval')return hasCap('hr-admin');
  return f.assigneeId===DB.me.employeeId;
};
const flowCanAdvance=f=>{
  const tpl=tplOf(f.templateId);
  return isAdmin()||f.assigneeId===DB.me.employeeId||tpl.ownerIds.includes(DB.me.employeeId)||flowNeedsMe(f);
};

function flowsTimeline(){

  const flows=DB.flows.filter(f=>tplOf(f.templateId));
  if(!flows.length)return '<div class="card empty"><div class="big">📐</div>Nothing to chart yet.</div>';
  const endOf=f=>f.fields.needBy||f.fields.due||iso(new Date(new Date(f.createdAt).getTime()+21*DAY));
  let min=flows[0].createdAt,max=endOf(flows[0]);
  flows.forEach(f=>{if(f.createdAt<min)min=f.createdAt;const e2=endOf(f);if(e2>max)max=e2;});
  const span=Math.max(between(min,max),10);

  return `<div class="card pad">

      const tpl=tplOf(f.templateId);const last=tpl.stages.length-1;
      const l=clamp(between(min,f.createdAt)/span*100,0,98);
      const w=clamp(between(f.createdAt,endOf(f))/span*100,3,100-l);
      const pctDone=f.stage/last*100;
      return `<div class="row" style="gap:10px;padding:5px 0;cursor:pointer" data-act="flowOpen" data-arg="${f.id}">
        <span class="col" style="gap:0;width:230px;flex:none"><b class="tiny" style="font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${tpl.icon} ${esc(f.title)}</b>

ACT.flowSet=arg=>{
  const parts=arg.split('|');const f=byId(DB.flows,parts[0]);if(!f)return;
  const field=parts[1],val=parts.slice(2).join('|');
  if(field==='assignee'){f.assigneeId=val;notify(val,'⚡',`You were assigned: ${f.title}`,'#/flows');f.activity.push({at:todayISO(),by:me().name,text:'Reassigned to '+((emp(val)||{}).name||'')});}
  else if(field==='priority'){f.priority=val;f.activity.push({at:todayISO(),by:me().name,text:'Priority → '+val});}
  else if(field==='due'){f.fields.needBy=val;f.activity.push({at:todayISO(),by:me().name,text:'Due date → '+fmtDshort(val)});}
  Store.save();ACT.flowOpen(parts[0]);render();
};
ACT.subAdd=fid=>{
  const f=byId(DB.flows,fid);const inp=$('#wf-sub');if(!f||!inp||!inp.value.trim())return;

ACT.subToggle=arg=>{

ACT.flowMove=arg=>{
  const [fid,dir]=arg.split('|');
  const f=byId(DB.flows,fid);if(!f)return;
  const tpl=tplOf(f.templateId);const last=tpl.stages.length-1;
  if(!flowCanAdvance(f)){UI.toast('This stage isn\'t yours to move','🔒');return;}
  f.stage=clamp(f.stage+(+dir),0,last);
  const st=tpl.stages[f.stage];
  if(f.templateId==='purchase'&&st==='PO issued'&&!f.po){f.po='PO-2026-0'+rint(143,999);f.activity.push({at:todayISO(),by:me().name,text:'Finance approved — '+f.po+' issued'});}
  else if(f.templateId==='legal-contract'&&st==='Signature'&&!f.envelopeId){
    const env={id:'ENV-'+rint(110,999),title:f.title+' — for signature',docName:deslug(f.title).replace(/ /g,'-')+'.pdf',status:'out',createdBy:DB.me.employeeId,createdAt:todayISO(),message:'Routed automatically from Workflows.',
      signers:[{empId:DB.me.employeeId,name:me().name,email:me().email,order:1,status:'pending'},{empId:null,name:f.fields.counterparty||'Counterparty',email:'legal@counterparty.com',order:2,status:'pending'}],
      events:[{at:todayISO(),actor:'Workflows',action:'Envelope created',detail:'Auto-routed at Signature stage'}]};
    env.hash=envHash(env);DB.envelopes.unshift(env);f.envelopeId=env.id;
    f.activity.push({at:todayISO(),by:'Workflows',text:'Envelope '+env.id+' created in MosaicSign'});
  }else f.activity.push({at:todayISO(),by:me().name,text:(+dir>0?'Advanced to ':'Sent back to ')+st});
  if(f.stage===last&&tpl.bp&&+dir>0)applyBP(f);
  if(f.stage===last)notify(f.requesterId,tpl.icon,`${f.title} is done 🎉`,'#/flows');
  audit('Workflow '+(+dir>0?'advanced':'sent back'),f.id+' → '+st);
  Store.save();ACT.flowOpen(fid);render();
  UI.toast(f.stage===last?'Done — requester notified 🎉':st+(f.po&&st==='PO issued'?' · '+f.po:''),tpl.icon);
};

  DB.growth=DB.growth||{};

  const doneN=next?next[2].filter((_,i)=>mine[next[0]+'-'+i]).length:0;

        <div style="flex:1"><div class="row wrap" style="gap:8px"><b class="small">${l[1]}</b>${i===idx?'<span class="badge b-vio">You are here</span>':i===idx+1?'<span class="badge b-info">Next level</span>':''}</div>

      <div class="card pad"><b class="small">How promotion works here</b>
        <div class="col mt12" style="gap:9px">${[['1','Demonstrate the next level','consistently, for ~2 quarters'],['2','Evidence in reviews & goals','your packet builds itself'],['3','Calibration confirms','peers across teams agree'],['4','Promotion thread fires','pay, title, org — one motion']].map(s=>`
        <span class="row" style="gap:10px"><span style="width:22px;height:22px;border-radius:8px;background:var(--vio-soft);color:var(--c-grow);display:grid;place-items:center;font-size:11px;font-weight:800">${s[0]}</span>

function lessonsFor(c){
  return [
    {t:'Why this matters at Meridian',body:`${c.blurb}\n\nThis course exists because ${c.cat==='Compliance'?'getting this wrong carries real legal and human consequences — and getting it right is one of the quiet ways we take care of each other':c.cat==='Growth'?'the skills here compound: every conversation, review and decision gets a little better':'it makes the day-to-day work measurably smoother for you and your team'}.\n\nYou'll see real Meridian scenarios throughout — names changed, lessons kept.`},
    {t:'Core concepts',body:`The essentials, distilled:\n\n• ${(c.skills||['The fundamentals']).map(s=>s+' — what it looks like in practice, and the most common way it goes wrong.').join('\n• ')}\n\nEach concept pairs a principle with a Meridian-specific example, so it sticks to something real instead of floating as theory.`},
    {t:'In practice — a scenario',body:`A teammate pings you late on a Thursday with a situation that lands squarely in this course's territory.\n\nYou'll walk the decision step by step: what to check first, who to loop in, what to write down, and where the line is between "handle it" and "escalate it."\n\nSpoiler: the answer is almost never "improvise silently."`},
    {t:'Knowledge check',quiz:true},
  ];
}
function quizFor(c){
  const base=[
    {q:`What's the primary goal of “${c.title}”?`,opts:[c.blurb.split(/[.—]/)[0].trim(),'Maximizing meeting attendance','Reducing office snack costs','Memorizing the org chart'],a:0},
    {q:'Which capability does this course build?',opts:[(c.skills||['The fundamentals']).join(' + '),'Competitive juggling','Typing speed only','None — it\'s decorative'],a:0},
    {q:'When unsure how to apply this in a live situation, the right move is to…',opts:['Pause and ask — Ask People, your manager, or the relevant channel','Guess silently and hope','Wait for the annual review to find out','Delete the evidence'],a:0},
    {q:c.expires?`How often does “${c.title}” require recertification?`:'Where does your completion get recorded?',opts:[c.expires?'Every '+c.expires+' months — Mosaic re-assigns it automatically':'In your Mosaic learning record, instantly','Never anywhere','On a sticky note','By carrier pigeon'],a:0},
  ];
  /* rotate options so the right answer isn't always first */
  return base.map((qq,i)=>{const r=(i+1)%4;const opts=qq.opts.map((_,j)=>qq.opts[(j-r+4)%4]);return {q:qq.q,opts,a:(qq.a+r)%4};});
}
function playerView(){
  const P=UIS.player;const c=courseOf(P.cid);
  if(!c){UIS.player=null;return Views.learn(null);}
  const lessons=lessonsFor(c);

  return `
  <div class="row mb12" style="gap:10px"><button class="chip" data-act="exitPlayer">← Exit player</button>
    <b class="small">${CAT_EMOJI[c.cat]||'📘'} ${esc(c.title)}</b><span class="spacer"></span>
    <span class="tiny faint">${P.done.length} of ${lessons.length} sections done</span></div>
  <div class="player-wrap">
    <div class="player-side">
      <div class="nav-label" style="padding:4px 10px 8px">Course outline</div>
      ${lessons.map((l,i)=>`<button class="lesson-item ${i===P.lesson?'on':''} ${P.done.includes(i)?'done':''}" data-act="playerGo" data-arg="${i}">
        <span class="ldot">${P.done.includes(i)?'✓':i+1}</span>${l.quiz?'🏁 ':''}${l.t}</button>`).join('')}
      <div class="divider"></div>
      <div style="padding:0 10px">${progressBar(P.done.length/lessons.length*100,'var(--c-learn)')}</div>
    </div>
    <div class="player-main">
      ${cur.quiz?`
        <h2 style="font-family:var(--font-display);font-size:19px">Knowledge check</h2>
        <p class="small muted" style="margin:4px 0 18px">Pass mark: 3 of 4. ${P.quizResult!=null?'':'Take your time — you can retake it.'}</p>
        ${quiz.map((qq,qi)=>`<div class="mb16"><b class="small">${qi+1}. ${esc(qq.q)}</b>
          <div class="mt8">${qq.opts.map((o,oi)=>{
            const sel=(P.answers||{})[qi]===oi;
            const graded=P.quizResult!=null;
            const cls=graded?(oi===qq.a?'right':sel?'wrong':''):(sel?'sel':'');
            return `<button class="quiz-opt ${cls}" data-act="quizPick" data-arg="${qi}|${oi}">${esc(o)}</button>`;}).join('')}</div></div>`).join('')}
        ${P.quizResult!=null?`<div class="card pad" style="background:${P.quizResult>=3?'var(--ok-soft)':'var(--warn-soft)'};border-color:transparent;box-shadow:none">
          <b class="small">${P.quizResult>=3?'🎓 Passed — '+P.quizResult+'/4':'Not quite — '+P.quizResult+'/4'}</b>
          <span class="tiny muted" style="display:block;margin-top:2px">${P.quizResult>=3?'Your record updates instantly; certificates issue automatically where applicable.':'Review the highlighted answers and retake.'}</span></div>
          ${P.quizResult<3?`<button class="btn primary mt12" style="--brand:var(--c-learn);--brand-deep:#0f9486" data-act="quizRetake">Retake</button>`:''}`
        :`<button class="btn primary" style="--brand:var(--c-learn);--brand-deep:#0f9486" data-act="quizSubmit" ${answered<4?'disabled':''}>Submit answers${answered<4?' ('+answered+'/4)':''}</button>`}`
      :`
        <span class="chip" style="font-size:10.5px">${c.cat} · section ${P.lesson+1} of ${lessons.length}</span>
        <h2 style="font-family:var(--font-display);font-size:20px;margin-top:10px">${esc(cur.t)}</h2>
        <div class="mail-body mt12" style="max-width:640px">${esc(cur.body)}</div>

          ${P.lesson>0?`<button class="btn ghost" data-act="playerGo" data-arg="${P.lesson-1}">← Back</button>`:''}
          <button class="btn primary" style="--brand:var(--c-learn);--brand-deep:#0f9486" data-act="playerDone">${P.done.includes(P.lesson)?'Continue →':'Mark complete & continue →'}</button>
        </div>`}
    </div>
  </div>`;
}

ACT.quizSubmit=()=>{

  const quiz=quizFor(c);
  const score=quiz.filter((qq,qi)=>P.answers[qi]===qq.a).length;

    if(c.expires)en.certExpires=iso(new Date(Date.now()+c.expires*30.4*DAY));
    audit('Course completed',c.title+' · '+en.score+'% (player)');

/* #18 delight */
function confetti(n){
  if(matchMedia('(prefers-reduced-motion: reduce)').matches)return;
  const cols=['#6366f1','#f0648c','#14b8a6','#f59e0b','#22c55e','#8b5cf6'];
  for(let i=0;i<(n||60);i++){const c=document.createElement('span');c.className='confetti';
    c.style.left=Math.random()*100+'vw';c.style.background=pick(cols);
    c.style.animationDelay=(Math.random()*0.6)+'s';c.style.animationDuration=(2+Math.random()*1.4)+'s';
    document.body.appendChild(c);setTimeout(()=>c.remove(),4200);}
}
function countUpStats(){
  if(matchMedia('(prefers-reduced-motion: reduce)').matches)return;
  $$('#main .stat .val').forEach(el=>{
    const txt=el.textContent;const m2=txt.match(/^([^\d]*)([\d,]+)(.*)$/);if(!m2)return;
    const target=+m2[2].replace(/,/g,'');if(!isFinite(target)||target<=0||target>100000)return;
    const t0=performance.now();
    const step=t=>{const p=Math.min((t-t0)/450,1);el.textContent=m2[1]+Math.round(target*(0.3+0.7*p)).toLocaleString()+m2[3];if(p<1)requestAnimationFrame(step);};
    requestAnimationFrame(step);});
}

  document.addEventListener('keydown',window._spKey);
}

      ${expNeedsMe(x)?`<button class="btn sm good" data-act="expApprove" data-arg="${x.id}">${I.check} Approve${x.status==='finance'?' & reimburse':''}</button>

ACT.expLineAdd=()=>{expCapture();window._expLines.push({cat:'Meals',amt:'',note:''});expModal();};

function expBuild(status){
  expCapture();
  const lines=window._expLines.filter(l=>+l.amt>0).map(l=>({cat:l.cat,amt:Math.round(+l.amt*100)/100,note:l.note}));
  if(!lines.length){UI.toast('Add at least one line with an amount','🧾');return null;}
  const x={id:uid('EXP'),employeeId:DB.me.employeeId,title:window._expTitle||'Expense report',lines,total:Math.round(sum(lines.map(l=>l.amt))*100)/100,status,submittedAt:status==='draft'?null:todayISO(),receipts:1};
  DB.spend.expenses.unshift(x);
  return x;
}

ACT.expSubmitNew=()=>{

ACT.expSubmit=id=>{
  const x=byId(DB.spend.expenses,id);if(!x)return;
  x.status='manager';x.submittedAt=todayISO();
  const mgr=emp((emp(x.employeeId)||{}).managerId);

};
ACT.expApprove=id=>{
  const x=byId(DB.spend.expenses,id);if(!x)return;
  if(x.status==='manager'){x.status='finance';
    (byId(DB.groups,'g-finance')||{members:[]}).members.slice(0,1).forEach(fid=>notify(fid,'🧾',`Expense at Finance: ${x.title} — ${fmt$(x.total)}`,'#/spend/expenses'));
    UI.toast('Approved — routed to Finance','✅');}
  else if(x.status==='finance'){x.status='reimbursed';x.reimbursedAt=todayISO();
    notify(x.employeeId,'💸',`Reimbursed: ${x.title} — ${fmt$(x.total)} lands in your next payroll run`,'#/spend/expenses');
    UI.toast('Reimbursed — payroll picks it up next run','💸');}
  audit('Expense '+x.status,x.id);
  Store.save();render();
};
ACT.expReject=id=>{
  const x=byId(DB.spend.expenses,id);if(!x)return;
  const prev=x.status;x.status='draft';
  notify(x.employeeId,'↩️',`Expense sent back: ${x.title} — check the notes and resubmit`,'#/spend/expenses');
  Store.save();render();
  UI.toast('Sent back to draft','↩️',{label:'Undo',fn:()=>{x.status=prev;Store.save();render();}});
};

ACT.invAdvance=id=>{

ACT.invCSV=()=>{

const Tour={
  i:0,active:false,
  steps:[
    {center:true,title:'Welcome to Mosaic 🧩',text:'The technology that powers work — people, hiring, onboarding, learning, performance, time, pay, spend, comms and analytics. The point of this tour: showing it\'s truly <b>one system</b>, not eleven tabs.'},
    {sel:'#role-switch',title:'One app, three seats',text:'Mosaic re-permissions itself live. <b>Employee</b> sees self-service, <b>Manager</b> sees their team and approvals, <b>Admin</b> sees everything. Try all three after the tour.'},
    {route:'#/home',sel:'#inbox-card',title:'The unified action inbox',text:'Approvals, reviews, overdue training, onboarding tasks, surveys — drawn live from <b>every module</b> and sorted by urgency. No more "check five systems."'},
    {route:'#/recruit/R-104',sel:'.kanban',title:'Here\'s the golden thread',text:'<b>Alex Rivera</b> is sitting at the Offer stage for Senior Robotics Engineer. Open the card and click <b>🎉 Mark hired</b> (or drag it to Hired) — one action will create the HRIS record, spawn onboarding, assign compliance training, seed 30/60/90 goals, open benefits and update headcount.'},
    {center:true,title:'Everything else is one ⌘K away',text:'Hit <b>⌘K</b> anywhere to jump to any person, candidate, course, goal or policy. Demo data is yours to play with — <b>Reset demo</b> on Home rebuilds the world. Enjoy!'},
  ],
  start(){this.i=0;this.active=true;this.show();},
  show(){
    const s=this.steps[this.i];if(!s){this.end();return;}
    const go=()=>{
      this.clearHl();
      const pop=$('#tour-pop'),veil=$('#tour-veil');
      veil.classList.add('open');
      let target=null;
      if(s.sel){target=$(s.sel);if(target)target.classList.add('tour-hl');}
      pop.innerHTML=`<div class="row between mb8"><b style="font-family:var(--font-display)">${s.title}</b>
        <button class="iconbtn" onclick="Tour.end()">${I.x}</button></div>
        <p class="small muted" style="line-height:1.65">${s.text}</p>
        <div class="row between mt16"><span class="tour-step-dots">${this.steps.map((_,k)=>`<i class="${k===this.i?'on':''}"></i>`).join('')}</span>
        <span class="row" style="gap:7px">${this.i>0?'<button class="btn sm ghost" onclick="Tour.prev()">Back</button>':''}
        <button class="btn sm primary" onclick="Tour.next()">${this.i===this.steps.length-1?'Finish':'Next'}</button></span></div>`;
      pop.classList.add('open');
      if(s.center||!target){
        pop.style.left='50%';pop.style.top='50%';pop.style.transform='translate(-50%,-50%)';
      }else{
        const r=target.getBoundingClientRect();
        pop.style.transform='none';
        let top=r.bottom+12,left=clamp(r.left,12,window.innerWidth-342);
        if(top+230>window.innerHeight)top=Math.max(12,r.top-12-pop.offsetHeight-180);
        pop.style.top=clamp(top,12,window.innerHeight-260)+'px';pop.style.left=left+'px';
        target.scrollIntoView({block:'nearest',behavior:'smooth'});
      }
    };
    if(s.route&&location.hash!==s.route){nav(s.route);setTimeout(go,300);}else go();
  },
  next(){this.i++;if(this.i>=this.steps.length)this.end();else this.show();},
  prev(){this.i=Math.max(0,this.i-1);this.show();},
  clearHl(){$$('.tour-hl').forEach(e=>e.classList.remove('tour-hl'));},
  end(){if(!this.active&&!$('#tour-pop').classList.contains('open'))return;this.active=false;this.clearHl();
    $('#tour-pop').classList.remove('open');$('#tour-veil').classList.remove('open');
    try{localStorage.setItem('mosaic-toured','1');}catch(e){}},
};
window.Tour=Tour;

   ============================================================ */
(function init(){
  try{if(localStorage.getItem('mosaic-theme')==='dark')document.documentElement.classList.add('dark');}catch(e){}
  Store.load();
  applyBrand();
  if(!location.hash)history.replaceState(null,'','#/home');
  render();
  /* #9 PWA — registers only when actually served over http(s) */
  if('serviceWorker' in navigator&&/^https?:/.test(location.protocol)){try{navigator.serviceWorker.register('sw.js');}catch(e){}}
  /* #6 first-visit splash */
  let splashed=null;try{splashed=localStorage.getItem('mosaic-splash');}catch(e){}
  if(!splashed)showSplash();
  /* #17 mobile: drawer drag-dismiss + mail swipe-to-archive */
  let sheetY=null,swipeEl=null,swipeX=null;
  document.addEventListener('touchstart',ev=>{
    const grab=ev.target.closest('.sheet-grab');
    if(grab){sheetY=ev.touches[0].clientY;return;}
    const row=ev.target.closest('.mail-row[data-arg^="#/mail/"]');
    if(row&&innerWidth<=640){swipeEl=row;swipeX=ev.touches[0].clientX;}
  },{passive:true});
  document.addEventListener('touchmove',ev=>{
    if(sheetY!=null){const dy=ev.touches[0].clientY-sheetY;if(dy>0)$('#drawer').style.transform='translateY('+dy+'px)';return;}
    if(swipeEl&&swipeX!=null){const dx=ev.touches[0].clientX-swipeX;if(dx<0)swipeEl.style.transform='translateX('+dx+'px)';}
  },{passive:true});
  document.addEventListener('touchend',ev=>{
    if(sheetY!=null){const dy=(ev.changedTouches[0].clientY-sheetY);sheetY=null;
      if(dy>110)UI.closeDrawer();else $('#drawer').style.transform='';return;}
    if(swipeEl&&swipeX!=null){const dx=ev.changedTouches[0].clientX-swipeX;
      const tid=(swipeEl.dataset.arg||'').replace('#/mail/','');
      swipeEl.style.transform='';
      if(dx<-110&&tid)ACT.mailArchive(tid);
      swipeEl=null;swipeX=null;}
  },{passive:true});
  /* first visit? run the golden-thread tour once */
  let toured=null;try{toured=localStorage.getItem('mosaic-toured');}catch(e){}
  if(!toured&&splashed)setTimeout(()=>Tour.start(),900);
  console.log('%c🧩 Mosaic — one platform, every piece','font:700 14px Inter;color:#6366f1','· seeded world:',DB.employees.length,'employees ·',DB.candidates.length,'candidates ·',COURSES.length,'courses');
  console.log('%c© 2026 Wes Griffin. All rights reserved.','font:600 12px Inter;color:#f59e0b','Peeking is encouraged — copying is not. This demo is one-of-one; all data is fictional. Find Wes on LinkedIn.');
})();
