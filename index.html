<style>
/* ============================================================
   MOSAIC DESIGN SYSTEM
   ============================================================ */
:root{
  --font-ui:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --font-display:'Space Grotesk','Inter',sans-serif;

  /* neutrals — light */
  --bg:#f4f5f9; --bg2:#eceef4; --card:#ffffff; --card2:#f8f9fc;
  --ink:#13162b; --ink2:#4b5066; --ink3:#646a86; --line:#e5e7f0; --line2:#d8dbe8;
  --shadow:0 1px 2px rgba(19,22,43,.05),0 8px 24px -12px rgba(19,22,43,.12);
  --shadow-lg:0 24px 60px -24px rgba(19,22,43,.28);

  /* brand + module hues */
  --brand:#6366f1; --brand-deep:#4f46e5; --brand-soft:#eef0fe;
  --c-home:#64748b; --c-people:#6366f1; --c-recruit:#f0648c; --c-onboard:#f59e0b;
  --c-learn:#14b8a6; --c-grow:#8b5cf6; --c-time:#0ea5e9; --c-pay:#10b981;
  --c-engage:#ec4899; --c-insights:#a855f7; --c-help:#fb7185; --c-admin:#64748b;

  --ok:#10b981; --ok-soft:#e7f8f1; --warn:#f59e0b; --warn-soft:#fdf3e2;
  --bad:#ef4444; --bad-soft:#fdeaea; --info:#0ea5e9; --info-soft:#e6f5fd;
  --vio-soft:#f1ecfe; --rose-soft:#fdedf2; --teal-soft:#e4f7f4; --sky-soft:#e6f5fd;

  --r:14px; --r-sm:10px; --r-lg:20px;
  --sidebar-w:236px; --topbar-h:62px;
}
html.dark{
  --bg:#0c0e1a; --bg2:#10131f; --card:#161a2c; --card2:#1b2036;
  --ink:#eef0fa; --ink2:#a8adc4; --ink3:#868dab; --line:#262b42; --line2:#303755;
  --shadow:0 1px 2px rgba(0,0,0,.3),0 10px 30px -12px rgba(0,0,0,.5);
  --shadow-lg:0 30px 70px -20px rgba(0,0,0,.65);
  --brand-soft:#23264a;
  --ok-soft:#11302a; --warn-soft:#33270f; --bad-soft:#371a1c; --info-soft:#10283a;
  --vio-soft:#241d40; --rose-soft:#371726; --teal-soft:#0e2f2c; --sky-soft:#10283a;
}
*{margin:0;padding:0;box-sizing:border-box}
svg:not([width]){width:15px;height:15px;flex:none}
html{scroll-behavior:smooth}
body{font-family:var(--font-ui);background:var(--bg);color:var(--ink);font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased;overflow-x:hidden}
::selection{background:var(--brand);color:#fff}
a{color:var(--brand);text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:14px;color:var(--ink)}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--line2);border-radius:99px;border:2px solid var(--bg)}
::-webkit-scrollbar-track{background:transparent}

/* ---------- layout shell ---------- */
#shell{display:flex;min-height:100vh}
#sidebar{width:var(--sidebar-w);background:var(--card);border-right:1px solid var(--line);position:fixed;inset:0 auto 0 0;display:flex;flex-direction:column;z-index:50;transition:transform .25s}
#main-wrap{flex:1;margin-left:var(--sidebar-w);display:flex;flex-direction:column;min-width:0}
#topbar{height:var(--topbar-h);background:color-mix(in srgb,var(--card) 86%,transparent);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;padding:0 22px;position:sticky;top:0;z-index:40}
#main{flex:1;padding:26px 30px 70px;max-width:1340px;width:100%;margin:0 auto;animation:viewIn .22s ease}
@keyframes viewIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

/* ---------- sidebar ---------- */
.logo-row{display:flex;align-items:center;gap:10px;padding:16px 16px 12px;}
.logo-mark{width:30px;height:30px;flex:none}
.logo-name{font-family:var(--font-display);font-weight:700;font-size:19px;letter-spacing:-.02em}
.logo-sub{font-size:10px;color:var(--ink3);font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-top:-3px}
.nav-scroll{flex:1;overflow-y:auto;padding:6px 10px 10px}
.nav-label{font-size:10.5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--ink3);padding:14px 10px 5px}
.nav-item{display:flex;align-items:center;gap:10px;padding:7.5px 10px;border-radius:10px;color:var(--ink2);font-weight:550;font-size:13.5px;width:100%;text-align:left;margin-bottom:1px;position:relative;transition:background .12s,color .12s}
.nav-item:hover{background:var(--bg);color:var(--ink)}
.nav-item.active{background:color-mix(in srgb,var(--mod,#6366f1) 11%,transparent);color:var(--ink);font-weight:650}
.nav-item.active .nav-tile{transform:scale(1.08)}
.nav-tile{width:22px;height:22px;border-radius:7px;display:grid;place-items:center;flex:none;background:color-mix(in srgb,var(--mod,#6366f1) 14%,transparent);color:var(--mod,#6366f1);transition:transform .15s}
.nav-tile svg{width:13px;height:13px}
.nav-badge{margin-left:auto;background:var(--bad);color:#fff;font-size:10px;font-weight:700;border-radius:99px;padding:1px 6px}
.nav-open{display:none;margin-left:auto;width:20px;height:20px;border-radius:6px;place-items:center;color:var(--ink3);flex:none}
.nav-open svg{width:11px;height:11px}
/* hover-reveal ONLY on devices that actually hover — on touch, the swap was eating the first tap */
@media(hover:hover){
  .nav-item:hover .nav-open{display:grid}
  .nav-item:hover .nav-open:hover{background:var(--bg2);color:var(--brand)}
  .nav-item:hover .nav-badge{display:none}
}
@media(hover:none){
  .msg .m-acts{display:flex;opacity:.75}
  .dr-kebab{display:inline-grid!important}
}
html{touch-action:manipulation}
.sidebar-foot{padding:12px 16px;border-top:1px solid var(--line);font-size:11px;color:var(--ink3);line-height:1.5}
.sidebar-foot b{color:var(--ink2)}

/* ---------- topbar ---------- */
.crumb{font-family:var(--font-display);font-weight:600;font-size:16.5px;letter-spacing:-.01em;display:flex;align-items:center;gap:8px;white-space:nowrap}
.crumb .dot{width:8px;height:8px;border-radius:3px;background:var(--mod,var(--brand))}
.searchpill{flex:1;max-width:420px;min-width:0;margin:0 auto;display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:7px 12px;color:var(--ink3);font-size:13px;cursor:pointer;transition:border-color .15s;white-space:nowrap}
.searchpill span{overflow:hidden;text-overflow:ellipsis}
.searchpill:hover{border-color:var(--brand)}
.searchpill kbd{margin-left:auto;background:var(--card);border:1px solid var(--line2);border-radius:5px;padding:0 5px;font-size:10.5px;font-family:inherit;color:var(--ink3)}
.topbtn{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;color:var(--ink2);position:relative;transition:background .12s}
.topbtn:hover{background:var(--bg)}
.topbtn svg{width:17px;height:17px}
.topbtn .ping{position:absolute;top:7px;right:7px;width:8px;height:8px;border-radius:99px;background:var(--bad);border:2px solid var(--card)}
.role-switch{display:flex;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:3px;gap:2px}
.role-switch button{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:8px;font-size:12px;font-weight:600;color:var(--ink3);transition:all .15s}
.role-switch button.on{background:var(--card);color:var(--ink);box-shadow:var(--shadow)}
.me-chip{display:flex;align-items:center;gap:9px;padding:5px 6px;border-radius:11px;cursor:pointer}
.me-chip:hover{background:var(--bg)}
.me-chip .who{line-height:1.25;text-align:right}
.me-chip .who b{font-size:12.5px;display:block}
.me-chip .who span{font-size:10.5px;color:var(--ink3)}

/* ---------- avatars ---------- */
.av{border-radius:38%;display:inline-grid;place-items:center;font-weight:700;color:#fff;flex:none;user-select:none;letter-spacing:.02em}
.av.xs{width:22px;height:22px;font-size:8.5px}.av.sm{width:28px;height:28px;font-size:10px}
.av.md{width:36px;height:36px;font-size:12.5px}.av.lg{width:48px;height:48px;font-size:16px}
.av.xl{width:72px;height:72px;font-size:24px}.av.xxl{width:96px;height:96px;font-size:32px;border-radius:30%}
.av-stack{display:flex}.av-stack .av{border:2px solid var(--card);margin-left:-7px}.av-stack .av:first-child{margin-left:0}

/* ---------- cards, grids, typography ---------- */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}
.card.pad{padding:20px}
.card.hover:hover{border-color:var(--line2);transform:translateY(-1px)}
.card.hover{transition:transform .15s,border-color .15s;cursor:pointer}
.card-head{display:flex;align-items:center;gap:10px;padding:16px 20px;border-bottom:1px solid var(--line)}
.card-head h3{font-size:14.5px;font-weight:700;letter-spacing:-.01em}
.card-head .spacer{flex:1}
.card-body{padding:16px 20px}
.grid{display:grid;gap:16px}
.g2{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}.g23{grid-template-columns:2fr 1fr}.g32{grid-template-columns:1fr 2fr}
@media(max-width:1100px){.g3,.g4{grid-template-columns:repeat(2,1fr)}.g23,.g32{grid-template-columns:1fr}}
@media(max-width:760px){.g2,.g3,.g4{grid-template-columns:1fr}}
.row{display:flex;align-items:center;gap:10px}.row.between{justify-content:space-between}.row.wrap{flex-wrap:wrap}
.col{display:flex;flex-direction:column;gap:4px}
.spacer{flex:1}
h1.page{font-family:var(--font-display);font-size:24px;font-weight:700;letter-spacing:-.02em}
.page-sub{color:var(--ink2);font-size:13.5px;margin-top:2px}
.page-head{display:flex;align-items:flex-start;gap:14px;margin-bottom:22px;flex-wrap:wrap}
.muted{color:var(--ink2)}.faint{color:var(--ink3)}
.small{font-size:12.5px}.tiny{font-size:11.5px}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}.mt20{margin-top:20px}.mt24{margin-top:24px}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}
.num{font-variant-numeric:tabular-nums}

/* ---------- stats ---------- */
.stat{padding:16px 18px;display:flex;flex-direction:column;gap:3px;position:relative;overflow:hidden}
.stat .lab{font-size:11.5px;font-weight:650;letter-spacing:.05em;text-transform:uppercase;color:var(--ink3)}
.stat .val{font-family:var(--font-display);font-size:27px;font-weight:700;letter-spacing:-.02em;line-height:1.15}
.stat .sub{font-size:12px;color:var(--ink2)}
.stat .tilebg{position:absolute;right:-16px;top:-16px;width:74px;height:74px;border-radius:22px;opacity:.1;background:var(--mod,var(--brand));transform:rotate(15deg)}
.delta{font-weight:700;font-size:11.5px;padding:1px 7px;border-radius:99px}
.delta.up{background:var(--ok-soft);color:#076b4c}.delta.down{background:var(--bad-soft);color:#b32222}.delta.flat{background:var(--bg2);color:var(--ink3)}
html.dark .delta.up{color:#4ade9d}html.dark .delta.down{color:#f87f7f}

/* ---------- buttons ---------- */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:8px 15px;border-radius:10px;font-weight:650;font-size:13px;border:1px solid transparent;transition:all .14s;white-space:nowrap}
.btn svg{width:14px;height:14px}
.btn.primary{background:var(--brand);color:#fff;box-shadow:0 4px 14px -4px color-mix(in srgb,var(--brand) 55%,transparent)}
.btn.primary:hover{background:var(--brand-deep)}
.btn.ghost{border-color:var(--line2);color:var(--ink2);background:var(--card)}
.btn.ghost:hover{border-color:var(--brand);color:var(--brand)}
.btn.soft{background:var(--brand-soft);color:var(--brand)}
.btn.soft:hover{filter:brightness(.97)}
.btn.danger{background:var(--bad-soft);color:var(--bad)}
.btn.good{background:var(--ok-soft);color:var(--ok)}
.btn.sm{padding:5px 10px;font-size:12px;border-radius:8px}
.btn.xs{padding:3px 8px;font-size:11.5px;border-radius:7px}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn.block{width:100%}
.iconbtn{width:28px;height:28px;border-radius:8px;display:inline-grid;place-items:center;color:var(--ink3)}
.iconbtn:hover{background:var(--bg);color:var(--ink)}
.iconbtn svg{width:14px;height:14px}

/* ---------- badges / chips ---------- */
.badge{display:inline-flex;align-items:center;gap:5px;padding:2.5px 9px;border-radius:99px;font-size:11.5px;font-weight:650;white-space:nowrap}
.badge .bdot{width:6px;height:6px;border-radius:99px;background:currentColor}
.b-ok{background:var(--ok-soft);color:#076b4c}.b-warn{background:var(--warn-soft);color:#8f5c03}
.b-bad{background:var(--bad-soft);color:#b32222}.b-info{background:var(--info-soft);color:#07689a}
.b-vio{background:var(--vio-soft);color:#6d3fd6}.b-rose{background:var(--rose-soft);color:#b32a60}
.b-teal{background:var(--teal-soft);color:#0a7568}.b-mute{background:var(--bg2);color:var(--ink2)}
html.dark .b-ok{color:#4ade9d}html.dark .b-warn{color:#fbc34d}html.dark .b-bad{color:#f87f7f}
html.dark .b-info{color:#5ec5f5}html.dark .b-vio{color:#b69af7}html.dark .b-rose{color:#f491bd}html.dark .b-teal{color:#46d6c4}
.chip{display:inline-flex;align-items:center;gap:5px;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:3px 9px;font-size:12px;font-weight:550;color:var(--ink2)}

/* ---------- tables ---------- */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--ink3);padding:10px 14px;border-bottom:1px solid var(--line);white-space:nowrap}
.tbl td{padding:11px 14px;border-bottom:1px solid var(--line);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr{transition:background .1s}
.tbl tbody tr:hover{background:var(--card2)}
.tbl tbody tr.click{cursor:pointer}
.tbl .r{text-align:right}

/* ---------- forms ---------- */
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.field label{font-size:12px;font-weight:650;color:var(--ink2)}
.field input,.field select,.field textarea{background:var(--bg);border:1.5px solid var(--line);border-radius:9px;padding:8.5px 12px;outline:none;transition:border-color .15s;width:100%}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--brand);background:var(--card)}
.field textarea{resize:vertical;min-height:74px}
.field .hint{font-size:11px;color:var(--ink3)}
.seg{display:flex;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:3px;gap:2px;width:fit-content}
.seg button{padding:5.5px 13px;border-radius:8px;font-size:12.5px;font-weight:600;color:var(--ink3)}
.seg button.on{background:var(--card);color:var(--ink);box-shadow:var(--shadow)}
.filterbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.filterbar input[type=search]{background:var(--card);border:1.5px solid var(--line);border-radius:10px;padding:8px 12px;outline:none;min-width:220px}
.filterbar input[type=search]:focus{border-color:var(--brand)}
.filterbar select{background:var(--card);border:1.5px solid var(--line);border-radius:10px;padding:8px 10px;outline:none;font-size:13px;color:var(--ink2)}

/* ---------- tabs ---------- */
.tabs{display:flex;gap:2px;border-bottom:1.5px solid var(--line);margin-bottom:20px;flex-wrap:wrap;overflow:visible}
@media(max-width:640px){.tabs{flex-wrap:nowrap;overflow-x:auto}}
.tabs button{padding:9px 14px;font-size:13px;font-weight:600;color:var(--ink3);border-bottom:2px solid transparent;margin-bottom:-1.5px;white-space:nowrap}
.tabs button:hover{color:var(--ink)}
.tabs button.on{color:var(--brand);border-bottom-color:var(--brand)}

/* ---------- progress ---------- */
.pbar{height:7px;background:var(--bg2);border-radius:99px;overflow:hidden;flex:1}
.pbar>i{display:block;height:100%;border-radius:99px;background:var(--mod,var(--brand));transition:width .4s ease}
.ring{transform:rotate(-90deg)}
.ring .track{stroke:var(--bg2)}

/* ---------- kanban ---------- */
.kanban{display:grid;grid-auto-flow:column;grid-auto-columns:minmax(228px,1fr);gap:13px;overflow-x:auto;padding-bottom:10px;align-items:start}
.kcol{background:var(--bg2);border-radius:var(--r);padding:10px;min-height:140px}
.kcol.dragover{outline:2px dashed var(--brand);outline-offset:-2px;background:var(--brand-soft)}
.kcol-head{display:flex;align-items:center;gap:7px;padding:3px 6px 9px;font-size:12px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;color:var(--ink2)}
.kcol-head .count{margin-left:auto;background:var(--card);border-radius:7px;padding:0 7px;font-size:11px;color:var(--ink3)}
.kcard{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:11px 12px;margin-bottom:8px;cursor:grab;box-shadow:var(--shadow);transition:transform .12s}
.kcard:hover{transform:translateY(-1px);border-color:var(--line2)}
.kcard.dragging{opacity:.4;cursor:grabbing}
.kcard b{font-size:13px;display:block;margin-bottom:2px}

/* ---------- drawer ---------- */
#drawer-veil,#modal-veil{position:fixed;inset:0;background:rgba(10,12,26,.45);z-index:90;opacity:0;transition:opacity .2s;backdrop-filter:blur(2px)}
#drawer-veil.open,#modal-veil.open{opacity:1}
#drawer{position:fixed;top:0;right:0;bottom:0;width:520px;max-width:94vw;background:var(--card);z-index:95;box-shadow:var(--shadow-lg);transform:translateX(105%);transition:transform .26s cubic-bezier(.3,.9,.3,1);display:flex;flex-direction:column}
#drawer.open{transform:none}
.drawer-head{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px}
.drawer-body{flex:1;overflow-y:auto;padding:20px 22px}
.drawer-foot{padding:14px 22px;border-top:1px solid var(--line);display:flex;gap:9px;justify-content:flex-end}

/* ---------- modal ---------- */
#modal{position:fixed;inset:0;z-index:96;display:grid;place-items:center;padding:20px;pointer-events:none}
#modal .box{background:var(--card);border-radius:var(--r-lg);box-shadow:var(--shadow-lg);width:540px;max-width:96vw;max-height:88vh;display:flex;flex-direction:column;transform:scale(.95) translateY(8px);opacity:0;transition:all .2s cubic-bezier(.3,.9,.3,1);pointer-events:auto}
#modal.open .box{transform:none;opacity:1}
.modal-head{padding:19px 24px 0;display:flex;align-items:flex-start;gap:12px}
.modal-head h3{font-family:var(--font-display);font-size:17px;font-weight:700;letter-spacing:-.01em}
.modal-body{padding:16px 24px 20px;overflow-y:auto}
.modal-foot{padding:14px 24px;border-top:1px solid var(--line);display:flex;gap:9px;justify-content:flex-end}

/* ---------- toast ---------- */
#toasts{position:fixed;bottom:90px;right:22px;z-index:120;display:flex;flex-direction:column;gap:9px;max-width:380px}
.toast{background:var(--ink);color:var(--bg);padding:12px 16px;border-radius:12px;box-shadow:var(--shadow-lg);font-size:13px;font-weight:550;display:flex;gap:10px;align-items:flex-start;animation:toastIn .25s cubic-bezier(.3,.9,.3,1)}
html.dark .toast{background:#262b42;color:#eef0fa}
.toast .t-ic{width:20px;height:20px;border-radius:7px;display:grid;place-items:center;flex:none;font-size:11px}
.toast a{color:#a5b4fc;font-weight:650}
@keyframes toastIn{from{opacity:0;transform:translateY(10px) scale(.97)}to{opacity:1;transform:none}}

/* ---------- command palette ---------- */
#palette{position:fixed;inset:0;z-index:110;background:rgba(10,12,26,.5);backdrop-filter:blur(3px);display:grid;justify-items:center;align-items:start;padding-top:12vh;opacity:0;pointer-events:none;transition:opacity .15s}
#palette.open{opacity:1;pointer-events:auto}
.pal-box{width:600px;max-width:94vw;background:var(--card);border-radius:16px;box-shadow:var(--shadow-lg);overflow:hidden;transform:scale(.98);transition:transform .15s}
#palette.open .pal-box{transform:none}
.pal-input{display:flex;gap:10px;align-items:center;padding:15px 18px;border-bottom:1px solid var(--line)}
.pal-input input{flex:1;border:none;outline:none;background:none;font-size:15.5px}
.pal-results{max-height:46vh;overflow-y:auto;padding:8px}
.pal-item{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:10px;cursor:pointer;font-size:13.5px}
.pal-item.sel,.pal-item:hover{background:var(--bg)}
.pal-item .pi-tile{width:26px;height:26px;border-radius:8px;display:grid;place-items:center;flex:none;background:color-mix(in srgb,var(--mod,#6366f1) 13%,transparent);color:var(--mod,#6366f1)}
.pal-item .pi-tile svg{width:13px;height:13px}
.pal-item .meta{margin-left:auto;font-size:11px;color:var(--ink3);text-transform:capitalize}
.pal-group{font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);padding:10px 12px 4px}

/* ---------- notifications panel ---------- */
#notif-pop{position:fixed;top:58px;right:88px;width:390px;max-width:92vw;background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow-lg);z-index:105;overflow:hidden;display:none}
#notif-pop.open{display:block;animation:viewIn .18s ease}
.notif-item{display:flex;gap:11px;padding:12px 16px;border-bottom:1px solid var(--line);cursor:pointer;align-items:flex-start}
.notif-item:hover{background:var(--bg)}
.notif-item:last-child{border-bottom:none}
.notif-item.unread{background:color-mix(in srgb,var(--brand) 4%,var(--card))}
.notif-ic{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;flex:none;font-size:13px}

/* ---------- timeline ---------- */
.timeline{position:relative;padding-left:22px}
.timeline:before{content:'';position:absolute;left:6px;top:6px;bottom:6px;width:2px;background:var(--line);border-radius:2px}
.tl-item{position:relative;padding-bottom:16px}
.tl-item:before{content:'';position:absolute;left:-21px;top:5px;width:10px;height:10px;border-radius:99px;background:var(--mod,var(--brand));border:2.5px solid var(--card)}
.tl-item:last-child{padding-bottom:0}

/* ---------- org chart ---------- */
.org-wrap{overflow:auto;padding:10px 4px 30px}
.org-node{display:inline-flex;flex-direction:column;align-items:center}
.org-card{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:11px 16px;box-shadow:var(--shadow);display:flex;align-items:center;gap:10px;cursor:pointer;min-width:190px;transition:border-color .15s,transform .15s}
.org-card:hover{border-color:var(--brand);transform:translateY(-1px)}
.org-fold{width:18px;height:18px;border-radius:6px;background:var(--bg2);color:var(--ink2);font-size:11px;line-height:1;flex:none;display:grid;place-items:center}
.org-fold:hover{background:var(--brand);color:#fff}
.org-kids{display:flex;gap:14px;align-items:flex-start;padding-top:26px;position:relative}
.org-kids>.org-node{position:relative;padding-top:0}
.org-down{width:2px;height:14px;background:var(--line2);margin:0 auto}
.org-bridge{position:absolute;top:-14px;height:2px;background:var(--line2)}
.org-up{position:absolute;top:-14px;left:50%;width:2px;height:14px;background:var(--line2)}
.org-count{font-size:10.5px;background:var(--brand-soft);color:var(--brand);font-weight:700;padding:1px 7px;border-radius:99px}

/* ---------- calendar ---------- */
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.cal .dow{font-size:10.5px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.05em;text-align:center;padding:4px 0}
.cal .day{min-height:64px;background:var(--card2);border:1px solid var(--line);border-radius:9px;padding:5px 7px;font-size:11px}
.cal .day .dnum{font-weight:650;color:var(--ink3);font-size:11px}
.cal .day.today{border-color:var(--brand);background:var(--brand-soft)}
.cal .day.off{opacity:.4}
.cal .ev{margin-top:3px;border-radius:5px;padding:1px 5px;font-size:10px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff}

/* ---------- 9-box ---------- */
.ninebox{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.nb-cell{border-radius:12px;padding:11px;min-height:104px;border:1px solid var(--line)}
.nb-cell h5{font-size:11px;font-weight:700;margin-bottom:7px;color:var(--ink2)}
.nb-cell .row{flex-wrap:wrap;gap:5px}

/* ---------- misc ---------- */
.empty{text-align:center;padding:42px 20px;color:var(--ink3)}
.empty .big{font-size:34px;margin-bottom:8px}
.divider{height:1px;background:var(--line);margin:16px 0}
.kv{display:grid;grid-template-columns:130px 1fr;gap:7px 14px;font-size:13px}
.kv dt{color:var(--ink3);font-weight:550}
.kv dd{font-weight:550}
.pill-tabs{display:flex;gap:6px;flex-wrap:wrap}
.pill-tabs button{padding:6px 13px;border-radius:99px;font-size:12.5px;font-weight:600;color:var(--ink2);background:var(--bg);border:1px solid var(--line)}
.pill-tabs button.on{background:var(--ink);color:var(--card);border-color:var(--ink)}
html.dark .pill-tabs button.on{background:#eef0fa;color:#13162b}
.tag-values{display:flex;gap:5px;flex-wrap:wrap}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--ink2)}
.legend i{width:9px;height:9px;border-radius:3px;display:inline-block;margin-right:5px}
.starbar svg{width:15px;height:15px}
.hovercard:hover{background:var(--card2)}
.linklike{color:var(--brand);font-weight:600;cursor:pointer}
.linklike:hover{text-decoration:underline}
mark{background:color-mix(in srgb,var(--warn) 30%,transparent);color:inherit;border-radius:3px;padding:0 2px}

/* ---------- approval chain stepper ---------- */
.chain{display:flex;align-items:center;gap:0;flex-wrap:wrap}
.chain .step{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:650;color:var(--ink3)}
.chain .step .cdot{width:20px;height:20px;border-radius:99px;display:grid;place-items:center;font-size:10px;background:var(--bg2);color:var(--ink3);border:1.5px solid var(--line2)}
.chain .step.ok .cdot{background:var(--ok);border-color:var(--ok);color:#fff}
.chain .step.now .cdot{background:var(--warn-soft);border-color:var(--warn);color:var(--warn)}
.chain .step.ok{color:var(--ink2)}.chain .step.now{color:var(--ink)}
.chain .clink{width:22px;height:2px;background:var(--line2);margin:0 5px}
.chain .clink.ok{background:var(--ok)}

/* ---------- goal alignment tree ---------- */
.gt-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:11px;position:relative}
.gt-row:hover{background:var(--card2)}
.gt-row .gt-bar{width:130px;flex:none}
.gt-kids{margin-left:26px;border-left:2px solid var(--line);padding-left:14px;position:relative}
.gt-row .gt-elbow{position:absolute;left:-16px;top:50%;width:12px;height:2px;background:var(--line)}

/* ---------- Ask Mosaic assistant ---------- */
#assist-fab{position:fixed;right:22px;bottom:22px;z-index:88;width:54px;height:54px;border-radius:18px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;display:grid;place-items:center;box-shadow:0 10px 30px -8px rgba(99,102,241,.65);transition:transform .15s}
#assist-fab:hover{transform:scale(1.06)}
#assist-fab svg{width:24px;height:24px}
#assist-panel{position:fixed;right:22px;bottom:88px;z-index:108;width:392px;max-width:calc(100vw - 28px);height:540px;max-height:calc(100vh - 120px);background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow-lg);display:none;flex-direction:column;overflow:hidden}
#assist-panel.open{display:flex;animation:viewIn .2s ease}
.as-head{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,color-mix(in srgb,#6366f1 9%,var(--card)),var(--card))}
.as-body{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
.as-msg{max-width:86%;padding:10px 13px;border-radius:14px;font-size:13px;line-height:1.6}
.as-msg.user{align-self:flex-end;background:var(--brand);color:#fff;border-bottom-right-radius:5px}
.as-msg.bot{align-self:flex-start;background:var(--card2);border:1px solid var(--line);border-bottom-left-radius:5px}
.as-msg.bot b{color:var(--ink)}
.as-actions{display:flex;gap:6px;flex-wrap:wrap;align-self:flex-start;margin-top:-4px}
.as-chips{display:flex;gap:6px;flex-wrap:wrap;padding:0 14px 10px}
.as-chips .chip{cursor:pointer;font-size:11.5px}
.as-chips .chip:hover{border-color:var(--brand);color:var(--brand)}
.as-foot{padding:10px 12px;border-top:1px solid var(--line);display:flex;gap:8px}
.as-foot input{flex:1;background:var(--bg);border:1.5px solid var(--line);border-radius:11px;padding:9px 13px;outline:none}
.as-foot input:focus{border-color:var(--brand)}
.as-note{font-size:10px;color:var(--ink3);text-align:center;padding:0 0 8px}

/* ---------- mobile bottom tab bar ---------- */
#tabbar{display:none;position:fixed;left:0;right:0;bottom:0;z-index:60;background:color-mix(in srgb,var(--card) 92%,transparent);backdrop-filter:blur(14px);border-top:1px solid var(--line);padding:6px 8px calc(6px + env(safe-area-inset-bottom));grid-template-columns:repeat(5,1fr)}
#tabbar button{display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 2px;border-radius:10px;font-size:10px;font-weight:650;color:var(--ink3)}
#tabbar button.on{color:var(--mod,var(--brand))}
#tabbar button svg{width:19px;height:19px}

/* ---------- risk badge ---------- */
.risk-pill{display:inline-flex;align-items:center;gap:6px;border-radius:99px;padding:3px 10px;font-size:11px;font-weight:700}
.risk-low{background:var(--ok-soft);color:#076b4c}.risk-watch{background:var(--warn-soft);color:#8f5c03}.risk-high{background:var(--bad-soft);color:#b32222}
html.dark .risk-low{color:#4ade9d}html.dark .risk-watch{color:#fbc34d}html.dark .risk-high{color:#f87f7f}

/* ---------- letter preview ---------- */
.letter{background:#fff;color:#1a1d2e;border:1px solid var(--line2);border-radius:10px;padding:34px 38px;font-size:12.5px;line-height:1.75;font-family:Georgia,'Times New Roman',serif;max-height:46vh;overflow-y:auto;box-shadow:var(--shadow)}
.letter h4{font-family:var(--font-display);margin-bottom:2px}
html.dark .letter{background:#f4f4f6}

/* ---------- workspace suite: chat ---------- */
.chat-wrap{display:grid;grid-template-columns:230px 1fr;gap:0;background:var(--card);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;min-height:560px;box-shadow:var(--shadow)}
.chat-side{border-right:1px solid var(--line);background:var(--card2);padding:12px 8px;overflow-y:auto;max-height:72vh}
.chat-side .nav-label{padding:10px 10px 4px}
.ch-item{display:flex;align-items:center;gap:8px;width:100%;padding:6px 10px;border-radius:8px;font-size:13px;color:var(--ink2);text-align:left}
.ch-item:hover{background:var(--bg)}
.ch-item.on{background:color-mix(in srgb,#6d28d9 12%,transparent);color:var(--ink);font-weight:650}
.ch-item .hash{color:var(--ink3);font-weight:700}
.ch-item .unread-dot{margin-left:auto;background:#6d28d9;color:#fff;font-size:10px;font-weight:700;border-radius:99px;padding:0 6px}
.chat-main{display:flex;flex-direction:column;max-height:72vh}
.chat-head{padding:12px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
.chat-msgs{flex:1;overflow-y:auto;padding:14px 18px;display:flex;flex-direction:column;gap:2px}
.msg{display:flex;gap:10px;padding:5px 8px;border-radius:10px;align-items:flex-start}
.msg:hover{background:var(--card2)}
.msg .m-body{flex:1;min-width:0}
.msg .m-meta{font-size:11px;color:var(--ink3)}
.msg .m-text{font-size:13.5px;line-height:1.55}
.msg .m-reacts{display:flex;gap:5px;margin-top:3px}
.msg .m-reacts .chip{padding:0 7px;font-size:11px;cursor:pointer}
.chat-foot{padding:12px 16px;border-top:1px solid var(--line)}
.chat-input{display:flex;gap:8px;background:var(--bg);border:1.5px solid var(--line);border-radius:12px;padding:8px 10px}
.chat-input input{flex:1;border:none;outline:none;background:none;font-size:13.5px}
.day-divider{display:flex;align-items:center;gap:10px;margin:10px 0 6px;color:var(--ink3);font-size:11px;font-weight:700}
.day-divider:before,.day-divider:after{content:'';flex:1;height:1px;background:var(--line)}

/* ---------- mail ---------- */
.mail-wrap{display:grid;grid-template-columns:190px 1fr;background:var(--card);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;min-height:540px;box-shadow:var(--shadow)}
.mail-side{border-right:1px solid var(--line);background:var(--card2);padding:12px 8px}
.mail-row{display:grid;grid-template-columns:30px 200px 1fr auto;gap:12px;align-items:center;padding:11px 16px;border-bottom:1px solid var(--line);cursor:pointer;font-size:13px}
.mail-row:hover{background:var(--card2)}
.mail-row.unread{background:color-mix(in srgb,#e25141 4%,var(--card))}
.mail-row.unread .m-from,.mail-row.unread .m-subj{font-weight:750}
.mail-row .m-from{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mail-row .m-prev{color:var(--ink3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mail-open{padding:22px 26px;overflow-y:auto;max-height:68vh}
.mail-body{font-size:13.5px;line-height:1.8;color:var(--ink2);white-space:pre-line}
.star{color:var(--ink3);cursor:pointer;font-size:15px}
.star.on{color:#f5a623}

/* ---------- calendar ---------- */
.cal-week{display:grid;grid-template-columns:46px repeat(5,1fr);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;background:var(--card);box-shadow:var(--shadow)}
.cal-week .cw-head{padding:9px 6px;text-align:center;border-bottom:1px solid var(--line);border-left:1px solid var(--line);font-size:11.5px;font-weight:700}
.cal-week .cw-head .dnum{font-size:17px;font-family:var(--font-display)}
.cal-week .cw-head.today .dnum{background:#2d7ff0;color:#fff;border-radius:99px;display:inline-block;width:28px;line-height:28px}
.cw-times{display:grid;grid-auto-rows:44px;font-size:9.5px;color:var(--ink3);text-align:right;padding-right:5px}
.cw-col{position:relative;border-left:1px solid var(--line);display:grid;grid-auto-rows:44px}
.cw-cell{border-bottom:1px solid var(--line)}
.cw-ev{position:absolute;left:3px;right:3px;border-radius:7px;padding:3px 7px;font-size:10.5px;font-weight:650;color:#fff;overflow:hidden;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.18);line-height:1.3}
.cw-ev:hover{filter:brightness(1.07)}
.cw-now{position:absolute;left:0;right:0;height:2px;background:#ef4444;z-index:5}
.cw-now:before{content:'';position:absolute;left:-1px;top:-3px;width:8px;height:8px;border-radius:99px;background:#ef4444}

/* ---------- drive ---------- */
.dr-row{display:grid;grid-template-columns:30px 1fr 160px 120px 90px;gap:12px;align-items:center;padding:10px 16px;border-bottom:1px solid var(--line);cursor:pointer;font-size:13px}
.dr-row:hover{background:var(--card2)}
.dr-ic{font-size:17px}
.crumbs{display:flex;gap:6px;align-items:center;font-size:13px;font-weight:600;color:var(--ink2)}
.crumbs a{color:var(--ink2)}
.crumbs .sep{color:var(--ink3)}

/* ---------- meet ---------- */
.meet-stage{background:#101322;border-radius:var(--r-lg);padding:18px;min-height:480px;display:flex;flex-direction:column;gap:14px}
.meet-grid{flex:1;display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.meet-tile{background:#1a1f33;border-radius:14px;display:grid;place-items:center;position:relative;min-height:140px}
.meet-tile .name-tag{position:absolute;left:10px;bottom:8px;background:rgba(0,0,0,.45);color:#fff;font-size:11px;font-weight:650;border-radius:7px;padding:2px 8px}
.meet-tile .mic-off{position:absolute;right:10px;bottom:8px;background:rgba(239,68,68,.9);color:#fff;border-radius:7px;width:22px;height:22px;display:grid;place-items:center;font-size:11px}
.meet-bar{display:flex;gap:10px;justify-content:center;align-items:center}
.meet-btn{width:46px;height:46px;border-radius:14px;background:#262b42;color:#fff;display:grid;place-items:center;font-size:17px;transition:all .15s}
.meet-btn:hover{background:#303755}
.meet-btn.off{background:#ef4444}
.meet-btn.leave{background:#ef4444;width:auto;padding:0 22px;font-size:13px;font-weight:700;border-radius:14px}

/* ---------- intranet ---------- */
.hub-banner{border-radius:var(--r-lg);padding:26px 28px;color:#fff;position:relative;overflow:hidden;margin-bottom:16px}
.hub-banner h2{font-family:var(--font-display);font-size:22px;letter-spacing:-.02em}
.hub-banner .tiles{position:absolute;right:-30px;top:-30px;opacity:.16;transform:rotate(12deg)}
.space-pill{display:flex;align-items:center;gap:8px;padding:7px 12px;border-radius:11px;font-size:13px;font-weight:600;color:var(--ink2);background:var(--card);border:1.5px solid var(--line);white-space:nowrap}
.space-pill.on{border-color:#0891b2;color:#0891b2;background:color-mix(in srgb,#0891b2 8%,var(--card))}
.post{padding:16px 18px;border-bottom:1px solid var(--line)}
.post:last-child{border-bottom:none}
.post h4{font-size:14.5px;margin-bottom:3px}
.post .pin{color:#0891b2;font-size:11px;font-weight:700}

@media(max-width:900px){
  .chat-wrap,.mail-wrap{grid-template-columns:1fr}
  /* on mobile the rails become horizontal scrollers instead of disappearing */
  .chat-side,.mail-side{display:flex;flex-direction:row;align-items:center;gap:4px;overflow-x:auto;border-right:none;border-bottom:1px solid var(--line);padding:8px;max-height:none;-webkit-overflow-scrolling:touch}
  .chat-side .nav-label,.mail-side .nav-label,.chat-side .divider,.mail-side .divider,.chat-side p,.mail-side p,.chat-side .row.between,#chat-q,#chat-search-res{display:none}
  .chat-side .ch-item,.mail-side .ch-item{width:auto;white-space:nowrap;flex:none}
  .meet-wrap{grid-template-columns:1fr}
  .meet-panel{max-height:240px}
  .cal-layout{grid-template-columns:1fr!important}
  .cal-side{display:none}
  .cal-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .cal-week{min-width:560px}
  .dr-row{grid-template-columns:26px 1fr 90px}
  .dr-row .dr-extra{display:none}
}

/* ---------- MosaicSign ---------- */
.sig-script{font-family:'Snell Roundhand','Savoye LET','Segoe Script','Brush Script MT',cursive;font-size:26px;line-height:1.2}
.esign-box{background:var(--warn-soft);border:1.5px solid color-mix(in srgb,var(--warn) 35%,var(--line));border-radius:12px;padding:13px 15px;font-size:12px;line-height:1.65;color:var(--ink2)}
.sig-pad{border:2px dashed var(--line2);border-radius:14px;padding:18px;text-align:center;background:var(--card2)}
.env-signer{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px dashed var(--line)}
.env-signer:last-child{border-bottom:none}
.hashchip{font-family:ui-monospace,Menlo,monospace;font-size:10.5px;background:var(--bg2);border-radius:7px;padding:3px 8px;letter-spacing:.04em}

/* ---------- workflows ---------- */
.wf-card{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:11px 12px;margin-bottom:8px;cursor:pointer;box-shadow:var(--shadow);transition:transform .12s}
.wf-card:hover{transform:translateY(-1px);border-color:var(--line2)}
.tpl-card{cursor:pointer;text-align:left;transition:transform .15s,border-color .15s}
.tpl-card:hover{transform:translateY(-2px);border-color:#e0457b}

/* ---------- round 5: top-20 + spend ---------- */
#splash{position:fixed;inset:0;z-index:300;background:linear-gradient(135deg,#0c0e1a,#141838 55%,#1a1030);display:grid;place-items:center;color:#eef0fa;text-align:center;padding:24px;overflow:hidden}
#splash .sp-card{max-width:600px;position:relative;z-index:2}
#splash h1{font-family:var(--font-display);font-size:38px;letter-spacing:-.02em;margin:14px 0 2px}
.sp-orb{position:absolute;border-radius:50%;filter:blur(70px);opacity:.5;pointer-events:none;will-change:transform}
.sp-orb.o1{width:420px;height:420px;background:#6366f1;top:-120px;left:-90px}
.sp-orb.o2{width:360px;height:360px;background:#f0648c;bottom:-130px;right:-70px}
.sp-orb.o3{width:280px;height:280px;background:#14b8a6;bottom:8%;left:6%;opacity:.32}
.sp-logo{cursor:pointer;display:inline-block}
.sp-logo svg{width:74px;height:74px;overflow:visible}
.sp-tag{font-size:19px;color:#cdd2ea;font-weight:600;letter-spacing:-.01em;margin-top:6px}
.sp-tag .sp-rot{color:#fff;display:inline-block;min-width:148px;text-align:left}
.sp-tag .sp-rot i{font-style:normal;display:inline-block;background:linear-gradient(90deg,#8b8efa,#f0648c);-webkit-background-clip:text;background-clip:text;color:transparent;font-weight:800;transition:transform .26s,opacity .26s}
.sp-sub{color:#a8adc4;font-size:14px;margin-top:10px}
.sp-stats{display:flex;gap:26px;justify-content:center;margin:24px 0 6px;flex-wrap:wrap}
.sp-stats b{display:block;font-size:25px;font-family:var(--font-display);letter-spacing:-.02em}
.sp-stats span{font-size:11px;color:#8b90ad;text-transform:uppercase;letter-spacing:.08em;font-weight:700}
.sp-mods{display:flex;gap:9px;justify-content:center;flex-wrap:wrap;margin:16px 0 4px;max-width:540px}
.sp-mod{display:flex;flex-direction:column;align-items:center;gap:5px;width:64px;padding:9px 2px 7px;border-radius:13px;background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.09);color:#dfe3f6;cursor:pointer;transition:transform .16s,background .16s,border-color .16s,box-shadow .16s}
.sp-mod svg{width:19px;height:19px;color:var(--c)}
.sp-mod span{font-size:9.5px;font-weight:700;letter-spacing:.02em;white-space:nowrap}
.sp-mod:hover,.sp-mod:focus-visible{transform:translateY(-4px) scale(1.05);background:rgba(255,255,255,.1);border-color:var(--c);box-shadow:0 8px 22px -8px var(--c)}
.sp-enter{position:relative}
.sp-hint{color:#6e7390;font-size:11px;margin-top:22px}
@media(prefers-reduced-motion:no-preference){
  .sp-orb.o1{animation:spDrift1 21s ease-in-out infinite alternate}
  .sp-orb.o2{animation:spDrift2 26s ease-in-out infinite alternate}
  .sp-orb.o3{animation:spDrift3 18s ease-in-out infinite alternate}
  @keyframes spDrift1{to{transform:translate(70px,50px) scale(1.12)}}
  @keyframes spDrift2{to{transform:translate(-60px,-44px) scale(1.08)}}
  @keyframes spDrift3{to{transform:translate(46px,-34px)}}
  .sp-logo{animation:spFloat 6s ease-in-out 1.4s infinite alternate}
  @keyframes spFloat{to{transform:translateY(-7px)}}
  .sp-logo rect{opacity:0;animation:spTile .65s cubic-bezier(.2,1.5,.4,1) forwards}
  .sp-logo rect:nth-child(1){animation-delay:.08s;transform-origin:2px 2px}
  .sp-logo rect:nth-child(2){animation-delay:.2s;transform-origin:30px 2px}
  .sp-logo rect:nth-child(3){animation-delay:.32s;transform-origin:2px 30px}
  .sp-logo rect:nth-child(4){animation-delay:.44s;transform-origin:30px 30px}
  @keyframes spTile{0%{opacity:0;transform:scale(.2) rotate(-32deg)}100%{opacity:1;transform:scale(1) rotate(0)}}
  .sp-rise{opacity:0;animation:spRise .7s cubic-bezier(.16,1,.3,1) forwards}
  @keyframes spRise{0%{opacity:0;transform:translateY(16px)}100%{opacity:1;transform:translateY(0)}}
  .sp-mod{opacity:0;animation:spPop .5s cubic-bezier(.2,1.4,.4,1) forwards}
  @keyframes spPop{0%{opacity:0;transform:scale(.5) translateY(10px)}100%{opacity:1;transform:scale(1) translateY(0)}}
  .sp-enter{animation:spGlow 2.4s ease-in-out 1.6s infinite}
  @keyframes spGlow{0%,100%{box-shadow:0 0 0 0 rgba(99,102,241,.55)}50%{box-shadow:0 0 0 9px rgba(99,102,241,0)}}
}
@media(max-width:640px){#splash h1{font-size:30px}.sp-tag{font-size:16px}.sp-tag .sp-rot{min-width:118px}.sp-stats{gap:18px}.sp-mods{gap:7px}.sp-mod{width:58px}}
.confetti{position:fixed;top:-12px;z-index:400;width:9px;height:14px;border-radius:2px;animation:confFall 2.6s ease-in forwards;pointer-events:none}
@keyframes confFall{0%{transform:translateY(0) rotate(0)}100%{transform:translateY(105vh) rotate(540deg);opacity:.7}}
.qa-row{display:flex;gap:10px;padding:6px 0;border-bottom:1px dashed var(--line);font-size:12.5px;align-items:center}
.kbd-key{background:var(--bg2);border:1px solid var(--line2);border-bottom-width:2px;border-radius:6px;padding:1px 7px;font-size:11px;font-weight:700;font-family:inherit}
.exp-line{display:grid;grid-template-columns:1fr 110px 90px 26px;gap:8px;margin-bottom:6px}

/* ---------- deep passes r3: drive + meet ---------- */
.dr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;padding:14px 16px}

.meet-wrap{display:grid;grid-template-columns:1fr 280px;gap:14px}

.float-emoji{position:absolute;font-size:30px;animation:floatUp 2.4s ease-out forwards;pointer-events:none;z-index:20}
@keyframes floatUp{0%{transform:translateY(0) scale(.7);opacity:0}15%{opacity:1;transform:translateY(-30px) scale(1.1)}100%{transform:translateY(-260px) scale(1);opacity:0}}
.rec-badge{position:absolute;top:10px;left:12px;background:rgba(239,68,68,.92);color:#fff;font-size:10.5px;font-weight:800;border-radius:7px;padding:2px 8px;display:flex;gap:5px;align-items:center;z-index:10}
.rec-badge:before{content:'';width:7px;height:7px;border-radius:99px;background:#fff;animation:recPulse 1.2s infinite}
@keyframes recPulse{50%{opacity:.3}}
.caption-bar{position:absolute;left:50%;transform:translateX(-50%);bottom:78px;background:rgba(0,0,0,.65);color:#fff;font-size:13px;border-radius:10px;padding:6px 14px;max-width:70%;text-align:center;z-index:10}
.hand-badge{position:absolute;top:8px;right:8px;font-size:18px;animation:recPulse 1.4s infinite}
.meet-present{display:grid;grid-template-rows:1fr 84px;gap:10px;flex:1}
.meet-present .present-stage{background:#1a1f33;border-radius:14px;display:grid;place-items:center;color:#a8adc4;position:relative}
.meet-thumbs{display:flex;gap:8px;overflow-x:auto}
.meet-thumbs .meet-tile{min-height:80px;min-width:120px;flex:none}

/* ---------- deep passes r2: gmail-tier mail + gcal-tier calendar ---------- */
.mail-row{grid-template-columns:24px 24px 180px 1fr auto}
.mail-row input[type=checkbox]{width:15px;height:15px;accent-color:#e25141}
.bulk-bar{display:flex;gap:8px;align-items:center;padding:9px 14px;border-bottom:1px solid var(--line);background:var(--card2)}
.lbl-dot{width:8px;height:8px;border-radius:3px;display:inline-block;flex:none}
.thread-msg{border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:10px}
.thread-msg.mine{background:color-mix(in srgb,#e25141 4%,var(--card))}
.mini-month{font-size:10.5px}
.mini-month table{border-collapse:collapse;width:100%}
.mini-month td{text-align:center;padding:3px 2px;border-radius:6px;cursor:pointer;color:var(--ink2)}
.mini-month td:hover{background:var(--bg)}
.mini-month td.today{background:#2d7ff0;color:#fff;font-weight:700}
.mini-month td.dim{color:var(--ink3);opacity:.45}
.mini-month td.dot{position:relative}
.mini-month td.dot:after{content:'';position:absolute;bottom:0px;left:50%;transform:translateX(-50%);width:3px;height:3px;border-radius:99px;background:#2d7ff0}
.layer-chip{cursor:pointer}
.layer-chip.off{opacity:.4;text-decoration:line-through}
.cw-cell{cursor:pointer}
.cw-cell:hover{background:color-mix(in srgb,#2d7ff0 5%,transparent)}
.cal-month-day{min-height:96px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:5px 7px;font-size:11px;cursor:pointer;overflow:hidden}
.cal-month-day:hover{border-color:#2d7ff0}
.cal-month-day.today{border-color:#2d7ff0;background:color-mix(in srgb,#2d7ff0 5%,var(--card))}
.cal-month-day.dim{opacity:.45}
.cm-ev{border-radius:5px;padding:0 5px;font-size:10px;font-weight:650;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff;margin-top:2px}

/* ---------- deep passes: cheers, slack-tier chat, parity ---------- */
.cheer-composer{background:var(--card);border:2px solid #22c55e44;border-radius:16px;padding:14px 16px;box-shadow:var(--shadow)}
.cheer-composer input{width:100%;border:none;outline:none;background:none;font-size:15px}
.cheer-hint .tok{font-weight:700;border-radius:6px;padding:0 5px}
.msg .m-acts{display:none;gap:4px;margin-left:auto}
.msg:hover .m-acts{display:flex}
.pin-bar{background:var(--warn-soft);border-bottom:1px solid var(--line);padding:7px 16px;font-size:12px;display:flex;gap:8px;align-items:center}
.thread-chip{display:inline-flex;align-items:center;gap:5px;color:#6d28d9;font-size:11.5px;font-weight:700;cursor:pointer;margin-top:4px;background:color-mix(in srgb,#6d28d9 8%,transparent);border-radius:8px;padding:2px 8px}
.mention{background:color-mix(in srgb,#6d28d9 14%,transparent);color:#6d28d9;font-weight:700;border-radius:5px;padding:0 4px}
html.dark .mention{color:#b69af7}
.parity-row{display:flex;gap:10px;padding:7px 0;border-bottom:1px dashed var(--line);align-items:flex-start;font-size:12.5px}
.parity-row:last-child{border-bottom:none}
.p-b{color:#076b4c;font-weight:800}.p-s{color:#8f5c03;font-weight:800}.p-x{color:#b32222;font-weight:800}
html.dark .p-b{color:#4ade9d}html.dark .p-s{color:#fbc34d}html.dark .p-x{color:#f87f7f}

/* ---------- phase 4: deep modules ---------- */
.as-sources{display:flex;gap:5px;flex-wrap:wrap;align-self:flex-start;margin-top:-4px}
.as-sources .chip{font-size:10.5px;padding:1px 8px;cursor:pointer}
#assist-panel.big{width:740px;max-width:calc(100vw - 28px);height:78vh;right:calc(50vw - 370px)}
.hm-cell{text-align:center;font-weight:700;font-size:12px;border-radius:8px;padding:7px 4px;color:#fff}
.ladder-step{display:flex;gap:12px;padding:12px 14px;border:1.5px solid var(--line);border-radius:13px;margin-bottom:9px;align-items:flex-start}
.ladder-step.now{border-color:var(--c-grow);background:color-mix(in srgb,var(--c-grow) 6%,var(--card))}
.ladder-step.next{border-style:dashed}
.player-wrap{display:grid;grid-template-columns:250px 1fr;gap:0;background:var(--card);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;min-height:540px;box-shadow:var(--shadow)}
.player-side{border-right:1px solid var(--line);background:var(--card2);padding:14px 10px}
.lesson-item{display:flex;align-items:center;gap:9px;width:100%;padding:8px 10px;border-radius:9px;font-size:12.5px;font-weight:600;color:var(--ink2);text-align:left}
.lesson-item:hover{background:var(--bg)}
.lesson-item.on{background:color-mix(in srgb,var(--c-learn) 12%,transparent);color:var(--ink)}
.lesson-item .ldot{width:20px;height:20px;border-radius:99px;display:grid;place-items:center;font-size:10px;font-weight:800;background:var(--bg2);color:var(--ink3);flex:none}
.lesson-item.done .ldot{background:var(--ok);color:#fff}
.player-main{padding:26px 30px;overflow-y:auto;max-height:72vh}
.quiz-opt{display:block;width:100%;text-align:left;padding:11px 14px;border:1.5px solid var(--line);border-radius:11px;margin-bottom:8px;font-size:13.5px;transition:all .12s}
.quiz-opt:hover{border-color:var(--c-learn)}
.quiz-opt.sel{border-color:var(--c-learn);background:var(--teal-soft)}
.quiz-opt.right{border-color:var(--ok);background:var(--ok-soft)}
.quiz-opt.wrong{border-color:var(--bad);background:var(--bad-soft)}
.kit-card{border:1.5px solid var(--line);border-radius:13px;padding:13px 15px;margin-bottom:10px}
@media(max-width:900px){.player-wrap{grid-template-columns:1fr}.player-side{display:none}#assist-panel.big{right:14px;width:calc(100vw - 28px)}}

/* ---------- proxy banner ---------- */
#proxy-bar{display:none;position:sticky;top:0;z-index:46;align-items:center;gap:6px;background:linear-gradient(90deg,#9a3412,#d97706);color:#fff;font-size:12.5px;padding:7px 18px;font-weight:550;min-height:34px}

:focus-visible{outline:2px solid var(--brand);outline-offset:2px;border-radius:4px}

/* tour spotlight */

/* responsive */

@media(max-width:900px){

  #main-wrap{margin-left:0}

  .searchpill{display:none}

}
@media(max-width:640px){
  #tabbar{display:grid}
  #main{padding-bottom:130px}
  #assist-fab{bottom:84px;right:14px;width:48px;height:48px}

  .kanban{grid-auto-columns:minmax(200px,72vw)}

  #persona-btn{display:grid}
  #persona-pop{right:10px}

  input,select,textarea,.field input,.field select,.field textarea,.as-foot input,.filterbar input[type=search]{font-size:16px}
}

@media print{#sidebar,#topbar{display:none}#main-wrap{margin:0}}

/* ---------------- utilities ---------------- */

const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const cap=s=>s?s[0].toUpperCase()+s.slice(1):'';
const uid=p=>(p||'X')+'-'+Math.random().toString(36).slice(2,8).toUpperCase();
const clamp=(n,a,b)=>Math.max(a,Math.min(b,n));

const uniq=a=>[...new Set(a)];

/* deterministic PRNG so the seeded world is identical for everyone */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}

const rnd=()=>_rng(), pick=a=>a[Math.floor(rnd()*a.length)], rint=(a,b)=>a+Math.floor(rnd()*(b-a+1));

/* dates — seed is relative to "today" so the demo never goes stale */
const DAY=86400000;
const now=()=>new Date();
const todayISO=()=>iso(now());
function iso(d){const x=new Date(d);return x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0');}
const daysAgo=n=>iso(new Date(Date.now()-n*DAY));
const daysAhead=n=>iso(new Date(Date.now()+n*DAY));
function fmtD(d,opts){if(!d)return'—';return new Date(d+(String(d).length===10?'T12:00:00':'')).toLocaleDateString('en-US',opts||{month:'short',day:'numeric',year:'numeric'});}
const fmtDshort=d=>fmtD(d,{month:'short',day:'numeric'});
function rel(d){const t=new Date(d+(String(d).length===10?'T12:00:00':'')).getTime();const diff=Date.now()-t;const days=Math.round(diff/DAY);
  if(String(d).length===10&&d===todayISO())return 'today';
  if(Math.abs(days)<1){const h=Math.round(diff/3600000);if(Math.abs(h)<1){const m=Math.round(diff/60000);return m<=0?(m<0?`in ${-m}m`:'just now'):`${m}m ago`;}return h<0?`in ${-h}h`:`${h}h ago`;}
  if(days===1)return'yesterday';if(days===-1)return'tomorrow';
  if(days<0)return -days<30?`in ${-days}d`:fmtDshort(d);
  return days<30?`${days}d ago`:fmtD(d);}
const between=(a,b)=>Math.round((new Date(b)-new Date(a))/DAY);
const tenure=d=>{const m=Math.max(0,Math.round((Date.now()-new Date(d))/2592000000));return m<12?m+' mo':(m/12).toFixed(1).replace('.0','')+' yr';};
const monthName=i=>['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][i];

/* money */
const fmt$=n=>n==null?'—':'$'+Math.round(n).toLocaleString('en-US');
const fmtK=n=>n==null?'—':'$'+(n>=1000?Math.round(n/1000)+'K':Math.round(n));
const pct=(a,b)=>b?Math.round(a/b*100):0;

/* avatars */
const HUES=[230,350,160,28,200,275,12,140,320,95,250,185];
const hueOf=name=>HUES[[...name].reduce((a,c)=>a+c.charCodeAt(0),0)%HUES.length];
const initials=name=>name.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
function av(p,size){if(!p)return'';const h=p.hue!=null?p.hue:hueOf(p.name);
  return `<span class="av ${size||'md'}" style="background:linear-gradient(135deg,hsl(${h},72%,58%),hsl(${(h+40)%360},65%,46%))" title="${esc(p.name)}">${initials(p.name)}</span>`;}

/* ============================================================

   All names are invented. Dates are relative to "today" so the
   demo never goes stale.

const COMPANY={name:'Meridian Labs',domain:'meridianlabs.com',tagline:'Friendly robots for everyday homes',founded:2019,hq:'San Francisco'};
const VALUES=['Curious','Customer-obsessed','Craft','Candor','Together'];
const DEPTS=[

];
const deptName=id=>(DEPTS.find(d=>d.id===id)||{}).name||id;
const deptColor=id=>(DEPTS.find(d=>d.id===id)||{}).color||'#6366f1';
const LOCS=['San Francisco HQ','Austin','New York','Remote'];
const LEVELS=['IC1','IC2','IC3','IC4','IC5','IC6','M1','M2','M3','E'];
/* comp bands: [min, mid, max] base salary by level, tech roles get a multiplier */
const BANDS={IC1:[58,68,78],IC2:[72,84,96],IC3:[92,108,124],IC4:[118,138,158],IC5:[148,170,192],IC6:[178,205,232],M1:[132,152,172],M2:[162,186,210],M3:[198,228,258],E:[240,290,340]};
const TECH_DEPTS=['eng','data','it','product','design'];
const bandFor=(level,dept)=>{const b=BANDS[level]||BANDS.IC3;const m=TECH_DEPTS.includes(dept)?1.15:1;return b.map(x=>Math.round(x*m*1000));};
const BONUS_PCT={IC1:5,IC2:5,IC3:8,IC4:10,IC5:12,IC6:15,M1:12,M2:15,M3:20,E:30};
const deslug=s=>s.normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-zA-Z ]/g,'');
const emailOf=name=>deslug(name).toLowerCase().split(' ').join('.')+'@'+COMPANY.domain;

const PRONOUNS=['she/her','he/him','they/them'];
function mkEmp(o){
  const band=bandFor(o.level,o.dept);
  const base=o.base!=null?o.base:Math.round((band[0]+rnd()*(band[2]-band[0]))/500)*500;
  const hireDate=o.hireDate||daysAgo(rint(120,2400));
  const bd=new Date(Date.now()-rint(24,58)*365.25*DAY-rint(0,364)*DAY);
  const birthday=o.birthday||iso(bd).slice(5); // MM-DD
  const hist=[{date:hireDate,type:'Hired',base:Math.round(base*0.88/500)*500,note:'New hire offer'}];
  if(between(hireDate,todayISO())>420){hist.push({date:daysAgo(rint(80,360)),type:'Merit increase',base,note:'Annual merit cycle'});}
  else hist[0].base=base;
  return Object.assign({
    id:o.id,name:o.name,pronouns:o.pronouns||pick(PRONOUNS),email:emailOf(o.name),
    title:o.title,level:o.level,dept:o.dept,team:o.team||deptName(o.dept),
    managerId:o.managerId||null,location:o.loc||pick(LOCS),hireDate,
    status:o.status||'active',type:o.type||'FT',phone:'(415) 555-0'+String(rint(100,199)),
    birthday,hue:hueOf(o.name),
    comp:{base,bonusPct:BONUS_PCT[o.level]||8,equity:rint(2,40)*250,currency:'USD'},
    compHistory:hist,
    pto:{policy:'Standard',vacBalance:o.status==='onboarding'?20:rint(5,17),vacUsed:o.status==='onboarding'?0:rint(2,12),sickBalance:rint(4,10),sickUsed:rint(0,5)},
    docs:[{name:'Signed Offer Letter.pdf',date:daysAgo(between(hireDate,todayISO())+rint(8,20)),kind:'Offer'},
          {name:'Form I-9 (verified).pdf',date:hireDate,kind:'Compliance'},
          {name:'Direct Deposit Authorization.pdf',date:hireDate,kind:'Payroll'},
          {name:'Confidentiality & IP Agreement.pdf',date:hireDate,kind:'Legal'}],
  },o.extra||{});
}

function buildEmployees(){
  const E=[];

}

    items.push({icon:'⚡',kind:'Workflow',text:`${tpl.stages[f.stage]}: ${f.title}`,link:'#/flows',due:f.fields.needBy||daysAhead(3),weight:1,
      acts:[{label:'Open',act:'flowOpen',arg:f.id,cls:'soft'}]});}});
  /* expense reports waiting on my approval (manager step or Finance) */
  ((DB.spend||{}).expenses||[]).filter(x=>expNeedsMe(x)&&x.employeeId!==empId).forEach(x=>{
    const who=emp(x.employeeId);
    items.push({icon:'💳',kind:'Spend',text:`Expense ${x.status==='finance'?'at Finance':'approval'}: ${x.title} — ${fmt$(x.total)}${who?' · '+who.name:''}`,link:'#/spend/expenses',due:daysAhead(2),weight:1,
      acts:[{label:'✓ Approve',act:'expApprove',arg:x.id,cls:'good'},{label:'Reject',act:'expReject',arg:x.id,cls:'ghost'}]});
  });
  /* invoices needing a match decision (Finance group) */
  if(typeof canFinance==='function'&&canFinance()){
    ((DB.spend||{}).invoices||[]).filter(v2=>v2.status==='pending-match').forEach(v2=>{
      items.push({icon:'🧾',kind:'Spend',text:`Invoice ${v2.id} from ${v2.vendor} — ${fmt$(v2.amount)} awaiting match review`,link:'#/spend/invoices',due:v2.due||daysAhead(5),weight:2,
        acts:[{label:'✓ Match & approve',act:'invAdvance',arg:v2.id,cls:'good'}]});
    });
  }
  return items.sort((a,b)=>a.weight-b.weight||String(a.due).localeCompare(String(b.due)));
}

/* ---------------- SVG charts (hand-rolled, theme-aware) ---------------- */
const Chart={
  spark(points,w=110,h=30,color='var(--brand)'){
    if(!points.length)return'';
    const mx=Math.max(...points),mn=Math.min(...points),rg=mx-mn||1;
    const pts=points.map((p,i)=>`${(i/(points.length-1))*w},${h-3-((p-mn)/rg)*(h-7)}`).join(' ');
    return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" aria-hidden="true"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="${pts.split(' ').pop().split(',')[0]}" cy="${pts.split(' ').pop().split(',')[1]}" r="3" fill="${color}"/></svg>`;
  },
  line(series,labels,opts={}){
    const w=opts.w||560,h=opts.h||200,pad={l:34,r:10,t:12,b:24};
    const all=series.flatMap(s=>s.data);
    const mx=opts.max!=null?opts.max:Math.max(...all)*1.12,mn=opts.min!=null?opts.min:Math.min(0,...all);
    const X=i=>pad.l+(i/((labels.length-1)||1))*(w-pad.l-pad.r);
    const Y=v=>pad.t+(1-(v-mn)/((mx-mn)||1))*(h-pad.t-pad.b);
    let g='';
    for(let k=0;k<=3;k++){const v=mn+(mx-mn)*k/3;g+=`<line x1="${pad.l}" x2="${w-pad.r}" y1="${Y(v)}" y2="${Y(v)}" stroke="var(--line)" stroke-width="1"/><text x="${pad.l-6}" y="${Y(v)+3.5}" text-anchor="end" style="font:500 9.5px var(--font-ui);fill:var(--ink3)">${opts.fmt?opts.fmt(v):Math.round(v)}</text>`;}
    labels.forEach((lb,i)=>{if(labels.length>14&&i%2)return;g+=`<text x="${X(i)}" y="${h-7}" text-anchor="middle" style="font:500 9.5px var(--font-ui);fill:var(--ink3)">${lb}</text>`;});
    series.forEach(s=>{
      const pts=s.data.map((v,i)=>`${X(i)},${Y(v)}`).join(' ');
      if(s.area){const first=`${X(0)},${Y(mn)}`,last=`${X(s.data.length-1)},${Y(mn)}`;
        g+=`<polygon points="${first} ${pts} ${last}" fill="${s.color}" opacity="0.08"/>`;}
      g+=`<polyline points="${pts}" fill="none" stroke="${s.color}" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"${s.dash?' stroke-dasharray="5 4"':''}/>`;
      s.data.forEach((v,i)=>g+=`<circle cx="${X(i)}" cy="${Y(v)}" r="2.7" fill="${s.color}"/>`);
    });
    return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto" ${opts.alt?`role="img" aria-label="${esc(opts.alt)}"`:'aria-hidden="true"'}>${g}</svg>`;
  },
  bars(items,opts={}){
    const w=opts.w||560,h=opts.h||200,pad={l:opts.money?44:30,r:8,t:10,b:42};
    const mx=Math.max(...items.map(i=>i.v))*1.12||1;
    const bw=Math.min(44,(w-pad.l-pad.r)/items.length*0.62);
    let g='';
    for(let k=0;k<=3;k++){const v=mx*k/3,y=pad.t+(1-k/3)*(h-pad.t-pad.b);
      g+=`<line x1="${pad.l}" x2="${w-pad.r}" y1="${y}" y2="${y}" stroke="var(--line)"/><text x="${pad.l-6}" y="${y+3.5}" text-anchor="end" style="font:500 9.5px var(--font-ui);fill:var(--ink3)">${opts.fmt?opts.fmt(v):Math.round(v)}</text>`;}
    items.forEach((it,i)=>{
      const x=pad.l+(i+0.5)*((w-pad.l-pad.r)/items.length)-bw/2;
      const bh=(it.v/mx)*(h-pad.t-pad.b),y=h-pad.b-bh;
      g+=`<rect x="${x}" y="${y}" width="${bw}" height="${Math.max(bh,1.5)}" rx="5" fill="${it.color||'var(--brand)'}" opacity="${it.dim?0.4:0.92}"/>`;
      g+=`<text x="${x+bw/2}" y="${y-5}" text-anchor="middle" style="font:650 9.5px var(--font-ui);fill:var(--ink2)">${opts.fmt?opts.fmt(it.v):it.v}</text>`;
      const lab=String(it.label);
      g+=`<text x="${x+bw/2}" y="${h-pad.b+13}" text-anchor="middle" style="font:550 9.5px var(--font-ui);fill:var(--ink3)">${lab.length>9?lab.slice(0,8)+'…':lab}</text>`;
      if(it.sub)g+=`<text x="${x+bw/2}" y="${h-pad.b+25}" text-anchor="middle" style="font:500 9px var(--font-ui);fill:var(--ink3)">${it.sub}</text>`;
    });
    return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto" ${opts.alt?`role="img" aria-label="${esc(opts.alt)}"`:'aria-hidden="true"'}>${g}</svg>`;
  },
  donut(items,size=170,inner=0.62,alt){
    const total=sum(items.map(i=>i.v))||1;const r=size/2-6;const cx=size/2,cy=size/2;
    let a0=-Math.PI/2,g='';
    items.forEach(it=>{
      const frac=it.v/total,a1=a0+frac*2*Math.PI;
      if(frac<=0){a0=a1;return;}
      const large=frac>0.5?1:0;
      const x0=cx+r*Math.cos(a0),y0=cy+r*Math.sin(a0),x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1);
      const ri=r*inner;
      const xi1=cx+ri*Math.cos(a1),yi1=cy+ri*Math.sin(a1),xi0=cx+ri*Math.cos(a0),yi0=cy+ri*Math.sin(a0);
      g+=`<path d="M${x0},${y0} A${r},${r} 0 ${large} 1 ${x1},${y1} L${xi1},${yi1} A${ri},${ri} 0 ${large} 0 ${xi0},${yi0} Z" fill="${it.color}" opacity="0.92"><title>${esc(it.label)}: ${it.v}</title></path>`;
      a0=a1;
    });
    return `<svg viewBox="0 0 ${size} ${size}" style="width:${size}px;height:${size}px;max-width:100%" ${alt?`role="img" aria-label="${esc(alt)}"`:'aria-hidden="true"'}>${g}</svg>`;
  },
  funnel(items){
    const mx=Math.max(...items.map(i=>i.v))||1;
    return `<div class="col" style="gap:7px">${items.map((it,i)=>`
      <div class="row" style="gap:10px"><span class="tiny" style="width:78px;font-weight:650;color:var(--ink2)">${it.label}</span>
      <div style="flex:1;height:26px;background:var(--bg2);border-radius:8px;overflow:hidden"><div style="width:${Math.max(it.v/mx*100,3)}%;height:100%;border-radius:8px;background:${it.color};display:flex;align-items:center;justify-content:flex-end;padding:0 8px;color:#fff;font-size:11px;font-weight:700;min-width:26px">${it.v}</div></div>
      <span class="tiny faint num" style="width:42px">${i>0?Math.round(it.v/(items[i-1].v||1)*100)+'%':''}</span></div>`).join('')}</div>`;
  },
};

function render(){
  ROUTE=parseHash();

  /* same-page re-renders (approvals, checkboxes, goal bumps…) keep your scroll position */
  const key=ROUTE.mod+'/'+(ROUTE.param||'');
  const samePage=key===_lastRouteKey;_lastRouteKey=key;
  const sy=samePage?window.scrollY:0;
  closePopovers();ACT.closeSidebar();
  /* #2: keep focus + caret through same-page re-renders */
  const ae=document.activeElement;
  const keepFocus=samePage&&ae&&ae.id&&$('#main')&&$('#main').contains(ae)?{id:ae.id,val:('value' in ae)?ae.value:null,pos:ae.selectionStart!=null?ae.selectionStart:null}:null;
  renderSidebar();renderTopbar();renderTabbar();renderProxyBar();
  const v=Views[ROUTE.mod];
  $('#main').innerHTML=v?v(ROUTE.param):Views.home();
  $$('#main .card-head h3').forEach(h=>h.setAttribute('aria-level','2'));
  if(samePage){window.scrollTo(0,sy);}else{$('#main').scrollTop=0;window.scrollTo(0,0);}
  if(!samePage)countUpStats();
  runMounts();
  /* restore focus AFTER mounts so view-mount value syncs can't clobber the caret */
  if(keepFocus){const el2=document.getElementById(keepFocus.id);
    if(el2){try{el2.focus({preventScroll:true});
      if(keepFocus.val!=null&&('value' in el2)&&el2.value!==keepFocus.val)el2.value=keepFocus.val;
      if(keepFocus.pos!=null&&el2.setSelectionRange)el2.setSelectionRange(keepFocus.pos,keepFocus.pos);}catch(e){}}}
}

let _gChord=0;
document.addEventListener('keydown',ev=>{
  if((ev.metaKey||ev.ctrlKey)&&ev.key.toLowerCase()==='k'){ev.preventDefault();openPalette();return;}
  const typing=/INPUT|TEXTAREA|SELECT/.test((ev.target||{}).tagName||'')||$('#palette').classList.contains('open')||$('#modal').classList.contains('open');
  if(!typing&&ev.key==='?'){ev.preventDefault();ACT.kbHelp();return;}
  if(!typing&&ev.key==='g'&&!ev.metaKey&&!ev.ctrlKey){_gChord=Date.now();return;}
  if(!typing&&_gChord&&Date.now()-_gChord<900){
    const map2={h:'#/home',p:'#/people',m:'#/mail',c:'#/cal',t:'#/time',w:'#/flows',k:'#/cheers',d:'#/drive',s:'#/spend'};
    if(map2[ev.key]){ev.preventDefault();_gChord=0;nav(map2[ev.key]);return;}
    _gChord=0;
  }
  if(ev.key==='Escape'){closePalette();UI.closeModal();UI.closeDrawer();closePopovers();ACT.closeSidebar();Tour.end();return;}
  /* gmail-style keys inside an open mail thread */
  if(ROUTE.mod==='mail'&&ROUTE.param&&!/INPUT|TEXTAREA|SELECT/.test((ev.target||{}).tagName||'')&&!$('#modal').classList.contains('open')){
    if(ev.key==='e'){ev.preventDefault();ACT.mailArchive(ROUTE.param);return;}
    if(ev.key==='s'){ev.preventDefault();ACT.mailStar(ROUTE.param);return;}
    if(ev.key==='u'){ev.preventDefault();nav('#/mail');return;}
  }
  /* keep keyboard focus inside an open modal/drawer */
  if(ev.key==='Tab'&&!$('#palette').classList.contains('open')){
    const cont=$('#modal').classList.contains('open')?$('#modal .box'):($('#drawer').classList.contains('open')?$('#drawer'):null);
    if(cont){const f=[...cont.querySelectorAll('button,[href],input,select,textarea')].filter(x=>!x.disabled&&x.getClientRects().length);
      if(f.length){const first=f[0],last=f[f.length-1],a=document.activeElement;
        if(ev.shiftKey&&(a===first||!cont.contains(a))){ev.preventDefault();last.focus();}
        else if(!ev.shiftKey&&(a===last||!cont.contains(a))){ev.preventDefault();first.focus();}}
      return;}
  }
  if($('#palette').classList.contains('open')){
    if(ev.key==='ArrowDown'){ev.preventDefault();palSel=Math.min(palSel+1,palItems.length-1);}
    else if(ev.key==='ArrowUp'){ev.preventDefault();palSel=Math.max(palSel-1,0);}
    else if(ev.key==='Enter'){ev.preventDefault();palGo(palSel);return;}
    else return;
    $$('#pal-res .pal-item').forEach(e2=>e2.classList.toggle('sel',+e2.dataset.pi===palSel));
    const sel=$(`#pal-res .pal-item[data-pi="${palSel}"]`);if(sel)sel.scrollIntoView({block:'nearest'});
  }
});

/* ---------------- celebrations helpers ---------------- */
function nextOccurrence(mmdd){
  const [m,d]=mmdd.split('-').map(Number);
  const y=now().getFullYear();
  let dt=new Date(y,m-1,d,12);
  if(iso(dt)<todayISO())dt=new Date(y+1,m-1,d,12);
  return iso(dt);
}
function celebrations(days=21){
  const out=[];
  activeEmps().forEach(e=>{
    const bd=nextOccurrence(e.birthday);
    if(between(todayISO(),bd)<=days)out.push({emp:e,date:bd,kind:'birthday',label:'Birthday'});
    const hd=new Date(e.hireDate+'T12:00:00');
    if(iso(hd)!==todayISO()){
      const ann=nextOccurrence(iso(hd).slice(5));
      const yrs=new Date(ann).getFullYear()-hd.getFullYear();
      if(between(todayISO(),ann)<=days&&yrs>0)out.push({emp:e,date:ann,kind:'anniversary',label:yrs+(yrs===1?' year':' years')});
    }
  });
  return out.sort((a,b)=>a.date.localeCompare(b.date)).slice(0,6);
}
TO_TYPES.leave={label:'Leave of absence',color:'#8b5cf6'};
function whosOut(days=7){
  const from=todayISO(),to=daysAhead(days);
  const pto=DB.timeoff.filter(t=>t.status==='approved'&&t.start<=to&&t.end>=from)
    .map(t=>({...t,emp:emp(t.employeeId)})).filter(t=>t.emp);
  const lv=(DB.leaves||[]).filter(l=>l.status!=='completed'&&l.start<=to&&l.expectedReturn>=from)
    .map(l=>({start:l.start,end:l.expectedReturn,type:'leave',emp:emp(l.employeeId)})).filter(x=>x.emp);
  return pto.concat(lv).sort((a,b)=>a.start.localeCompare(b.start));
}

window._bulkSel=window._bulkSel||new Set();
window.bulkTick=function(id,on){on?_bulkSel.add(id):_bulkSel.delete(id);bulkBar();};
window.bulkAll=function(on){$$('#people-rows input[type=checkbox]').forEach(cb=>{cb.checked=on;on?_bulkSel.add(cb.dataset.eid):_bulkSel.delete(cb.dataset.eid);});bulkBar();};
window.bulkBar=function(){const b=$('#bulk-bar');if(!b)return;b.style.display=_bulkSel.size?'flex':'none';const n=$('#bulk-n');if(n)n.textContent=_bulkSel.size+' selected';};
ACT.bulkClear=()=>{_bulkSel.clear();$$('#people-rows input[type=checkbox]').forEach(cb=>cb.checked=false);bulkBar();};
ACT.bulkApply=()=>{
  const ids=[..._bulkSel];if(!ids.length)return;
  const cid=($('#bulk-course')||{}).value,gid=($('#bulk-group')||{}).value;
  if(!cid&&!gid){UI.toast('Pick a course or a group first','🤔');return;}
  let did=[];
  if(cid){const c=COURSES.find(x=>x.id===cid);
    ids.forEach(eid=>{if(!DB.enrollments.some(en=>en.employeeId===eid&&en.courseId===cid))DB.enrollments.push({id:uid('EN'),employeeId:eid,courseId:cid,progress:0,due:daysAhead(30),assignedBy:DB.me.employeeId});
      notify(eid,'📚',`Assigned: ${c.title} — due in 30 days`,'#/learn');});
    did.push(`assigned “${c.title}”`);}
  if(gid){const g=byId(DB.groups,gid);
    ids.forEach(eid=>{if(!g.members.includes(eid))g.members.push(eid);});
    did.push(`added to ${g.name}`);}
  audit('Bulk action',ids.length+' people · '+did.join(' + '));
  Store.save();UI.toast(ids.length+' people — '+did.join(' & '),'✅');ACT.bulkClear();render();
};
ACT.bulkCSV=()=>{
  const ids=[..._bulkSel];if(!ids.length)return;
  const rows=[['ID','Name','Title','Department','Location','Manager','Hired','Status']]
    .concat(ids.map(id=>{const e=emp(id)||{};return [e.id,e.name,e.title,deptName(e.dept),e.location,(emp(e.managerId)||{}).name||'',e.hireDate,e.status];}));
  const csv=rows.map(r=>r.map(x=>'"'+String(x==null?'':x).replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='mosaic-people.csv';a.click();
  UI.toast(ids.length+' people exported','⬇️');
};

window.filterPeople=function(){

  onMount(()=>{const w=$('.org-wrap');if(w)w.scrollLeft=(w.scrollWidth-w.clientWidth)/2;
    if(UIS.orgZoom&&UIS.orgZoom!==1){const z=$('#org-inner');if(z){z.style.transform='scale('+UIS.orgZoom+')';z.style.transformOrigin='top left';}}});
  return `
  <div class="page-head">
    <div style="flex:1"><h1 class="page">Org chart</h1><div class="page-sub">Click anyone to open their profile · ⊖ collapses a branch</div></div>
    <div class="seg"><button data-act="nav" data-arg="#/people">Directory</button><button class="on">Org chart</button></div>
  </div>
  <div class="row mb12" style="gap:8px;flex-wrap:wrap">
    <input type="search" placeholder="Find someone in the tree…" style="max-width:240px" oninput="orgSearch(this.value)">
    <span class="spacer"></span>
    <button class="btn sm ghost" data-act="orgZoom" data-arg="-0.15" aria-label="Zoom out">−</button>
    <span class="chip num">${Math.round((UIS.orgZoom||1)*100)}%</span>
    <button class="btn sm ghost" data-act="orgZoom" data-arg="0.15" aria-label="Zoom in">+</button>
    <button class="btn sm ghost" onclick="window.print()">🖨 Print / PDF</button>
  </div>
  <div class="card" style="padding:14px"><div class="org-wrap"><div id="org-inner">${orgNode(root)}</div></div></div>`;
}
function orgNode(e){
  const kids=reportsOf(e.id);
  const isMe=e.id===DB.me.employeeId;
  const collapsed=(UIS.orgCollapsed||{})[e.id];
  const card=`<div class="org-card" onclick="nav('#/people/${e.id}')" style="${isMe?'border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)':''}">
    ${av(e,'md')}<span class="col" style="gap:0"><b style="font-size:12.5px;white-space:nowrap">${esc(e.name)}</b>
    <span class="tiny faint" style="white-space:nowrap">${esc(e.title)}</span></span>
    ${kids.length?`<span class="org-count">${kids.length+allReportsOf(e.id).length-kids.length>kids.length?allReportsOf(e.id).length:kids.length}</span>
    <button class="org-fold" onclick="event.stopPropagation();ACT.orgCollapse('${e.id}')" title="${collapsed?'Expand':'Collapse'} branch" aria-label="${collapsed?'Expand':'Collapse'} branch">${collapsed?'⊕':'⊖'}</button>`:''}</div>`;
  if(!kids.length)return `<div class="org-node">${card}</div>`;
  if(collapsed)return `<div class="org-node">${card}<div class="tiny faint" style="text-align:center;margin-top:4px">${allReportsOf(e.id).length} hidden</div></div>`;
  /* group large IC sets into a stack to keep the tree readable */
  const expand=kids.filter(k=>reportsOf(k.id).length>0);
  const leaves=kids.filter(k=>reportsOf(k.id).length===0);
  let kidsHtml=expand.map(k=>`<div class="org-node" style="position:relative"><span class="org-up"></span>${orgNode(k)}</div>`).join('');
  if(leaves.length){
    kidsHtml+=`<div class="org-node" style="position:relative"><span class="org-up"></span><div class="org-card" style="flex-direction:column;align-items:flex-start;gap:7px;min-width:200px;cursor:default">
      ${leaves.map(k=>`<span class="row" style="gap:8px;cursor:pointer" onclick="event.stopPropagation();nav('#/people/${k.id}')">${av(k,'xs')}<span class="tiny" style="font-weight:600">${esc(k.name)}</span><span class="tiny faint" style="margin-left:auto">${esc(k.title.split(',')[0])}</span></span>`).join('')}</div></div>`;
  }
  return `<div class="org-node">${card}<div class="org-down"></div><div class="org-kids"><span class="org-bridge" style="left:25%;right:25%"></span>${kidsHtml}</div></div>`;
}
