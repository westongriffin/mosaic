function growTalent(){
  const past=DB.cycles.find(c=>c.stage==='done');
  const pool=myRole()==='manager'?allReportsOf(DB.me.employeeId):DB.employees.filter(e=>e.status==='active');
  const cells={};
  pool.forEach(e=>{
    const r=DB.reviews.find(x=>x.cycleId===past.id&&x.employeeId===e.id&&x.type==='manager');
    if(!r||!r.rating)return;
    const perf=r.rating<=2?0:r.rating===3?1:2;
    const pot=r.potential==='High'?2:r.potential==='Medium'?1:0;
    (cells[pot+'-'+perf]=cells[pot+'-'+perf]||[]).push(e);
  });
  const names=[['Enigma','Growth talent','Future star'],['Inconsistent','Core talent','High performer'],['Risk','Solid pro','Trusted expert']];
  const tones=[['var(--warn-soft)','var(--teal-soft)','var(--ok-soft)'],['var(--bad-soft)','var(--bg2)','var(--teal-soft)'],['var(--bad-soft)','var(--bg2)','var(--ok-soft)']];
  let grid='';
  for(let pot=2;pot>=0;pot--){for(let perf=0;perf<3;perf++){
    const ppl=cells[pot+'-'+perf]||[];
    grid+=`<div class="nb-cell" style="background:${tones[2-pot][perf]}"><h5>${names[2-pot][perf]} <span class="faint">(${ppl.length})</span></h5>
      <div class="row wrap">${ppl.slice(0,9).map(e=>`<button data-act="talentPacket" data-arg="${e.id}" title="${esc(e.name)} — open calibration packet" style="padding:0">${av(e,'sm')}</button>`).join('')}${ppl.length>9?`<span class="tiny faint">+${ppl.length-9}</span>`:''}</div></div>`;}}
  return `<div class="card pad">
    <div class="row between wrap mb16"><div><b>Talent map — ${esc(past.name)}</b><div class="tiny faint">Performance (→) × Potential (↑) · ${myRole()==='manager'?'your org':'company-wide'} · visible to managers & People team only</div></div>
    <span class="legend"><span><i style="background:var(--ok)"></i>invest & retain</span><span><i style="background:var(--warn)"></i>coach</span><span><i style="background:var(--bad)"></i>act</span></span></div>
    <div class="ninebox">${grid}</div>
    <div class="row between mt12 tiny faint"><span>← lower performance</span><span>higher performance →</span></div></div>`;
}

function weekdaysBetween(a,b){let n=0;const d=new Date(a+'T12:00:00'),end=new Date(b+'T12:00:00');

function calMonth(){
  const t=now();const y=t.getFullYear(),m=t.getMonth();
  const first=new Date(y,m,1),startDow=first.getDay(),dim=new Date(y,m+1,0).getDate();
  const approved=DB.timeoff.filter(x=>x.status==='approved');
  let cells='';
  for(let i=0;i<startDow;i++)cells+='<div class="day off"></div>';
  for(let d=1;d<=dim;d++){
    const dt=iso(new Date(y,m,d,12));
    const hol=DB.holidays.find(h=>h.date===dt);
    const offAll=approved.filter(x=>x.start<=dt&&x.end>=dt);
    const off=offAll.slice(0,2);
    cells+=`<div class="day ${dt===todayISO()?'today':''}"><span class="dnum">${d}</span>
      ${hol?`<div class="ev" style="background:var(--c-engage)" title="${esc(hol.name)}">🎉 ${esc(hol.name.split(' ')[0])}</div>`:''}
      ${off.map(x=>{const e=emp(x.employeeId);return e?`<div class="ev" style="background:${TO_TYPES[x.type].color}" title="${esc(e.name)} — ${TO_TYPES[x.type].label}">${initials(e.name)} · ${TO_TYPES[x.type].label.split(' ')[0]}</div>`:'';}).join('')}
      ${offAll.length>2?`<div class="ev" style="background:var(--ink3)" title="${esc(offAll.slice(2).map(x=>(emp(x.employeeId)||{name:''}).name).join(', '))}">+${offAll.length-2} more</div>`:''}</div>`;
  }
  return `<div class="row between mb12"><b class="small">${t.toLocaleDateString('en-US',{month:'long',year:'numeric'})} — who's out</b>
    <span class="legend">${Object.values(TO_TYPES).slice(0,3).map(x=>`<span><i style="background:${x.color}"></i>${x.label}</span>`).join('')}</span></div>
  <div class="cal">${['S','M','T','W','T','F','S'].map(d=>`<div class="dow">${d}</div>`).join('')}${cells}</div>`;
}

window.toCalcDays=()=>{const s=$('#to-start'),e=$('#to-end'),out=$('#to-days');if(!s||!e||!out)return;
  const n=weekdaysBetween(s.value,e.value<s.value?s.value:e.value);
  out.textContent=n+' working day'+(n===1?'':'s')+(n>5?' — needs manager + People-team approval':'');};
ACT.submitTimeReq=()=>{
  const my=me();
  const start=$('#to-start').value,endRaw=$('#to-end').value;
  const end=endRaw<start?start:endRaw;
  const days=weekdaysBetween(start,end);
  const type=$('#to-type').value;
  const req={id:uid('TO'),employeeId:my.id,type,start,end,days,note:$('#to-note').value.trim(),status:'pending',submittedAt:todayISO()};
  if(days>5&&my.managerId)req.chain=[{label:'Manager',id:my.managerId,status:'pending'},{label:'People team',id:'E021',status:'pending'}];
  DB.timeoff.unshift(req);
  const mgr=emp(my.managerId);
  if(mgr)notify(mgr.id,'🏖️',`${my.name} requested ${days}d ${TO_TYPES[type].label.toLowerCase()} (${fmtDshort(start)}–${fmtDshort(end)})`,'#/time');
  audit('Time-off requested',`${my.name} · ${days}d ${type}`);
  Store.save();UI.closeModal();render();
  UI.toast(`Request sent to <b>${esc(mgr?mgr.name:'your manager')}</b> — it's already in their inbox`,'🏖️');
};
ACT.decideTO=arg=>{
  const [id,decision]=arg.split('|');
  const t=byId(DB.timeoff,id);if(!t)return;
  const e=emp(t.employeeId);
  /* multi-step chain: approve advances; deny ends */
  if(t.chain&&decision==='approved'){
    const cur=chainCurrent(t.chain);
    if(cur){cur.status='approved';cur.by=DB.me.employeeId;cur.at=todayISO();}
    if(!chainDone(t.chain)){
      const next=chainCurrent(t.chain);
      notify(next.id,'⛓️',`${e.name}'s ${t.days}d request cleared step ${t.chain.indexOf(next)} — your sign-off is next`,'#/time');
      notify(e.id,'👍',`Your request passed ${cur.label} approval — now with ${next.label}`,'#/time');
      audit('Time-off step approved',e.name+' · '+cur.label);
      Store.save();render();
      UI.toast(`Step approved — routed to <b>${esc((emp(next.id)||{}).name||next.label)}</b> for final sign-off`,'⛓️');
      return;
    }
  }
  t.status=decision;t.approverId=DB.me.employeeId;t.decidedAt=todayISO();
  if(decision==='approved'){
    if(t.type==='vacation'){e.pto.vacBalance=Math.max(0,e.pto.vacBalance-t.days);e.pto.vacUsed+=t.days;}
    if(t.type==='sick'){e.pto.sickBalance=Math.max(0,e.pto.sickBalance-t.days);e.pto.sickUsed+=t.days;}
  }
  notify(e.id,decision==='approved'?'✅':'❌',`Your ${TO_TYPES[t.type].label.toLowerCase()} request (${fmtDshort(t.start)}–${fmtDshort(t.end)}) was ${decision}`,'#/time');
  audit('Time-off '+decision,e.name+' · '+t.days+'d '+t.type);
  Store.save();render();
  if(decision==='approved')UI.toast(`Approved — <b>${esc(e.name)}</b>'s balance updated & calendar synced`,'✅');
  else UI.toast(`Request denied — ${esc(e.name)} has been notified`,'📭',{label:'Undo',fn:()=>{
    t.status='pending';delete t.approverId;delete t.decidedAt;Store.save();render();
    UI.toast('Denial undone — the request is pending again','↩️');}});
};

function headcountTrend(){
  const labels=[],counts=[];
  for(let i=11;i>=0;i--){
    const d=new Date();d.setMonth(d.getMonth()-i);
    const mEnd=iso(new Date(d.getFullYear(),d.getMonth()+1,0));
    const hc=DB.employees.filter(e=>e.hireDate<=mEnd&&e.status!=='terminated').length
      +DB.former.filter(f=>f.termDate>mEnd).length;
    labels.push(monthName(d.getMonth()));counts.push(hc);
  }
  return {labels,counts};
}

ACT.submitCase=()=>{

  const c={id:'HD-'+rint(110,999),employeeId:DB.me.employeeId,subject,cat:$('#hc-cat').value,status:'open',priority:$('#hc-pri').value,assigneeId:'E021',createdAt:todayISO(),
    messages:[{at:todayISO(),fromId:DB.me.employeeId,text:$('#hc-body').value.trim()||subject}]};

  notify('E021','🎟️',`New ${c.priority} case from ${me().name}: ${subject}`,'#/help');

ACT.openCase=cid=>{
  const c=byId(DB.cases,cid);if(!c)return;
  const e=emp(c.employeeId);
  const isPeopleTeam=isAdmin()||me().dept==='people';
  UI.drawer({
    head:`<span class="notif-ic" style="background:var(--rose-soft);font-size:15px">🎟️</span><div class="col" style="gap:1px">
      <div class="row" style="gap:8px"><b style="font-size:15px">${esc(c.subject)}</b>${badge(c.status)}</div>
      <span class="tiny muted">${c.id} · ${c.cat} · ${badge(c.priority)} · opened ${rel(c.createdAt)}</span></div>`,
    body:`
      <div class="row mb16" style="gap:9px">${av(e,'sm')}<span class="small">From <b>${esc(e.name)}</b> — ${esc(e.title)}</span>
        <span class="spacer"></span><span class="tiny faint">assigned to ${esc((emp(c.assigneeId)||{}).name||'People Ops')}</span></div>
      <div class="col" style="gap:10px">${c.messages.map(m=>{const from=emp(m.fromId);const isReq=m.fromId===c.employeeId;

          <div class="tiny faint" style="margin-top:3px;${isReq?'':'text-align:right'}">${esc(from?from.name:'')} · ${rel(m.at)}</div></div>`;}).join('')}</div>
      ${c.status!=='solved'?`
      ${isPeopleTeam?`<div class="row mt16" style="gap:8px"><select onchange="if(this.value){document.querySelector('#case-reply').value=this.value;this.selectedIndex=0;}" style="flex:1;background:var(--bg);border:1.5px solid var(--line);border-radius:9px;padding:7px 10px;font-size:12px;color:var(--ink2)"><option value="">📋 Insert a canned reply…</option>${CANNED.map(cn=>`<option value="${esc(cn.text)}">${cn.label}</option>`).join('')}</select></div>`:''}
      <div class="field ${isPeopleTeam?'mt8':'mt16'}"><label>Reply</label><textarea id="case-reply" placeholder="${isPeopleTeam?'Answer with policy links where you can…':'Add more details…'}"></textarea>
      ${isPeopleTeam?`<label class="row tiny" style="gap:7px;cursor:pointer;margin-top:6px"><input type="checkbox" id="case-internal" style="width:14px;height:14px;accent-color:var(--warn)"> 🔒 Internal note — visible to the People team only</label>`:''}</div>`:
      `<div class="card pad mt16" style="background:var(--ok-soft);border-color:transparent;box-shadow:none"><b class="small" style="color:var(--ok)">✓ Solved${c.csat?' · rated '+c.csat+'/5 by '+esc(e.name.split(' ')[0]):''}</b></div>`}`,
    foot:c.status!=='solved'?`${isPeopleTeam&&c.cat==='Verification'?`<button class="btn soft" data-act="genVerifyLetter" data-arg="${c.employeeId}">${I.doc} Generate letter</button>`:''}
      <button class="btn ghost" data-act="replyCase" data-arg="${c.id}">Send reply</button>
      ${isPeopleTeam?`<button class="btn primary" style="--brand:var(--ok);--brand-deep:#0d9668" data-act="solveCase" data-arg="${c.id}">${I.check} Resolve case</button>`:''}`:''
  });
};
ACT.replyCase=cid=>{
  const c=byId(DB.cases,cid);const inp=$('#case-reply');
  if(!c||!inp||!inp.value.trim())return;
  const internal=$('#case-internal')&&$('#case-internal').checked;
  c.messages.push({at:todayISO(),fromId:DB.me.employeeId,text:inp.value.trim(),isInternal:!!internal});
  if(internal){Store.save();ACT.openCase(cid);UI.toast('Internal note added — the requester can\'t see it','🔒');return;}
  if(!c.firstResponseAt&&DB.me.employeeId!==c.employeeId)c.firstResponseAt=todayISO();
  if(DB.me.employeeId!==c.employeeId){c.status='waiting';notify(c.employeeId,'💬',`Reply on your case ${c.id}: ${c.subject}`,'#/help');}
  else c.status='open';
  Store.save();ACT.openCase(cid);UI.toast('Reply sent','💬');
};
ACT.solveCase=cid=>{
  const c=byId(DB.cases,cid);if(!c)return;
  c.status='solved';c.csat=5;
  notify(c.employeeId,'✅',`Your case ${c.id} was resolved — mind rating it?`,'#/help');
  audit('Case resolved',c.id);
  Store.save();UI.closeDrawer();render();UI.toast('Case resolved — CSAT survey sent','✅');
};

/* ============================================================
   DOCUMENT ENGINE — real PDFs, hand-rolled (zero libraries)
   ============================================================ */
const pdfSan=s=>String(s).normalize('NFKD').replace(/[̀-ͯ]/g,'').replace(/[‘’]/g,"'").replace(/[“”]/g,'"').replace(/[–—]/g,'-').replace(/[^\x20-\x7E]/g,'').replace(/\\/g,'\\\\').replace(/\(/g,'\\(').replace(/\)/g,'\\)');
function pdfWrap(t,max){const out=[];String(t).split('\n').forEach(par=>{const words=par.split(/\s+/);let cur='';
  words.forEach(w=>{if((cur+' '+w).trim().length>max){out.push(cur.trim());cur=w;}else cur+=' '+w;});out.push(cur.trim());});
  return out.length?out:[''];}
function makePDF(blocks){
  let y=712,ops='';
  /* letterhead: the four mosaic tiles + wordmark + rule */
  [[0.39,0.40,0.95],[0.94,0.39,0.55],[0.08,0.72,0.65],[0.96,0.62,0.04]].forEach((c,i)=>{
    ops+=`${c[0]} ${c[1]} ${c[2]} rg ${72+(i%2)*11} ${i<2?751:740} 9 9 re f\n`;});
  ops+=`BT /F2 14 Tf 0.07 0.09 0.17 rg 98 747 Td (Mosaic) Tj ET\n`;
  ops+=`BT /F1 8 Tf 0.54 0.56 0.65 rg 98 737 Td (${pdfSan(COMPANY.name+' | '+COMPANY.hq+' | '+COMPANY.domain)}) Tj ET\n`;
  ops+=`0.85 0.86 0.93 RG 1.2 w 72 726 m 540 726 l S\n`;
  blocks.forEach(b=>{
    const size=b.size||10.5,lh=size*1.5;
    const col=b.color||[0.10,0.11,0.18];
    pdfWrap(b.t,Math.floor(470/(size*0.52))).forEach(line=>{
      ops+=`BT /${b.bold?'F2':'F1'} ${size} Tf ${col[0]} ${col[1]} ${col[2]} rg 72 ${Math.round(y)} Td (${pdfSan(line)}) Tj ET\n`;
      y-=lh;});
    y-=(b.gap!=null?b.gap:5);
  });
  ops+=`BT /F1 7.5 Tf 0.6 0.62 0.7 rg 72 48 Td (${pdfSan('Generated by Mosaic for '+COMPANY.name+' on '+fmtD(todayISO())+' - demo document, fictional data')}) Tj ET\n`;
  const objs=[];
  objs[1]='<</Type/Catalog/Pages 2 0 R>>';
  objs[2]='<</Type/Pages/Kids[3 0 R]/Count 1>>';
  objs[3]='<</Type/Page/Parent 2 0 R/MediaBox[0 0 612 792]/Resources<</Font<</F1 4 0 R/F2 5 0 R>>>>/Contents 6 0 R>>';
  objs[4]='<</Type/Font/Subtype/Type1/BaseFont/Helvetica>>';
  objs[5]='<</Type/Font/Subtype/Type1/BaseFont/Helvetica-Bold>>';
  objs[6]='<</Length '+ops.length+'>>\nstream\n'+ops+'endstream';
  let out='%PDF-1.4\n';const offs=[0];
  for(let i=1;i<=6;i++){offs[i]=out.length;out+=i+' 0 obj\n'+objs[i]+'\nendobj\n';}
  const xref=out.length;
  out+='xref\n0 7\n0000000000 65535 f \n';
  for(let i=1;i<=6;i++)out+=String(offs[i]).padStart(10,'0')+' 00000 n \n';
  out+='trailer\n<</Size 7/Root 1 0 R>>\nstartxref\n'+xref+'\n%%EOF';
  return out;
}

/* ============================================================
   FLIGHT RISK — rule-based retention signals (illustrative)
   ============================================================ */
function flightRisk(e){
  if(!e||e.status!=='active')return {score:0,tier:'low',reasons:[]};
  const rs=[];let s=0;
  const cr=e.comp.base/bandFor(e.level,e.dept)[1];
  if(cr<0.9){s+=25;rs.push('Paid '+Math.round((1-cr)*100)+'% below band mid');}
  const gl=DB.goals.filter(g=>g.ownerId===e.id);
  if(gl.some(g=>g.status==='behind')){s+=15;rs.push('Goal behind schedule');}
  else if(gl.some(g=>g.status==='at-risk')){s+=8;rs.push('Goal at risk');}
  const praise=DB.feedback.filter(f=>fbRecipients(f).includes(e.id)).sort((a,b)=>b.at.localeCompare(a.at))[0];
  if(!praise||between(praise.at,todayISO())>60){s+=12;rs.push('No recognition in 60+ days');}
  if(!e.compHistory.some(h=>h.type==='Promotion')&&between(e.hireDate,todayISO())>900){s+=18;rs.push('No growth event in '+tenure(e.hireDate));}
  const sv=DB.surveys.find(x=>x.status==='live');
  if(sv&&!sv.respondedIds.includes(e.id)){s+=7;rs.push('Skipped latest pulse');}
  if(DB.timeoff.some(t=>t.employeeId===e.id&&t.status==='denied'&&between(t.decidedAt||t.start,todayISO())<90)){s+=10;rs.push('PTO denied in last 90d');}
  const mgr=emp(e.managerId);
  if(mgr&&reportsOf(mgr.id).length>8){s+=5;rs.push('Manager has '+reportsOf(mgr.id).length+' directs');}
  s=clamp(s,0,100);
  return {score:s,tier:s>=50?'high':s>=28?'watch':'low',reasons:rs};
}
const riskPill=r=>`<span class="risk-pill risk-${r.tier}" title="Rule-based signal, not a prediction">${r.tier==='high'?'🔥':r.tier==='watch'?'👀':'🌿'} ${r.tier==='high'?'High risk':r.tier==='watch'?'Watch':'Healthy'} · ${r.score}</span>`;

  if(e.managerId)notify(e.managerId,'🎉',`${e.name}'s promotion to ${lvl} is confirmed`,'#/people/'+eid);

  UI.modal({title:'🧩 Promotion wired through everything',sub:e.name+' — '+old.level+' → '+lvl,body:`
    <div class="col" style="gap:9px">
      ${[['💸','Pay',`Base ${fmt$(old.base)} → <b>${fmt$(e.comp.base)}</b> · bonus ${e.comp.bonusPct}% · history entry added`,'#/people/'+eid],

        ['🎯','Performance','New-level 90-day goal seeded','#/grow'],

        ['📈','Insights','Compa-ratio & band analytics refreshed','#/insights']]

ACT.toggleOffbTask=arg=>{
  const [obId,taskId]=arg.split('|');
  const ob=byId(DB.offboarding,obId);if(!ob)return;
  const t=byId(ob.tasks,taskId);if(!t)return;
  t.done=!t.done;t.doneAt=t.done?todayISO():null;
  if(t.done&&t.title.includes('Okta'))UI.toast('SCIM deprovision request sent — access ends on last day','🔐');
  const e=emp(ob.employeeId);
  if(ob.tasks.every(x=>x.done)&&e.status==='offboarding'){
    e.status='terminated';
    DB.former.unshift({id:uid('X'),name:e.name,dept:e.dept,termDate:ob.lastDay,reason:ob.reason,regret:ob.regret});
    notify('E007','🕊️',`${e.name}'s offboarding is complete — moved to alumni`,'#/insights');
    audit('Offboarding completed',e.name+' → alumni');
    UI.toast(`<b>${esc(e.name)}</b>'s journey is complete — attrition analytics updated 🕊️`,'👋');
  }
  Store.save();render();
};

  }else if(LIFE.step===2){

      <div class="field"><label>Dependents to add</label><select id="le-deps">${[0,1,2,3].map(n=>`<option ${n===(LIFE.data.deps!=null?LIFE.data.deps:1)?'selected':''}>${n}</option>`).join('')}</select></div>
      <div class="field"><label>Medical plan</label><select id="le-plan">${meds.map(p=>`<option value="${p.id}" ${p.id===(LIFE.data.plan||el.medical)?'selected':''}>${p.name} — you pay ${fmt$(p.premium)}/mo</option>`).join('')}</select></div>`;
    foot=`<button class="btn ghost" data-act="lifeBack">Back</button><button class="btn primary" style="--brand:var(--c-pay);--brand-deep:#0d9668" data-act="lifeNext2">Review</button>`;
  }else{
    const deadline=iso(new Date(new Date(LIFE.data.date).getTime()+30*DAY));
    const late=deadline<todayISO();
    const plan=byId(BEN_PLANS,LIFE.data.plan);
    body=`<div class="card pad" style="box-shadow:none;background:var(--card2)">
      <dl class="kv"><dt>Event</dt><dd>${LIFE.data.event}</dd><dt>Date</dt><dd>${fmtD(LIFE.data.date)}</dd>
      <dt>Deadline</dt><dd style="${late?'color:var(--bad);font-weight:700':''}">${fmtD(deadline)}${late?' — window closed':''}</dd>
      <dt>Dependents</dt><dd>+${LIFE.data.deps}</dd><dt>Medical</dt><dd>${plan?esc(plan.name):'—'}</dd></dl></div>
      ${late?`<p class="small mt12" style="color:var(--bad)">This event is past its 30-day window — changes will need to wait for open enrollment (Nov 1–15), or contact People Ops for exceptions.</p>`
      :'<p class="tiny faint mt12">Submitting updates your elections immediately and notifies payroll for the next cycle. Documentation may be requested.</p>'}`;
    foot=`<button class="btn ghost" data-act="lifeBack">Back</button>${late?'<button class="btn ghost" data-act="openNewCase">Ask People Ops</button>':`<button class="btn primary" style="--brand:var(--c-pay);--brand-deep:#0d9668" data-act="lifeSubmit">Submit changes</button>`}`;
  }
  UI.modal({title:'Report a life event',sub:'Step '+LIFE.step+' of 3',body,foot});
}
ACT.lifePick=ev=>{LIFE.data.event=ev;lifeRender();};
ACT.lifeNext=()=>{if(!LIFE.data.event)return;LIFE.step=2;lifeRender();};
ACT.lifeBack=()=>{if(LIFE.step===2){LIFE.data.date=($('#le-date')||{}).value;}LIFE.step=Math.max(1,LIFE.step-1);lifeRender();};
ACT.lifeNext2=()=>{LIFE.data.date=$('#le-date').value||daysAgo(3);LIFE.data.deps=+$('#le-deps').value;LIFE.data.plan=$('#le-plan').value;LIFE.step=3;lifeRender();};
ACT.lifeSubmit=()=>{
  let el=DB.benefits.find(b=>b.employeeId===DB.me.employeeId);
  if(!el){el={employeeId:DB.me.employeeId,medical:null,dental:null,vision:null,k401:0,dependents:0};DB.benefits.push(el);}
  el.medical=LIFE.data.plan||el.medical;
  el.dependents=(el.dependents||0)+(LIFE.data.deps||0);
  (DB.lifeEvents=DB.lifeEvents||[]).unshift({id:uid('LE'),employeeId:DB.me.employeeId,kind:LIFE.data.event,date:LIFE.data.date,deadline:iso(new Date(new Date(LIFE.data.date).getTime()+30*DAY)),changes:'+'+(LIFE.data.deps||0)+' dependent(s) · '+((byId(BEN_PLANS,LIFE.data.plan)||{}).name||'no plan change'),status:'approved'});
  me().docs.unshift({name:'Life Event Confirmation — '+LIFE.data.event+'.pdf',date:todayISO(),kind:'Benefits'});
  notify('E021','🧾',`${me().name} reported a life event (${LIFE.data.event}) — elections updated`,'#/pay');
  audit('Life event processed',LIFE.data.event+' · +'+LIFE.data.deps+' dependents');
  Store.save();UI.closeModal();render();
  UI.toast('Elections updated — payroll picks it up next cycle. Confirmation saved to your documents 🧾','✅');
};

/* ============================================================

function goalTreeRow(g,depth){
  const owner=g.ownerId?emp(g.ownerId):null;
  const kids=DB.goals.filter(x=>x.parentId===g.id);
  const color=g.status==='behind'?'var(--bad)':g.status==='at-risk'?'var(--warn)':g.status==='done'?'var(--c-time)':'var(--c-grow)';
  return `<div class="gt-row">${depth?'<span class="gt-elbow"></span>':''}
    ${owner?av(owner,'sm'):`<span class="av sm" style="background:linear-gradient(135deg,var(--brand),#9333ea);font-size:11px">🏁</span>`}
    <span class="col" style="gap:0;flex:1;min-width:0"><b class="small" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(g.title)}</b>
    <span class="tiny faint">${owner?esc(owner.name):'Company OKR'} · due ${fmtDshort(g.due)}</span></span>
    ${badge(g.status)}<span class="gt-bar">${progressBar(g.progress,color)}</span></div>
    ${kids.length?`<div class="gt-kids">${kids.map(k=>goalTreeRow(k,depth+1)).join('')}</div>`:''}`;
}
function goalTree(){
  const roots=DB.goals.filter(g=>g.scope==='company');
  const orphans=DB.goals.filter(g=>g.scope==='individual'&&!g.parentId);
  return `<div class="card pad">
    <div class="row between wrap mb12"><b>Alignment tree — every goal ladders up</b><span class="tiny faint">company → department → individual</span></div>
    ${roots.map(r=>goalTreeRow(r,0)).join('<div class="divider"></div>')}
    ${orphans.length?`<div class="divider"></div><div class="tiny faint mb8" style="font-weight:700;letter-spacing:.05em;text-transform:uppercase">Personal growth goals (intentionally unaligned)</div>${orphans.map(o=>goalTreeRow(o,0)).join('')}`:''}
  </div>`;
}

/* ============================================================
   ASK MOSAIC — assistant (rule-based demo; swap for Claude API in prod)
   ============================================================ */
const Assist={
  open:false,hist:[],
  toggle(){this.open=!this.open;if(this.open&&!this.hist.length)this.greet();this.render();},
  greet(){
    const my=me();
    this.hist.push({who:'bot',html:`Hey ${esc(my.name.split(' ')[0])} 👋 I'm <b>Ask Mosaic</b>. I can answer from your live HR data — balances, approvals, people, policies — or draft things for you. Try a chip below.`});
  },
  chips(){
    const role=myRole();
    const base=['How much PTO do I have?','Who\'s out this week?','What courses are due?'];
    if(role==='admin')return base.concat(['Who\'s a flight risk?','Draft a JD for a robotics engineer','How\'s the pulse looking?']);
    if(role==='manager')return base.concat(['What\'s waiting on me?','Draft praise for Jordan']);
    return base.concat(['How does the 401k match work?','What\'s our parental leave?']);
  },
  send(q){
    if(!q.trim())return;
    this.hist.push({who:'user',html:esc(q)});
    const a=this.answer(q.toLowerCase(),q);
    this.hist.push(Object.assign({who:'bot'},a));
    this.render();
  },
  answer(q,raw){
    const my=me();
    /* daily briefing — synthesis across every module */
    if(/brief(ing)?( me)?|start my day|good morning|my day\b/.test(q)){
      const evs=weekEventsFor(todayISO());
      const items=inboxFor(my.id).slice(0,3);
      const un=(DB.chatMsgs||[]).filter(ms=>ms.at===todayISO()&&ms.fromId!==my.id&&(DB.channels||[]).some(ch=>ch.id===ms.ch&&chanVisible(ch))).length;
      const sv=DB.surveys.find(s=>s.status==='live');
      return {html:`<b>Good ${now().getHours()<12?'morning':'afternoon'}, ${esc(my.name.split(' ')[0])} — your day:</b><br><br>📅 <b>${evs.length}</b> on the calendar${evs.length?': '+evs.slice(0,2).map(ev=>ev.time+' '+esc(ev.title)).join(' · ')+(evs.length>2?' +'+(evs.length-2)+' more':''):''}<br>⚡ <b>${items.length}</b> action item${items.length===1?'':'s'}${items.length?': '+items.map(i=>esc(i.text.slice(0,42))).join('; '):' — clear inbox 🌤️'}<br>💬 <b>${un}</b> new message${un===1?'':'s'}${sv&&!sv.respondedIds.includes(my.id)?`<br>📊 The ${esc(sv.name)} closes ${rel(sv.closes)} — two anonymous minutes`:''}`,
        sources:[{label:'Calendar',link:'#/cal'},{label:'Action inbox',link:'#/home'},{label:'Messages',link:'#/chat'}]};}
    /* follow-up about the last person discussed (lightweight context) */
    if(Assist.ctx&&Assist.ctx.person&&/\b(her|his|their|she|he|they)\b/.test(q)&&/(team|manager|report|where|location|based|title|role|email)/.test(q)){
      const p=Assist.ctx.person,mgr=emp(p.managerId);
      return {html:`<b>${esc(p.name)}</b> — ${esc(p.title)}, ${deptName(p.dept)} (${esc(p.team)}), based in ${esc(p.location)}${mgr?', reports to '+esc(mgr.name):''}. Reach them at ${esc(p.email)}.`,sources:[{label:'Profile',link:'#/people/'+p.id}]};}
    /* PTO balance */
    if(/(pto|vacation|time off|sick).*(left|balance|have|much|many|remain)|^balance/.test(q))
      return {html:`You have <b>${my.pto.vacBalance} vacation days</b> (${my.pto.vacUsed} used this year) and <b>${my.pto.sickBalance} sick days</b> left. Weekends and holidays never count against you.`,actions:[{label:'Request time off',act:'openTimeReq'},{label:'Open Time Off',act:'nav',arg:'#/time'}],sources:[{label:'KB: How PTO accrual works',link:'#/help/KB-1'}]};
    /* who's out */
    if(/who.?s?\s?(out|off|away)|out (this|next) week/.test(q)){
      const out=whosOut(7);
      return {html:out.length?`<b>${out.length} ${out.length===1?'person is':'people are'} out in the next 7 days:</b><br>${out.slice(0,6).map(t=>`• ${esc(t.emp.name)} — ${TO_TYPES[t.type].label}, ${fmtDshort(t.start)}–${fmtDshort(t.end)}`).join('<br>')}`:'Nobody\'s scheduled out in the next 7 days. Full house!',actions:[{label:'Team calendar',act:'nav',arg:'#/time'}]};}
    /* holidays */
    if(/holiday/.test(q)){const hs=DB.holidays.filter(h=>h.date>=todayISO()).slice(0,3);
      return {html:`<b>Upcoming holidays:</b><br>${hs.map(h=>`• ${esc(h.name)} — ${fmtD(h.date)}`).join('<br>')}`};}
    /* my goals */
    if(/my goals?|goals? (doing|status|progress)/.test(q)){const gl=DB.goals.filter(g=>g.ownerId===my.id);
      return {html:gl.length?`<b>Your ${gl.length} goals:</b><br>${gl.map(g=>`• ${esc(g.title)} — ${g.progress}% (${g.status})`).join('<br>')}`:'No goals on record yet — worth raising in your next 1:1.',actions:[{label:'Open Performance',act:'nav',arg:'#/grow'}]};}
    /* learning due */
    if(/(course|learning|training).*(due|overdue|left)|due.*(course|training)|what courses/.test(q)){
      const due=DB.enrollments.filter(en=>en.employeeId===my.id&&en.progress<100);
      return {html:due.length?`<b>${due.length} course${due.length===1?'':'s'} to finish:</b><br>${due.slice(0,5).map(en=>{const c=courseOf(en.courseId);return `• ${esc(c.title)} — ${en.progress}%${en.due?', due '+rel(en.due):''}`;}).join('<br>')}`:'You\'re fully caught up on learning 🎓',actions:[{label:'Open Learning',act:'nav',arg:'#/learn'}]};}
    /* waiting on me */
    if(/waiting on me|my (inbox|approvals|tasks)|what.?s (pending|waiting)/.test(q)){
      const items=inboxFor(my.id);
      return {html:items.length?`<b>${items.length} thing${items.length===1?'':'s'} waiting on you:</b><br>${items.slice(0,5).map(i=>`${i.icon} ${esc(i.text)}`).join('<br>')}`:'Inbox zero — nothing needs you right now 🌤️',actions:[{label:'Go to Home',act:'nav',arg:'#/home'}]};}
    /* headcount */
    if(/headcount|how many (people|employees|staff)/.test(q))
      return {html:`<b>${activeEmps().length} people</b> at ${esc(COMPANY.name)} right now — ${DB.employees.filter(e=>e.status==='onboarding').length} onboarding, ${DB.reqs.filter(r=>r.status==='open').length} open requisitions.`,actions:canSee('insights')?[{label:'Open Insights',act:'nav',arg:'#/insights'}]:[]};
    /* flight risk */
    if(/flight risk|attrition risk|retention|who might leave/.test(q)){
      if(!isAdmin())return {html:'Retention signals are visible to People admins only — switch to the Admin persona to see them.'};
      const risks=DB.employees.filter(e=>e.status==='active').map(e=>({e,r:flightRisk(e)})).filter(x=>x.r.tier!=='low').sort((a,b)=>b.r.score-a.r.score).slice(0,4);
      return {html:`<b>Top retention signals</b> (rule-based, illustrative):<br>${risks.map(x=>`• ${esc(x.e.name)} — score ${x.r.score} (${esc(x.r.reasons[0]||'')})`).join('<br>')}`,actions:[{label:'See watchlist',act:'nav',arg:'#/insights'}]};}
    /* pulse / enps */
    if(/pulse|enps|engagement (score|results)|how.?s the (team|pulse|mood)/.test(q)){
      const sv=DB.surveys.find(s=>s.status==='live');
      if(!sv)return {html:'No live survey right now.'};
      const taken=sv.respondedIds.includes(my.id);
      if(myRole()==='employee')return {html:`The <b>${esc(sv.name)}</b> closes ${rel(sv.closes)}.${taken?' You\'ve already responded — thank you!':' Two minutes, fully anonymous.'}`,actions:taken?[]:[{label:'Take it now',act:'openSurvey',arg:sv.id}]};
      return {html:`<b>${esc(sv.name)}:</b> eNPS <b>${sv.enps}</b> (+4 vs March), participation ${pct(sv.respondedIds.length,sv.audience)}%. Strongest driver: Manager support (4.2). Watch item: Compensation fairness (3.4).`,actions:[{label:'Open Engagement',act:'nav',arg:'#/engage'}]};}
    /* draft a JD */
    let m=q.match(/(?:jd|job description)(?: for)?(?: an?)? (.+)/);
    if(/draft|write|create/.test(q)&&m){
      const role=cap(m[1].replace(/[?.!]/g,'').trim());
      const dept=/engineer|developer|firmware|robotic/.test(m[1])?'eng':/design/.test(m[1])?'design':/market/.test(m[1])?'mktg':/sale|account/.test(m[1])?'sales':/data|analyst/.test(m[1])?'data':/people|hr|recruit/.test(m[1])?'people':'ops';
      const band=bandFor('IC4',dept);
      return {html:`<b>${esc(role)} — ${esc(COMPANY.name)}</b><br><br><b>About us:</b> ${esc(COMPANY.tagline)}. We're ${activeEmps().length} people making home robotics genuinely useful.<br><br><b>What you'll do:</b><br>• Own meaningful pieces of the ${deptName(dept).toLowerCase()} roadmap end-to-end<br>• Partner across Product, Design and Engineering on the Home Hub platform<br>• Raise the bar on craft through reviews, docs and mentorship<br>• Talk to customers; let reality shape the work<br><br><b>What you'll bring:</b> 4+ years of relevant experience, strong collaboration instincts, and curiosity (it's our first company value).<br><br><b>Range:</b> ${fmtK(band[0])}–${fmtK(band[2])} + bonus + equity. ${esc(COMPANY.name)} is an equal-opportunity employer.<br><br><i>Copy it, tweak it, post it.</i>`,actions:canSee('recruit')?[{label:'Open a req',act:'openNewReq'}]:[]};}
    /* draft praise */
    m=raw.match(/praise (?:for )?([A-Za-z]+)/i);
    if(/praise/.test(q)&&m){
      const who=DB.employees.find(e=>e.status!=='terminated'&&e.name.toLowerCase().includes(m[1].toLowerCase()));
      if(who)return {html:`Good instinct — recognition lands best within days of the moment. I'll open the praise composer addressed to <b>${esc(who.name)}</b>; name the specific thing they did and tag a value.`,actions:[{label:'Praise '+esc(who.name.split(' ')[0]),act:'openPraise',arg:who.id}]};}
    /* benefits FAQs from KB */
    if(/401k|401\(k\)|match|retirement/.test(q))return {html:`<b>401(k):</b> Meridian matches <b>100% of your first 4%</b> — free money, immediately vested. Change contributions any time; updates apply the next pay period.`,actions:[{label:'Full article',act:'nav',arg:'#/help/KB-6'},{label:'My benefits',act:'nav',arg:'#/pay'}]};
    if(/parental|maternity|paternity|baby/.test(q))return {html:`<b>Parental leave:</b> 16 weeks at 100% pay for all new parents, usable within 12 months of birth or adoption. Loop in People Ops ~60 days ahead and we'll build your coverage plan.`,actions:[{label:'Full article',act:'nav',arg:'#/help/KB-7'}]};
    if(/i-?9|e-?verify/.test(q))return {html:`<b>Form I-9:</b> bring one List A document (like a U.S. passport) OR one List B + one List C. Section 1 on day one, verification within 3 business days — we run E-Verify for all U.S. hires.`,actions:[{label:'Full article',act:'nav',arg:'#/help/KB-4'},{label:'I-9 course',act:'nav',arg:'#/learn/L-101'}]};
    /* who is X */
    m=raw.match(/who (?:is|'s) ([A-Za-z .'-]+)/i);
    if(m){const who=DB.employees.find(e=>e.status!=='terminated'&&e.name.toLowerCase().includes(m[1].trim().toLowerCase()));
      if(who){const mgr=emp(who.managerId);Assist.ctx={person:who};
        return {html:`<b>${esc(who.name)}</b> — ${esc(who.title)}, ${deptName(who.dept)} (${esc(who.location)}). ${tenure(who.hireDate)} at Meridian${mgr?', reports to '+esc(mgr.name):''}. Ask me a follow-up — "what team is she on?" works.`,actions:[{label:'View profile',act:'nav',arg:'#/people/'+who.id}],sources:[{label:'People directory',link:'#/people'}]};}}
    /* open roles */
    if(/open (req|role|job|position)|hiring|we hiring/.test(q)){const open=DB.reqs.filter(r=>r.status==='open');
      return {html:`<b>${open.length} open roles:</b><br>${open.slice(0,6).map(r=>`• ${esc(r.title)} — ${deptName(r.dept)}, ${esc(r.loc)}`).join('<br>')}${open.length>6?'<br>…and more':''}`,actions:canSee('recruit')?[{label:'Open Recruiting',act:'nav',arg:'#/recruit'}]:[]};}
    /* workspace suite */
    if(/unread|new messages?|chat|slack/.test(q)){
      const un=(DB.chatMsgs||[]).filter(ms=>ms.at===todayISO()&&ms.fromId!==my.id&&(DB.channels||[]).some(c=>c.id===ms.ch&&chanVisible(c))).length;
      return {html:`You have <b>${un}</b> new message${un===1?'':'s'} today across your channels and DMs.`,actions:[{label:'Open Messages',act:'nav',arg:'#/chat'}]};}
    if(/calendar|meeting.{0,8}today|schedule today|what.?s? (on )?today/.test(q)){
      const evs=weekEventsFor(todayISO());
      return {html:evs.length?`<b>Today's calendar:</b><br>${evs.map(ev=>`• ${ev.time} — ${esc(ev.title)}${ev.meet?' 🎥':''}`).join('<br>')}`:'Nothing on your calendar today — protect that focus time 🎉',actions:[{label:'Open Calendar',act:'nav',arg:'#/cal'}]};}
    if(/where('| i)?s|find/.test(q)&&/handbook|press kit|template|deck/.test(q)){
      const f=(DB.files||[]).filter(fileVisible).find(x=>x.kind!=='folder'&&x.name.toLowerCase().includes(q.match(/handbook|press kit|template|deck/)[0].split(' ')[0]));
      if(f)return {html:`Found it in Drive: <b>${esc(f.name)}</b> (${esc((emp(f.ownerId)||{}).name||'')}, updated ${rel(f.updatedAt)}).`,actions:[{label:'Open in Drive',act:'drivePreview',arg:f.id}]};}
    /* KB keyword fallback */
    const words=q.replace(/[^a-z0-9 ]/g,'').split(/\s+/).filter(w=>w.length>3);
    if(words.length){
      const scored=DB.kb.map(k=>({k,s:words.filter(w=>(k.title+' '+k.body).toLowerCase().includes(w)).length})).filter(x=>x.s>0).sort((a,b)=>b.s-a.s);
      if(scored.length){const hits=scored.slice(0,2);
        return {html:`Here's what our docs say:<br><br>“${esc(hits[0].k.body.split('. ').slice(0,2).join('. '))}.”`,
          actions:[{label:'Read full article',act:'nav',arg:'#/help/'+hits[0].k.id}],
          sources:hits.map(h=>({label:'KB: '+h.k.title,link:'#/help/'+h.k.id}))};}}
    return {html:`I didn't catch that one. I'm best at things like:<br>• “How much PTO do I have?”<br>• “Who's out next week?”<br>• “Draft a JD for a data analyst”<br>• “What's our parental leave?”<br>• “Who is Priya?”`,actions:[{label:'Browse Help Center',act:'nav',arg:'#/help'}]};
  },
  render(){
    const p=$('#assist-panel');
    if(!this.open){p.classList.remove('open');return;}
    p.innerHTML=`
      <div class="as-head">${logoSVG(26)}<div class="col" style="gap:0;flex:1"><b style="font-size:14px">Ask Mosaic</b><span class="tiny faint">grounded answers, with sources — across every module</span></div>
        <button class="iconbtn" data-act="assistBig" title="Expand" aria-label="Expand assistant">⤢</button>
        <button class="iconbtn" data-act="toggleAssist" aria-label="Close assistant">${I.x}</button></div>
      <div class="as-body" id="as-body">${this.hist.map(msg=>`<div class="as-msg ${msg.who}">${msg.html}</div>
        ${msg.actions&&msg.actions.length?`<div class="as-actions">${msg.actions.map(a=>`<button class="btn xs soft" data-act="${a.act}" ${a.arg?`data-arg="${a.arg}"`:''}>${a.label}</button>`).join('')}</div>`:''}
        ${msg.sources&&msg.sources.length?`<div class="as-sources"><span class="tiny faint" style="align-self:center">Sources:</span>${msg.sources.map((s,i)=>`<span class="chip" data-act="nav" data-arg="${s.link}">[${i+1}] ${esc(s.label)}</span>`).join('')}</div>`:''}`).join('')}</div>
      <div class="as-chips">${this.chips().map(c=>`<span class="chip" data-act="assistChip" data-arg="${esc(c)}">${esc(c)}</span>`).join('')}</div>
      <div class="as-foot"><input id="as-input" placeholder="Ask anything about work here…" autocomplete="off" onkeydown="if(event.key==='Enter')ACT.assistSend()">
        <button class="btn primary" data-act="assistSend" style="padding:9px 13px">${I.send}</button></div>
      <div class="as-note">Rule-based demo assistant · production version would plug in the Claude API</div>`;
    p.classList.add('open');
    const b=$('#as-body');if(b)b.scrollTop=b.scrollHeight;
    const inp=$('#as-input');if(inp)inp.focus();
  },
};

  DB.audit.unshift({at:todayISO(),actorId:by.byId,action:'Group preview started',detail:g.name});

const PTS_ALLOWANCE=100;
const REWARDS=[{id:'rw1',name:'$10 coffee card',pts:100,icon:'☕'},{id:'rw2',name:'$25 gift card',pts:250,icon:'🎁'},{id:'rw3',name:'Charity donation $25',pts:250,icon:'💝'},{id:'rw4',name:'Half-day Friday pass',pts:400,icon:'🌴'},{id:'rw5',name:'Meridian robot swag kit',pts:300,icon:'🤖'}];
const fbRecipients=f=>f.recipients||(f.toId?[f.toId]:[]);
const monthStart=()=>iso(new Date(now().getFullYear(),now().getMonth(),1));
const ptsGiven=eid=>sum(DB.feedback.filter(f=>f.fromId===eid&&f.at>=monthStart()).map(f=>(f.pts||0)*fbRecipients(f).length));
const ptsLeft=eid=>Math.max(0,PTS_ALLOWANCE-ptsGiven(eid));
const ptsEarned=eid=>sum(DB.feedback.filter(f=>fbRecipients(f).includes(eid)).map(f=>f.pts||0))-sum((DB.redemptions||[]).filter(r=>r.employeeId===eid).map(r=>r.pts));
ACT.react=arg=>{
  const [fid,emo]=arg.split('|');

};
ACT.commentFeedback=fid=>{
  const inp=$('#fc-'+fid);if(!inp||!inp.value.trim())return;

  f.comments=f.comments||[];f.comments.push({fromId:DB.me.employeeId,at:todayISO(),text:inp.value.trim()});
  Store.save();render();UI.toast('Comment added','💬');
};
ACT.openRedeem=()=>{
  const bal=ptsEarned(DB.me.employeeId);
  UI.modal({title:'Redeem your points 🛍️',sub:`Balance: ${bal} pts — earned from recognition by teammates.`,body:`
    <div class="col" style="gap:9px">${REWARDS.map(r=>`
      <div class="row card pad" style="gap:12px;box-shadow:none;background:var(--card2);padding:12px 14px">
        <span style="font-size:21px">${r.icon}</span>
        <span class="col" style="gap:0;flex:1"><b class="small">${r.name}</b><span class="tiny faint">${r.pts} pts</span></span>
        <button class="btn sm ${bal>=r.pts?'primary':'ghost'}" ${bal>=r.pts?'':'disabled'} data-act="redeem" data-arg="${r.id}">Redeem</button></div>`).join('')}</div>`,

ACT.redeem=rid=>{

ACT.saveGroup=()=>{

ACT.deleteGroup=gid=>{

  UI.toast(`Group <b>${esc(g.name)}</b> deleted`,'🗑️',{label:'Undo',fn:()=>{DB.groups.splice(idx,0,g);Store.save();render();UI.toast('Group restored','↩️');}});

function weekEventsFor(dayISO){
  const my=me();const myId=my.id;
  const evs=[];
  const dow=new Date(dayISO+'T12:00:00').getDay();
  /* derived: engineering standup */
  if(dow>=1&&dow<=5&&(my.dept==='eng'||isAdmin()))evs.push({id:'std-'+dayISO,title:'Eng standup',time:'9:30',durMin:15,color:'#6366f1',kind:'meeting',meet:true,attendees:'eng'});
  /* derived: 1:1s (seeded with relative dates) */
  DB.ones.filter(o=>o.when===dayISO&&(o.managerId===myId||o.reportId===myId||isAdmin())).forEach(o=>{
    const a=emp(o.managerId),b=emp(o.reportId);
    evs.push({id:o.id,title:'1:1 — '+(a?a.name.split(' ')[0]:'')+' × '+(b?b.name.split(' ')[0]:''),time:String(timeToMin(o.time)/60|0)+':'+String(timeToMin(o.time)%60).padStart(2,'0'),durMin:30,color:'#8b5cf6',kind:'1:1',meet:true,attendees:[o.managerId,o.reportId]});
  });
  /* derived: interviews for my reqs */
  if(canSee('recruit')){
    DB.candidates.filter(c=>c.stage==='interview').slice(0,3).forEach((c,i)=>{
      const r=byId(DB.reqs,c.reqId);if(!r)return;
      if(dayISO===nextDow(3)&&(r.hmId===myId||isAdmin()))evs.push({id:'iv-'+c.id,title:'Interview · '+c.name,time:(13+i)+':00',durMin:50,color:'#f0648c',kind:'interview',meet:true,attendees:[r.hmId,'E022']});
    });
  }
  /* stored events */
  (DB.events||[]).filter(ev=>ev.date===dayISO).forEach(ev=>{
    const att=ev.attendees;
    const mine=att==='*'||(typeof att==='string'?my.dept===att:att.includes(myId))||ev.organizer===myId||isAdmin();
    if(mine)evs.push(ev);
  });
  return evs.sort((a,b)=>timeToMin(a.time)-timeToMin(b.time));
}
Views.cal=()=>{

  const base=new Date();base.setDate(base.getDate()+off*7);
  const mon=new Date(base);mon.setDate(mon.getDate()-((mon.getDay()+6)%7));
  const days=Array.from({length:5},(_,i)=>iso(new Date(mon.getTime()+i*DAY)));
  const H0=8,H1=18,ROW=44;
  const allDay=d=>{
    const out=[];
    const hol=DB.holidays.find(h=>h.date===d);if(hol)out.push({label:'🎉 '+hol.name,color:'var(--c-engage)'});
    whosOut(35).filter(t=>t.start<=d&&t.end>=d).slice(0,2).forEach(t=>out.push({label:initials(t.emp.name)+' · '+(TO_TYPES[t.type]||{label:t.type}).label,color:(TO_TYPES[t.type]||{}).color||'#64748b'}));
    return out;
  };
  const nowMin=now().getHours()*60+now().getMinutes();
  return `
  <div class="page-head"><div style="flex:1"><h1 class="page">Calendar</h1><div class="page-sub">1:1s, interviews, PTO and holidays flow in from the rest of Mosaic — nothing double-entered</div></div>

    <button class="btn sm ghost" data-act="calNav" data-arg="0">Today</button>
    <button class="btn sm ghost" data-act="calNav" data-arg="1">›</button>
    <button class="btn primary" style="--brand:#2d7ff0;--brand-deep:#1d6ae0" data-act="openNewEvent">${I.plus} New event</button></div></div>
  <div class="row mb8" style="gap:8px"><b class="small">${fmtD(days[0],{month:'long',day:'numeric'})} – ${fmtD(days[4],{month:'long',day:'numeric',year:'numeric'})}</b>${off===0?'<span class="badge b-info">This week</span>':''}</div>
  <div class="cal-week">
    <div></div>
    ${days.map(d=>{const dt=new Date(d+'T12:00:00');
      return `<div class="cw-head ${d===todayISO()?'today':''}">${dt.toLocaleDateString('en-US',{weekday:'short'})}<br><span class="dnum">${dt.getDate()}</span>
      <div class="col" style="gap:2px;margin-top:3px">${allDay(d).map(a=>`<span class="ev" style="background:${a.color};border-radius:5px;font-size:9px;color:#fff;padding:0 4px;white-space:nowrap;overflow:hidden">${esc(a.label)}</span>`).join('')}</div></div>`;}).join('')}
    <div class="cw-times" style="border-top:1px solid var(--line)">${Array.from({length:H1-H0},(_,i)=>`<div>${H0+i>12?H0+i-12+'p':H0+i===12?'12p':H0+i+'a'}</div>`).join('')}</div>
    ${days.map(d=>{
      const evs=weekEventsFor(d);
      return `<div class="cw-col" style="border-top:1px solid var(--line)">
        ${Array.from({length:H1-H0},()=>'<div class="cw-cell"></div>').join('')}
        ${d===todayISO()&&nowMin>H0*60&&nowMin<H1*60?`<div class="cw-now" style="top:${(nowMin-H0*60)/60*ROW}px"></div>`:''}
        ${evs.map(ev=>{const top=(timeToMin(ev.time)-H0*60)/60*ROW;const h=Math.max((ev.durMin||30)/60*ROW-3,18);
          if(top<0||top>(H1-H0)*ROW)return'';
          return `<div class="cw-ev" style="top:${top}px;height:${h}px;background:${ev.color||'#2d7ff0'}" data-act="openEvent" data-arg="${ev.id}|${d}" title="${esc(ev.title)}">${esc(ev.title)}${h>30?`<div style="opacity:.85;font-weight:500">${ev.time}${ev.meet?' · 🎥':''}</div>`:''}</div>`;}).join('')}
      </div>`;}).join('')}
  </div>
  <p class="tiny faint mt8">Purple = 1:1s (from Performance) · pink = interviews (from Recruiting) · header chips = PTO & holidays (from Time Off). In production this syncs two-way with Google Calendar.</p>`;
};
ACT.calNav=a=>{UIS.calOffset=a==='0'?0:(UIS.calOffset||0)+(+a);render();};

ACT.saveEvent=()=>{

/* ---------------- DRIVE ---------------- */
const FILE_ICON={folder:'📁',doc:'📄',sheet:'📊',slide:'📽️',pdf:'📕',img:'🖼️'};
const fileVisible=f=>deptScopeOk(f.scope);
Views.drive=param=>{
  const cur=param&&param!=='root'?byId(DB.files,param):null;
  if(cur&&!fileVisible(cur))return '<div class="card pad empty"><div class="big">🔒</div>This folder is scoped to '+deptName(cur.scope)+'.</div>';
  const here=DB.files.filter(f=>f.parent===(cur?cur.id:null)&&fileVisible(f));
  const crumbs=[];let p=cur;while(p){crumbs.unshift(p);p=p.parent?byId(DB.files,p.parent):null;}
  return `
  <div class="page-head"><div style="flex:1"><h1 class="page">Drive</h1><div class="page-sub">Shared files with the same department-level security as everything else</div></div>
    <button class="btn ghost" data-act="driveNew" data-arg="doc">${I.plus} New doc</button>
    <button class="btn primary" style="--brand:#1fa463;--brand-deep:#178a52" data-act="driveNew" data-arg="upload">⬆️ Upload</button></div>
  <div class="card">
    <div class="row" style="padding:13px 16px;border-bottom:1px solid var(--line);gap:10px">
      <span class="crumbs"><a href="#/drive">My Drive</a>${crumbs.map(c=>`<span class="sep">›</span><a href="#/drive/${c.id}">${esc(c.name)}</a>`).join('')}</span>
      <span class="spacer"></span>${cur&&cur.scope!=='*'?`<span class="badge b-vio">🔒 ${deptName(cur.scope)} only</span>`:''}</div>
    ${here.length?here.sort((a,b)=>(a.kind==='folder'?0:1)-(b.kind==='folder'?0:1)||b.updatedAt.localeCompare(a.updatedAt)).map(f=>`
      <div class="dr-row" data-act="${f.kind==='folder'?'nav':'drivePreview'}" data-arg="${f.kind==='folder'?'#/drive/'+f.id:f.id}">
        <span class="dr-ic">${FILE_ICON[f.kind]||'📄'}</span>
        <span><b class="small">${esc(f.name)}</b>${f.scope!=='*'?' <span title="Scoped to '+deptName(f.scope)+'">🔒</span>':''}</span>
        <span class="muted dr-extra">${esc((emp(f.ownerId)||{}).name||'—')}</span>
        <span class="muted dr-extra">${rel(f.updatedAt)}</span>
        <span class="tiny faint num">${f.size||(f.kind==='folder'?DB.files.filter(x=>x.parent===f.id).length+' items':'')}</span></div>`).join('')
    :'<div class="empty"><div class="big">🗂️</div>Empty folder.</div>'}
  </div>
  <p class="tiny faint mt8">Letters generated anywhere in Mosaic file themselves into <b>Generated letters</b> automatically. Production swap: Google Drive API behind the same UI.</p>`;
};
ACT.drivePreview=fid=>{
  const f=byId(DB.files,fid);if(!f)return;
  const owner=emp(f.ownerId);
  UI.modal({title:FILE_ICON[f.kind]+' '+f.name,sub:`${owner?esc(owner.name):''} · updated ${rel(f.updatedAt)} · ${f.scope==='*'?'shared with everyone':'🔒 '+deptName(f.scope)+' only'}`,wide:true,body:`
    <div class="letter" style="min-height:240px">${f.kind==='sheet'?'<b>Sheet preview</b><br><br>Quarter | Plan | Actual<br>Q1 | 18 | 19 ✓<br>Q2 | 22 | 21<br>Q3 | 24 | —<br><br><i>(interactive grid in production)</i>'
      :f.kind==='slide'?'<b>'+esc(f.name.replace(/\.[a-z]+$/,''))+'</b><br><br>Slide 1 of 24<br><br>“Home Hub 2.0 — the robot your home has been waiting for.”<br><br><i>(presenter view in production)</i>'
      :'<b>'+esc(f.name.replace(/\.[a-z]+$/,''))+'</b><br><br>This is a document preview. In the production build this is a live collaborative editor (or the Drive API\'s native preview), with comments and version history — same sharing model you see here.'}</div>`,
    foot:`<button class="btn ghost" data-act="closeModal">Close</button><button class="btn primary" style="--brand:#1fa463;--brand-deep:#178a52" onclick="UI.toast('Demo: download would start here','⬇️')">${I.download} Download</button>`});
};
ACT.driveNew=kind=>{
  const parent=ROUTE.mod==='drive'&&ROUTE.param&&ROUTE.param!=='root'?ROUTE.param:null;
  const name=kind==='upload'?'Uploaded file '+rint(10,99)+'.pdf':'Untitled doc.doc';
  DB.files.push({id:uid('FI'),name,kind:kind==='upload'?'pdf':'doc',parent,ownerId:DB.me.employeeId,scope:parent?(byId(DB.files,parent)||{}).scope||'*':'*',updatedAt:todayISO(),size:kind==='upload'?rint(1,9)+'.'+rint(1,9)+' MB':'1 KB',starred:false});
  audit(kind==='upload'?'File uploaded':'Doc created',name);
  Store.save();render();UI.toast((kind==='upload'?'Uploaded':'Created')+' — inherits this folder\'s sharing','🗂️');

/* ---------------- MEET ---------------- */
Views.meet=()=>{
  if(UIS.meetActive)return meetStage();
  const todayMeets=[];
  [0,1].forEach(o=>{const d=daysAhead(o);weekEventsFor(d).filter(e=>e.meet).forEach(e=>todayMeets.push({...e,date:d}));});
  return `
  <div class="page-head"><div style="flex:1"><h1 class="page">Meet</h1><div class="page-sub">Video rooms wired into 1:1s, interviews and events — one click from anywhere in Mosaic</div></div></div>
  <div class="grid g23">
    <div class="col" style="gap:16px">
      <div class="card pad" style="background:linear-gradient(135deg,color-mix(in srgb,#2d8cff 10%,var(--card)),var(--card));text-align:center;padding:38px">
        <div style="font-size:40px">🎥</div>
        <b style="font-size:17px;display:block;margin-top:8px">Start an instant meeting</b>
        <p class="small muted" style="max-width:360px;margin:6px auto 0">Spin up a room and share the link — interviews, 1:1s and launch fire-drills all live here.</p>
        <button class="btn primary mt16" style="--brand:#2d8cff;--brand-deep:#1d7af0" data-act="meetJoin" data-arg="Instant meeting">Start meeting</button></div>
      <div class="card"><div class="card-head"><h3>Today & tomorrow</h3></div>
        <div class="card-body" style="padding-top:8px">${todayMeets.length?todayMeets.slice(0,6).map(m=>`
          <div class="row mb12" style="gap:11px"><span class="notif-ic" style="background:${m.color||'#2d8cff'};color:#fff">🎥</span>
          <span class="col" style="gap:0;flex:1"><b class="small">${esc(m.title)}</b><span class="tiny faint">${m.date===todayISO()?'Today':'Tomorrow'} · ${m.time} · ${m.durMin||30} min</span></span>
          <button class="btn sm soft" style="--brand:#2d8cff" data-act="meetJoin" data-arg="${esc(m.title)}">Join</button></div>`).join(''):'<div class="faint small">No video meetings scheduled.</div>'}</div></div>
    </div>
    <div class="col" style="gap:16px">
      <div class="card pad"><b class="small">Your personal room</b>
        <div class="row mt12" style="gap:8px"><code class="chip" style="font-size:11px">meet.meridianlabs.com/${deslug(me().name).toLowerCase().replace(/ /g,'.')}</code></div>
        <button class="btn ghost block mt12" onclick="UI.toast('Link copied to clipboard (demo)','🔗')">${I.link} Copy link</button></div>
      <div class="card pad" style="background:linear-gradient(135deg,color-mix(in srgb,#2d8cff 7%,var(--card)),var(--card))"><b class="small">🧵 Connected</b>
        <p class="tiny muted" style="margin-top:7px;line-height:1.7">Every 1:1 in <b>Performance</b> and interview in <b>Recruiting</b> carries a Meet link automatically. Production swap: Zoom SDK or Google Meet behind this exact UI.</p></div>
    </div>
  </div>`;
};
function meetStage(){
  const m=UIS.meetActive;
  const others=activeEmps().filter(e=>e.id!==DB.me.employeeId&&(me().dept===e.dept||e.managerId===me().managerId)).slice(0,m.title.includes('1:1')?1:4);
  onMount(()=>{if(window._meetTimer)clearInterval(window._meetTimer);
    window._meetTimer=setInterval(()=>{const el=$('#meet-timer');if(!el){clearInterval(window._meetTimer);return;}
      const s=Math.floor((Date.now()-m.started)/1000);el.textContent=String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');},1000);});
  return `
  <div class="page-head"><div style="flex:1"><h1 class="page">${esc(m.title)}</h1><div class="page-sub">🔴 <span id="meet-timer">00:00</span> · ${others.length+1} participants · meet.meridianlabs.com/${m.code}</div></div></div>
  <div class="meet-stage">
    <div class="meet-grid">
      <div class="meet-tile" style="outline:2px solid #2d8cff">${av(me(),'xl')}<span class="name-tag">You${m.muted?' (muted)':''}</span>${m.muted?'<span class="mic-off">🔇</span>':''}</div>
      ${others.map((o,i)=>`<div class="meet-tile">${av(o,'xl')}<span class="name-tag">${esc(o.name)}</span>${i===1?'<span class="mic-off">🔇</span>':''}</div>`).join('')}
    </div>
    <div class="meet-bar">
      <button class="meet-btn ${m.muted?'off':''}" data-act="meetMute" title="Mute">${m.muted?'🔇':'🎙️'}</button>
      <button class="meet-btn ${m.cam===false?'off':''}" data-act="meetCam" title="Camera">${m.cam===false?'🚫':'📷'}</button>
      <button class="meet-btn" onclick="UI.toast('Screen sharing (demo)','🖥️')" title="Share">🖥️</button>
      <button class="meet-btn" onclick="UI.toast('Recording with consent banner (demo)','⏺️')" title="Record">⏺️</button>
      <button class="meet-btn leave" data-act="meetLeave">Leave</button>
    </div>
  </div>`;
}
ACT.meetJoin=title=>{UIS.meetActive={title:title||'Meeting',started:Date.now(),muted:false,cam:true,code:Math.random().toString(36).slice(2,8)};UI.closeDrawer();nav('#/meet');render();};
ACT.meetMute=()=>{UIS.meetActive.muted=!UIS.meetActive.muted;render();};
ACT.meetCam=()=>{UIS.meetActive.cam=UIS.meetActive.cam===false?true:false;render();};
ACT.meetLeave=()=>{const s=Math.floor((Date.now()-UIS.meetActive.started)/60000);if(window._meetTimer)clearInterval(window._meetTimer);UIS.meetActive=null;render();UI.toast('Left the meeting after '+(s||'<1')+' min','👋');};

  <div class="grid g23">
    <div class="card">${posts.length?posts.map(p=>{const a=emp(p.authorId);
      return `<div class="post">${p.pinned?'<div class="pin">📌 PINNED</div>':''}

        <div class="row mb8" style="gap:7px">${a?av(a,'xs'):''}<span class="tiny faint">${a?esc(a.name):''} · ${rel(p.at)}</span></div>

      </div>`;}).join(''):'<div class="empty"><div class="big">📰</div>No posts yet in this space.</div>'}</div>
    <div class="col" style="gap:16px">
      ${cur.id==='sp-hub'?`<div class="card pad"><b class="small">📚 Knowledge base</b>
        <input type="search" placeholder="Search policies, how-tos…" oninput="hubKb(this.value)" class="mt8" style="width:100%;background:var(--bg);border:1.5px solid var(--line);border-radius:10px;padding:8px 12px;outline:none">
        <div class="col mt12" style="gap:8px" id="hub-kb">${DB.kb.slice(0,5).map(k=>`<a class="small linklike" href="#/help/${k.id}">${esc(k.title)}</a>`).join('')}</div>
        <a class="btn ghost block mt12" href="#/help">Browse all ${DB.kb.length} articles</a></div>
      <div class="card pad"><b class="small">Quick links</b><div class="col mt12" style="gap:8px">
        ${[['📖','Company handbook','#/drive/fo-hand'],['🌴','Request time off','#/time'],['🪪','My profile','#/people/'+DB.me.employeeId],['🧩','Org chart','#/people/org'],['⭐','Recognize someone','#/grow']].map(l=>`<a class="row small hovercard" style="gap:9px;color:inherit;padding:5px 7px;border-radius:8px" href="${l[2]}"><span>${l[0]}</span>${l[1]}</a>`).join('')}</div></div>`
      :`<div class="card pad"><b class="small">Team roster (${roster.length})</b>

window.hubKb=q=>{const el=$('#hub-kb');if(!el)return;const ql=q.toLowerCase();

ACT.postReact=arg=>{const [pid,emo]=arg.split('|');const p=byId(DB.posts,pid);if(!p)return;p.reactions[emo]=(p.reactions[emo]||0)+1;Store.save();render();};
ACT.openSpacePost=sid=>{

const envMyTurn=env=>{
  if(env.status!=='out')return null;
  const pend=env.signers.filter(s=>s.status==='pending');
  if(!pend.length)return null;
  const minOrder=Math.min(...pend.map(s=>s.order));
  return pend.find(s=>s.order===minOrder&&s.empId===DB.me.employeeId)||null;
};
const envVisible=env=>isAdmin()||env.createdBy===DB.me.employeeId||env.signers.some(s=>s.empId===DB.me.employeeId);

  <div class="esign-box mb16">⚖️ <b>Compliance demo:</b> this module demonstrates the structural elements of ESIGN/UETA-defensible signing — recorded consent to do business electronically, explicit intent-to-sign, signer attribution, an immutable event trail, and a tamper-evident document hash. A production deployment additionally needs real identity verification, server-side sealing and counsel review.</div>
  <div class="grid g4 mb16">
    ${statCard('Awaiting you',waitingMe.length,waitingMe.length?'don\'t leave them hanging':'nothing to sign','#d97706')}

    ${statCard('Completed',done.length,'sealed with certificates','var(--c-pay)')}
    ${statCard('Avg turnaround','1.1d','send → sealed','var(--c-grow)')}
  </div>
  ${waitingMe.length?`<div class="card mb16" style="border-color:color-mix(in srgb,#d97706 40%,var(--line))">
    <div class="card-head"><h3>✍️ Awaiting your signature</h3></div>
    <div class="card-body" style="padding-top:8px">${waitingMe.map(e=>`
      <div class="row mb8 wrap" style="gap:10px"><span class="notif-ic" style="background:var(--warn-soft)">📜</span>

  <div class="card"><table class="tbl"><thead><tr><th>Envelope</th><th>Signers</th><th>Status</th><th>Sent</th><th>Doc hash</th></tr></thead><tbody>

    <td><b class="small">${esc(e.title)}</b><div class="tiny faint">${e.id} · ${esc(e.docName)}</div></td>
    <td><span class="row" style="gap:4px">${e.signers.map(s=>`<span class="chip" style="font-size:10.5px;${s.status==='signed'?'background:var(--ok-soft);border-color:transparent;color:#076b4c':''}">${s.status==='signed'?'✓ ':''}${esc(s.name.split(' ')[0])}</span>`).join('')}</span></td>
    <td>${badge(e.status==='out'?'b-warn':e.status,e.status==='out'?'Out for signature':undefined)}</td>
    <td class="muted">${rel(e.createdAt)}</td>
    <td><span class="hashchip">${e.hash.slice(0,8)}</span></td></tr>`).join('')||'<tr><td colspan="5"><div class="empty"><div class="big">📜</div>No envelopes yet.</div></td></tr>'}</tbody></table></div>`;
};
ACT.signOpen=eid=>{

ACT.signVerify=eid=>{
  const env=byId(DB.envelopes,eid);if(!env)return;
  UI.toast(envHash(env)===env.hash?'✓ Hash verified — envelope contents and trail are intact':'⚠️ HASH MISMATCH — envelope was altered after sealing','🔐');
};
let SIGNCTX=null;
ACT.signCeremony=eid=>{
  const env=byId(DB.envelopes,eid);if(!env||!envMyTurn(env))return;
  SIGNCTX={eid,step:1,style:1,typed:me().name};
  UI.closeDrawer();signStep();
};
function signStep(){
  const env=byId(DB.envelopes,SIGNCTX.eid);if(!env)return;
  const s=SIGNCTX;
  let body='',foot='';
  if(s.step===1){
    body=`<div class="esign-box">By checking the box below you agree to conduct this transaction electronically and that your electronic signature is the legal equivalent of your handwritten signature (ESIGN Act / UETA). You may request a paper copy at any time.</div>
    <label class="row small mt16" style="gap:9px;cursor:pointer"><input type="checkbox" id="sg-consent" style="width:16px;height:16px;accent-color:#d97706"> I consent to do business electronically and to sign this document electronically.</label>`;
    foot=`<button class="btn ghost" data-act="closeModal">Cancel</button><button class="btn primary" style="--brand:#d97706;--brand-deep:#b45309" onclick="if(document.querySelector('#sg-consent').checked){SIGNCTX.step=2;signStep();}else UI.toast('Consent is required to continue — that\\'s the point of ESIGN','⚖️')">Continue</button>`;
  }else if(s.step===2){
    body=`<div class="letter" style="max-height:300px"><b>${esc(env.docName)}</b><br><br>${esc(env.title)}<br><br>This demo renders the document inline for review — in production, the actual PDF pages display here with required fields highlighted. Scroll-through is recorded as evidence of presentation.<br><br>Key terms summary available to the signer before signing.</div>`;
    foot=`<button class="btn ghost" onclick="SIGNCTX.step=1;signStep()">Back</button><button class="btn primary" style="--brand:#d97706;--brand-deep:#b45309" onclick="SIGNCTX.step=3;signStep()">I've reviewed the document</button>`;
  }else{
    const styles=[['italic','400'],['italic','700'],['normal','600']];
    body=`<div class="field"><label>Type your full legal name</label><input id="sg-name" value="${esc(s.typed)}" oninput="SIGNCTX.typed=this.value;document.querySelector('#sg-prev').textContent=this.value"></div>
    <div class="field"><label>Adopt a signature style</label><div class="row" style="gap:8px">${styles.map((st,i)=>`<button type="button" class="chip" style="padding:8px 14px;${s.style===i+1?'border-color:#d97706;background:var(--warn-soft)':''}" onclick="SIGNCTX.style=${i+1};signStep()"><span class="sig-script" style="font-style:${st[0]};font-weight:${st[1]};font-size:19px">${esc(s.typed.split(' ')[0])}</span></button>`).join('')}</div></div>
    <div class="sig-pad"><div class="sig-script" id="sg-prev" style="font-style:${styles[s.style-1][0]};font-weight:${styles[s.style-1][1]}">${esc(s.typed)}</div>
    <div class="tiny faint" style="margin-top:6px">Signed electronically via MosaicSign · ${fmtD(todayISO())} · attribution: ${esc(me().email)}</div></div>
    <p class="tiny faint mt12">Clicking “Sign document” records your intent to sign and seals your signature into the envelope's audit trail and hash.</p>`;
    foot=`<button class="btn ghost" onclick="SIGNCTX.step=2;signStep()">Back</button><button class="btn primary" style="--brand:#d97706;--brand-deep:#b45309" data-act="signApply">✍️ Sign document</button>`;
  }
  UI.modal({title:'Sign — '+env.title,sub:'Step '+s.step+' of 3 · '+['Consent','Review','Adopt & sign'][s.step-1],body,foot});
}
ACT.signApply=()=>{
  const env=byId(DB.envelopes,SIGNCTX.eid);if(!env)return;
  const signer=envMyTurn(env);if(!signer){UI.closeModal();return;}
  signer.status='signed';signer.signedAt=todayISO();signer.consentAt=todayISO();signer.sigStyle=SIGNCTX.style;signer.ip='10.4.'+rint(0,4)+'.'+rint(2,99);
  env.events.push({at:todayISO(),actor:me().name,action:'Consent recorded + signed',detail:'Signature adopted (typed) · intent affirmed'});
  if(env.signers.every(x=>x.status==='signed')){
    env.status='completed';env.completedAt=todayISO();
    env.events.push({at:todayISO(),actor:'System',action:'Envelope completed',detail:'Certificate generated · doc hash sealed'});
    notify(env.createdBy,'📜',`Envelope completed: ${env.title}`,'#/sign');
    DB.files.push({id:uid('FI'),name:env.id+' — completion certificate.pdf',kind:'pdf',parent:'fo-letters',ownerId:env.createdBy,scope:'people',updatedAt:todayISO(),size:'64 KB',starred:false});
  }else{
    const next=env.signers.filter(x=>x.status==='pending');
    next.forEach(n=>{if(n.empId)notify(n.empId,'✍️',`Your signature is requested: ${env.title}`,'#/sign');});
  }
  env.hash=envHash(env);
  audit('Envelope signed',env.id+' by '+me().name);
  Store.save();UI.closeModal();render();
  UI.toast(env.status==='completed'?'✅ All signed — envelope sealed, certificate ready':'Signed ✓ — routed to the next signer','📜');
};
ACT.signExternal=eid=>{
  const env=byId(DB.envelopes,eid);if(!env)return;
  const ext=env.signers.find(x=>!x.empId&&x.status==='pending');if(!ext)return;
  ext.status='signed';ext.signedAt=todayISO();ext.consentAt=todayISO();ext.ip='203.0.113.'+rint(2,200);
  env.events.push({at:todayISO(),actor:ext.name,action:'Consent recorded + signed',detail:'External signer · email-link authentication'});
  if(env.signers.every(x=>x.status==='signed')){env.status='completed';env.completedAt=todayISO();
    env.events.push({at:todayISO(),actor:'System',action:'Envelope completed',detail:'Certificate generated · doc hash sealed'});}
  env.hash=envHash(env);
  const flow=DB.flows.find(f=>f.envelopeId===eid);
  if(flow&&env.status==='completed'){flow.stage=Math.min(flow.stage+1,WF_TEMPLATES.find(t=>t.id===flow.templateId).stages.length-1);
    flow.activity.push({at:todayISO(),by:'MosaicSign',text:'Signature complete — workflow advanced automatically'});}
  Store.save();ACT.signOpen(eid);render();
  UI.toast('Counterparty signed (demo) — envelope sealed'+(flow?' · the contract workflow advanced itself':''),'🌐');
};

/* ============================================================
   WORKFLOWS — Asana-style requests with department engines

const tplOf=id=>WF_TEMPLATES.find(t=>t.id===id);
const flowNeedsMe=f=>{
  const tpl=tplOf(f.templateId);if(!tpl)return false;
  if(f.stage>=tpl.stages.length-1)return false;
  if(f.templateId==='purchase'){
    const req=emp(f.requesterId);
    if(tpl.stages[f.stage]==='Manager approval')return req&&req.managerId===DB.me.employeeId||isAdmin();
    if(tpl.stages[f.stage]==='Finance approval')return groupsOf(DB.me.employeeId).some(g=>g.id==='g-finance')||isAdmin();
  }
  return f.assigneeId===DB.me.employeeId;
};
const flowCanAdvance=f=>{
  const tpl=tplOf(f.templateId);
  return isAdmin()||f.assigneeId===DB.me.employeeId||tpl.ownerIds.includes(DB.me.employeeId)||flowNeedsMe(f);
};
Views.flows=()=>{
  const tab=UIS.flowTab||'mine';
  const tabs=[['mine','My work'],['boards','Boards'],['new','New request']];
  return `
  <div class="page-head"><div style="flex:1"><h1 class="page">Workflows</h1>
    <div class="page-sub">Contracts, purchasing, People and IT requests — each with its own pipeline, approvers and automations</div></div></div>
  <div class="tabs">${tabs.map(t=>`<button class="${tab===t[0]?'on':''}" data-act="setFlowTab" data-arg="${t[0]}">${t[1]}</button>`).join('')}</div>
  ${tab==='mine'?flowsMine():tab==='boards'?flowsBoard():flowsNew()}`;
};
ACT.setFlowTab=a=>{UIS.flowTab=a;render();};
function flowRow(f){
  const tpl=tplOf(f.templateId);const req=emp(f.requesterId);
  return `<div class="row mb8 hovercard" style="gap:10px;padding:8px;border-radius:10px;cursor:pointer" data-act="flowOpen" data-arg="${f.id}">
    <span style="font-size:17px">${tpl.icon}</span>
    <span class="col" style="gap:0;flex:1"><b class="small">${esc(f.title)}</b>
    <span class="tiny faint">${f.id} · ${tpl.name} · ${esc(req?req.name:'')} · ${rel(f.createdAt)}</span></span>
    ${f.fields.amount||f.fields.value?`<span class="chip num">${fmt$(f.fields.amount||f.fields.value)}</span>`:''}
    <span class="badge ${f.stage>=tpl.stages.length-1?'b-ok':flowNeedsMe(f)?'b-warn':'b-info'}">${tpl.stages[f.stage]}</span></div>`;

function flowsMine(){
  const needMe=DB.flows.filter(flowNeedsMe);
  const assigned=DB.flows.filter(f=>f.assigneeId===DB.me.employeeId&&!flowNeedsMe(f)&&f.stage<tplOf(f.templateId).stages.length-1);
  const mine=DB.flows.filter(f=>f.requesterId===DB.me.employeeId);
  return `<div class="grid g2">
    <div class="col" style="gap:16px">
      <div class="card pad" style="${needMe.length?'border-color:color-mix(in srgb,#e0457b 40%,var(--line))':''}"><b class="small">⚡ Needs your action (${needMe.length})</b>
        <div class="mt12">${needMe.map(flowRow).join('')||'<span class="tiny faint">Nothing waiting on you.</span>'}</div></div>
      <div class="card pad"><b class="small">Assigned to you</b>
        <div class="mt12">${assigned.map(flowRow).join('')||'<span class="tiny faint">Nothing assigned.</span>'}</div></div>
    </div>
    <div class="card pad"><b class="small">Your requests</b>
      <div class="mt12">${mine.map(flowRow).join('')||'<span class="tiny faint">You haven\'t submitted anything yet — try New request.</span>'}</div></div>

ACT.flowMove=arg=>{

function lessonsFor(c){
  return [
    {t:'Why this matters at Meridian',body:`${c.blurb}\n\nThis course exists because ${c.cat==='Compliance'?'getting this wrong carries real legal and human consequences — and getting it right is one of the quiet ways we take care of each other':c.cat==='Growth'?'the skills here compound: every conversation, review and decision gets a little better':'it makes the day-to-day work measurably smoother for you and your team'}.\n\nYou'll see real Meridian scenarios throughout — names changed, lessons kept.`},
    {t:'Core concepts',body:`The essentials, distilled:\n\n• ${(c.skills||['The fundamentals']).map(s=>s+' — what it looks like in practice, and the most common way it goes wrong.').join('\n• ')}\n\nEach concept pairs a principle with a Meridian-specific example, so it sticks to something real instead of floating as theory.`},
    {t:'In practice — a scenario',body:`A teammate pings you late on a Thursday with a situation that lands squarely in this course's territory.\n\nYou'll walk the decision step by step: what to check first, who to loop in, what to write down, and where the line is between "handle it" and "escalate it."\n\nSpoiler: the answer is almost never "improvise silently."`},
    {t:'Knowledge check',quiz:true},
  ];
}
function quizFor(c){
  const base=[
    {q:`What's the primary goal of “${c.title}”?`,opts:[c.blurb.split(/[.—]/)[0].trim(),'Maximizing meeting attendance','Reducing office snack costs','Memorizing the org chart'],a:0},
    {q:'Which capability does this course build?',opts:[(c.skills||['The fundamentals']).join(' + '),'Competitive juggling','Typing speed only','None — it\'s decorative'],a:0},
    {q:'When unsure how to apply this in a live situation, the right move is to…',opts:['Pause and ask — Ask People, your manager, or the relevant channel','Guess silently and hope','Wait for the annual review to find out','Delete the evidence'],a:0},
    {q:c.expires?`How often does “${c.title}” require recertification?`:'Where does your completion get recorded?',opts:[c.expires?'Every '+c.expires+' months — Mosaic re-assigns it automatically':'In your Mosaic learning record, instantly','Never anywhere','On a sticky note','By carrier pigeon'],a:0},
  ];
  /* rotate options so the right answer isn't always first */
  return base.map((qq,i)=>{const r=(i+1)%4;const opts=qq.opts.map((_,j)=>qq.opts[(j-r+4)%4]);return {q:qq.q,opts,a:(qq.a+r)%4};});
}

  return `
