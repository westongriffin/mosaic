  <div class="card pad mb16" style="display:flex;gap:20px;align-items:center;flex-wrap:wrap">
    ${av(e,'xxl')}
    <div style="flex:1;min-width:230px">
      <div class="row" style="gap:10px;flex-wrap:wrap"><h1 class="page" style="font-size:21px">${esc(e.name)}</h1>${badge(e.status)}${e.id===DB.me.employeeId?'<span class="badge b-vio">That\'s you</span>':''}</div>
      <div class="muted" style="margin-top:2px">${esc(e.title)} · ${deptName(e.dept)} · ${esc(e.location)}</div>
      <div class="row mt8 wrap" style="gap:14px;font-size:12.5px;color:var(--ink2)">
        <span class="row" style="gap:5px">${I.mail} ${esc(e.email)}</span>
        <span class="row" style="gap:5px">${I.phone} ${esc(e.phone)}</span>
        <span class="row" style="gap:5px">${I.cal} Started ${fmtD(e.hireDate)} (${tenure(e.hireDate)})</span>
        <span class="row" style="gap:5px">${esc(e.pronouns)}</span>
      </div>
    </div>
    <div class="col" style="gap:8px;align-items:flex-end">
      ${isAdmin()&&e.status==='active'&&e.id!==DB.me.employeeId?riskPill(flightRisk(e)):''}
      ${mgr?`<a class="chip" href="#/people/${mgr.id}" title="Manager">${av(mgr,'xs')} Reports to <b>${esc(mgr.name)}</b></a>`:'<span class="chip">Reports to the board</span>'}
      <div class="row wrap" style="gap:7px;justify-content:flex-end">
        <button class="btn sm soft" data-act="openPraise" data-arg="${e.id}">⭐ Praise</button>
        ${e.id===DB.me.employeeId?'<button class="btn sm ghost" data-act="openTimeReq">🏖️ Time off</button>':''}
        ${isAdmin()||hasCap('edit-people')?`<button class="btn sm ghost" data-act="editJob" data-arg="${e.id}">${I.edit} Edit job</button>`:''}
        ${(isAdmin()||hasCap('hr-admin'))&&e.id!==DB.me.employeeId?`<button class="btn sm ghost" data-act="startBP" data-arg="${e.id}" title="Start a Workday-style business process for this worker">🧩 BP</button>`:''}
        ${canSeeComp(e)&&e.id!==DB.me.employeeId&&e.level!=='E'&&e.status==='active'&&isManager()?`<button class="btn sm good" data-act="openPromote" data-arg="${e.id}">📈 Promote</button>`:''}
        ${isAdmin()&&e.status==='active'&&e.id!==DB.me.employeeId?`<button class="btn sm ghost" data-act="openOffboard" data-arg="${e.id}">👋 Offboard</button>`:''}
      </div>
    </div>
  </div>
  <div class="tabs">${tabs.map(t=>`<button class="${tab===t[0]?'on':''}" data-act="setProfileTab" data-arg="${t[0]}">${t[1]}</button>`).join('')}</div>
  ${profileTab(e,tab,mgr,team)}`;
}
ACT.setProfileTab=a=>{UIS.profileTab=a;render();};
function profileTab(e,tab,mgr,team){
  if(tab==='personal')return personalTab(e);
  if(tab==='history')return historyTab(e);
  if(tab==='overview'){
    const fb=DB.feedback.filter(f=>fbRecipients(f).includes(e.id)).slice(0,3);
    const myGoals=DB.goals.filter(g=>g.ownerId===e.id);
    return `<div class="grid g23">
      <div class="col" style="gap:16px">
        <div class="card pad"><b class="small">About</b>
          <dl class="kv mt12">
            <dt>Employee ID</dt><dd>${e.id}</dd>
            <dt>Department</dt><dd><span class="linklike">${deptLink(e.dept)}</span> — ${esc(e.team)}</dd>
            <dt>Level</dt><dd>${e.level}</dd>
            <dt>Employment</dt><dd>${e.type==='FT'?'Full-time':e.type}</dd>
            <dt>Location</dt><dd>${esc(e.location)}</dd>
            <dt>Birthday</dt><dd>${fmtD(nextOccurrence(e.birthday),{month:'long',day:'numeric'})}</dd>
            ${e.lastDay?`<dt>Last day</dt><dd style="color:var(--warn);font-weight:700">${fmtD(e.lastDay)}</dd>`:''}
          </dl></div>
        ${myGoals.length?`<div class="card"><div class="card-head"><h3>Current goals</h3><span class="spacer"></span><a class="small linklike" href="#/grow">Performance →</a></div>
          <div class="card-body">${myGoals.map(g=>`<div class="mb12"><div class="row between" style="margin-bottom:4px"><b class="small">${esc(g.title)}</b>${badge(g.status)}</div>${progressBar(g.progress,'var(--c-grow)')}</div>`).join('')}</div></div>`:''}
        ${fb.length?`<div class="card"><div class="card-head"><h3>Recent recognition</h3></div><div class="card-body">${fb.map(f=>{const from=emp(f.fromId);
          return `<div class="row mb12" style="gap:10px;align-items:flex-start">${av(from,'sm')}<span class="col" style="gap:2px"><span class="small">“${esc(f.text)}”</span>
          <span class="tiny faint">${esc(from.name)} · ${rel(f.at)} ${f.values?f.values.map(v=>`<span class="chip" style="padding:0 6px;font-size:10px">${v}</span>`).join(' '):''}</span></span></div>`;}).join('')}</div></div>`:''}
      </div>
      <div class="col" style="gap:16px">
        ${team.length?`<div class="card"><div class="card-head"><h3>Direct reports (${team.length})</h3></div><div class="card-body" style="padding-top:8px">
          ${team.map(r=>`<a href="#/people/${r.id}" class="row mb8 hovercard" style="gap:9px;color:inherit;padding:4px 6px;border-radius:8px">${av(r,'sm')}<span class="col" style="gap:0"><b class="tiny" style="font-size:12px">${esc(r.name)}</b><span class="tiny faint">${esc(r.title)}</span></span></a>`).join('')}</div></div>`:''}
        <div class="card pad"><b class="small">Time off at a glance</b>
          <div class="row mt12" style="gap:14px">
            <div class="col" style="align-items:center;flex:1">${ring(e.pto.vacBalance/20*100,74,'var(--c-time)',e.pto.vacBalance+'d')}<span class="tiny faint" style="margin-top:4px">Vacation left</span></div>
            <div class="col" style="align-items:center;flex:1">${ring(e.pto.sickBalance/10*100,74,'var(--c-onboard)',e.pto.sickBalance+'d')}<span class="tiny faint" style="margin-top:4px">Sick left</span></div>
          </div></div>
        <div class="card pad"><b class="small">Org context</b>
          <div class="col mt12" style="gap:7px">
            ${(()=>{const chain=[];let cur=mgr;while(cur){chain.push(cur);cur=emp(cur.managerId);}return chain.reverse().map(c=>`<a class="row hovercard" style="gap:8px;color:inherit;padding:3px 6px;border-radius:8px" href="#/people/${c.id}">${av(c,'xs')}<span class="tiny" style="font-weight:600">${esc(c.name)}</span><span class="tiny faint">${esc(c.title.split(',')[0])}</span></a><div style="margin-left:14px;color:var(--ink3);font-size:10px">↓</div>`).join('');})()}
            <span class="row" style="gap:8px;padding:3px 6px">${av(e,'xs')}<span class="tiny" style="font-weight:700">${esc(e.name)}</span></span>
          </div></div>
      </div>
    </div>`;
  }
  if(tab==='job'){
    if(!canSeeComp(e))return `<div class="card pad empty"><div class="big">🔒</div>Compensation details are visible to ${esc(e.name.split(' ')[0])}, their management chain, and People admins.<br><span class="tiny">Try switching roles in the top bar to see permission-aware views in action.</span></div>`;
    const band=bandFor(e.level,e.dept);
    const posInBand=clamp((e.comp.base-band[0])/(band[2]-band[0])*100,0,100);
    return `<div class="grid g23">
      <div class="col" style="gap:16px">
        <div class="card pad">
          <div class="row between"><b class="small">Compensation</b><span class="tiny faint">Band ${e.level} · ${TECH_DEPTS.includes(e.dept)?'tech':'core'} family</span></div>
          <div class="grid g3 mt16">
            <div class="col"><span class="tiny faint">Base salary</span><b style="font-size:21px" class="num">${fmt$(e.comp.base)}</b></div>
            <div class="col"><span class="tiny faint">Target bonus</span><b style="font-size:21px" class="num">${e.comp.bonusPct}%</b></div>
            <div class="col"><span class="tiny faint">Equity (options)</span><b style="font-size:21px" class="num">${e.comp.equity.toLocaleString()}</b></div>
          </div>
          <div class="mt20"><span class="tiny faint">Position in band — ${fmtK(band[0])} to ${fmtK(band[2])} (mid ${fmtK(band[1])})</span>
            <div style="position:relative;height:30px;margin-top:8px">

              <div style="position:absolute;left:50%;top:7px;bottom:7px;width:2px;background:var(--line2)"></div>
              <div style="position:absolute;left:${posInBand}%;top:0;transform:translateX(-50%)" title="${fmt$(e.comp.base)}">
                <div style="width:16px;height:16px;border-radius:99px;background:var(--c-pay);border:3px solid var(--card);box-shadow:var(--shadow);margin:7px auto 0"></div></div>
            </div>
            <div class="row between tiny faint"><span>${fmtK(band[0])}</span><span>mid</span><span>${fmtK(band[2])}</span></div>
          </div>
        </div>
        <div class="card"><div class="card-head"><h3>Compensation history</h3></div><div class="card-body">
          <div class="timeline" style="--mod:var(--c-pay)">${[...e.compHistory].reverse().map(h=>`
            <div class="tl-item"><b class="small">${h.type}</b> — <span class="num" style="font-weight:700">${fmt$(h.base)}</span>
            <div class="tiny faint">${fmtD(h.date)} · ${esc(h.note)}</div></div>`).join('')}</div></div></div>
      </div>
      <div class="col" style="gap:16px">
        <div class="card pad"><b class="small">Position</b><dl class="kv mt12">
          <dt>Title</dt><dd>${esc(e.title)}</dd><dt>Level</dt><dd>${e.level}</dd>
          <dt>Manager</dt><dd>${mgr?esc(mgr.name):'—'}</dd><dt>Cost center</dt><dd>${deptName(e.dept)} · ${e.location.split(' ')[0]}</dd>
          <dt>FLSA</dt><dd>Exempt</dd></dl></div>
        <div class="card pad" style="background:linear-gradient(135deg,color-mix(in srgb,var(--c-pay) 8%,var(--card)),var(--card))"><b class="small">💡 Total rewards</b>
          <p class="small muted" style="margin-top:8px">Including bonus target, 401(k) match and benefits employer cost, total annual investment ≈ <b class="num">${fmt$(e.comp.base*(1+e.comp.bonusPct/100)+e.comp.base*0.04+5400)}</b>.</p></div>
      </div>
    </div>`;
  }
  if(tab==='time'){
    const hist=DB.timeoff.filter(t=>t.employeeId===e.id).sort((a,b)=>b.start.localeCompare(a.start));
    return `<div class="grid g32">
      <div class="card pad"><b class="small">Balances</b>
        <div class="row mt16" style="gap:18px;justify-content:space-around">
          <div class="col" style="align-items:center">${ring(e.pto.vacBalance/20*100,92,'var(--c-time)',e.pto.vacBalance+'d')}<span class="tiny faint" style="margin-top:6px">Vacation</span><span class="tiny faint">${e.pto.vacUsed} used / 20 yr</span></div>
          <div class="col" style="align-items:center">${ring(e.pto.sickBalance/10*100,92,'var(--c-onboard)',e.pto.sickBalance+'d')}<span class="tiny faint" style="margin-top:6px">Sick</span><span class="tiny faint">${e.pto.sickUsed} used / 10 yr</span></div>
        </div>
        ${e.id===DB.me.employeeId?'<button class="btn primary block mt20" data-act="openTimeReq" style="--brand:var(--c-time);--brand-deep:#0284c7">Request time off</button>':''}</div>
      <div class="card"><div class="card-head"><h3>Request history</h3></div>
        <table class="tbl"><thead><tr><th>Type</th><th>Dates</th><th class="r">Days</th><th>Status</th></tr></thead><tbody>
        ${hist.map(t=>`<tr><td><span class="row" style="gap:7px"><i style="width:8px;height:8px;border-radius:3px;background:${TO_TYPES[t.type].color}"></i>${TO_TYPES[t.type].label}</span></td>
          <td class="muted">${fmtDshort(t.start)} – ${fmtDshort(t.end)}</td><td class="r num">${t.days}</td><td>${badge(t.status)}</td></tr>`).join('')||'<tr><td colspan="4" class="faint">No requests yet.</td></tr>'}</tbody></table></div>
    </div>`;
  }
  if(tab==='learning'){
    const ens=DB.enrollments.filter(x=>x.employeeId===e.id);
    const done=ens.filter(x=>x.progress>=100);
    return `<div class="grid g32">
      <div class="col" style="gap:16px">
        <div class="card pad" style="text-align:center">${ring(done.length/(ens.length||1)*100,110,'var(--c-learn)')}
          <div class="small muted mt12"><b>${done.length}</b> of <b>${ens.length}</b> assigned & elective courses complete</div></div>
        ${(()=>{const sk=Object.entries(skillsOf(e.id)).sort((a,b)=>b[1]-a[1]).slice(0,8);return sk.length?`<div class="card pad"><b class="small">Skills built through Learning</b><div class="row wrap mt12" style="gap:6px">${sk.map(([s,n])=>`<span class="chip" style="background:var(--teal-soft);border-color:transparent;color:#0a7568">${s}${n>1?' ×'+n:''}</span>`).join('')}</div></div>`:'';})()}

          return `<div class="card pad"><b class="small">Certifications</b>${certs.map(c=>{const co=courseOf(c.courseId);const soon=between(todayISO(),c.certExpires)<31;
          return `<div class="row mt12" style="gap:9px"><span style="font-size:17px">🛡️</span><span class="col" style="gap:0;flex:1"><b class="tiny" style="font-size:12px">${esc(co.title)}</b>
          <span class="tiny ${soon?'':'faint'}" style="${soon?'color:var(--warn);font-weight:700':''}">expires ${fmtD(c.certExpires)}${soon?' ⚠️':''}</span></span></div>`;}).join('')}</div>`;})()}

      <div class="card"><div class="card-head"><h3>Courses</h3><span class="spacer"></span><a class="small linklike" href="#/learn">Open Learning →</a></div>
        <table class="tbl"><thead><tr><th>Course</th><th>Progress</th><th>Due</th><th class="r">Score</th></tr></thead><tbody>
        ${ens.map(x=>{const c=courseOf(x.courseId);const overdue=x.due&&x.due<todayISO()&&x.progress<100;
          return `<tr class="click" onclick="nav('#/learn/${c.id}')"><td><b class="small">${esc(c.title)}</b><div class="tiny faint">${c.cat} · ${c.mins} min</div></td>
          <td style="min-width:130px">${progressBar(x.progress,'var(--c-learn)')}</td>
          <td class="${overdue?'':'muted'}" style="${overdue?'color:var(--bad);font-weight:700':''}">${x.due?rel(x.due):'—'}</td>
          <td class="r num">${x.score!=null?x.score+'%':'—'}</td></tr>`;}).join('')}</tbody></table></div>
    </div>`;
  }
  if(tab==='perf'){
    const revs=DB.reviews.filter(r=>r.employeeId===e.id&&r.type==='manager'&&r.status==='submitted'&&r.rating);
    const goals=DB.goals.filter(g=>g.ownerId===e.id);
    const fb=DB.feedback.filter(f=>f.toId===e.id||f.fromId===e.id);
    return `<div class="grid g32">
      <div class="col" style="gap:16px">
        <div class="card pad"><b class="small">Review ratings</b>
          ${revs.length?revs.map(r=>{const cy=byId(DB.cycles,r.cycleId);
            return `<div class="row mt12 between"><span class="small muted">${cy?cy.name:r.cycleId}</span><span class="row" style="gap:6px">${stars(r.rating)}<b class="num">${r.rating}.0</b></span></div>`;}).join(''):'<div class="faint small mt12">No completed reviews yet.</div>'}
        </div>
        <div class="card pad"><div class="row between"><b class="small">Recognition received</b><span class="badge b-vio">+${ptsEarned(e.id)} pts earned</span></div>
          <div class="col mt12" style="gap:10px">${DB.feedback.filter(f=>fbRecipients(f).includes(e.id)).slice(0,5).map(f=>{const from=emp(f.fromId);if(!from)return'';
            return `<div class="row" style="gap:9px;align-items:flex-start">${av(from,'xs')}<span class="col" style="gap:1px;flex:1"><span class="tiny" style="line-height:1.5">“${esc(f.text.length>110?f.text.slice(0,108)+'…':f.text)}”</span>
            <span class="tiny faint">${esc(from.name)} · ${rel(f.at)}${f.pts?' · +'+f.pts+' pts':''} ${(f.values||[]).map(v=>'✦ '+v).join(' ')}</span></span></div>`;}).join('')||'<span class="tiny faint">No recognition yet — be the first.</span>'}</div>
          <button class="btn sm soft block mt12" style="--brand:var(--c-grow)" data-act="openPraise" data-arg="${e.id}">⭐ Recognize ${esc(e.name.split(' ')[0])}</button></div>
      </div>
      <div class="card"><div class="card-head"><h3>Goals</h3><span class="spacer"></span><a class="small linklike" href="#/grow">Open Performance →</a></div>
        <div class="card-body">${goals.length?goals.map(g=>`
          <div class="mb16"><div class="row between" style="margin-bottom:4px"><b class="small">${esc(g.title)}</b>${badge(g.status)}</div>
          ${progressBar(g.progress,'var(--c-grow)')}
          <div class="tiny faint" style="margin-top:3px">due ${fmtD(g.due)}${g.parentId?' · ladders to '+esc((byId(DB.goals,g.parentId)||{title:''}).title):''}</div></div>`).join(''):'<div class="empty">No goals on record.</div>'}</div></div>
    </div>`;
  }
  if(tab==='docs'){
    return `<div class="card"><div class="card-head"><h3>Documents</h3><span class="spacer"></span>
      ${(e.id===DB.me.employeeId||isAdmin())?`<button class="btn sm soft" data-act="genVerifyLetter" data-arg="${e.id}">${I.doc} Generate verification letter</button>`:''}
      <span class="tiny faint">e-signed via DocuSign integration</span></div>
      <table class="tbl"><thead><tr><th>Document</th><th>Category</th><th>Date</th><th class="r"></th></tr></thead><tbody>
      ${e.docs.map(d=>`<tr><td><span class="row" style="gap:8px">${I.doc}<b class="small">${esc(d.name)}</b></span></td>
        <td>${badge('b-mute',d.kind)||d.kind}</td><td class="muted">${fmtD(d.date)}</td>
        <td class="r"><button class="btn xs ghost" onclick="UI.toast('Demo: “${esc(d.name)}” would download here','📄')">${I.download} Download</button></td></tr>`).join('')}</tbody></table></div>`;
  }
  return '';
}

const reqCands=rid=>DB.candidates.filter(c=>c.reqId===rid);
const reqAge=r=>between(r.openedAt,r.filledAt||todayISO());
function avgTimeToFill(){const f=DB.reqs.filter(r=>r.status==='filled'&&r.filledAt);return f.length?Math.round(avg(f.map(r=>between(r.openedAt,r.filledAt)))):null;}

Views.recruit=param=>{
  if(param)return reqView(param);
  const mineOnly=myRole()==='manager';
  const myId=DB.me.employeeId;
  const open=DB.reqs.filter(r=>r.status==='open'&&(!mineOnly||r.hmId===myId));
  const filled=DB.reqs.filter(r=>r.status==='filled'&&(!mineOnly||r.hmId===myId));
  const inProcess=DB.candidates.filter(c=>!['rejected','hired'].includes(c.stage)&&open.some(r=>r.id===c.reqId)).length;

  return `
  <div class="page-head">
    <div style="flex:1"><h1 class="page">Recruiting</h1><div class="page-sub">${mineOnly?'Requisitions where you\'re the hiring manager':'Every open search at '+COMPANY.name}</div></div>

    ${statCard('Open reqs',open.length,open.filter(r=>r.target<todayISO()).length+' past target','var(--c-recruit)',undefined,'','#/recruit')}

    ${statCard('Offers out',offers,'awaiting response · chains in MosaicSign','var(--c-onboard)',undefined,'','#/sign')}
    ${statCard('Avg time to fill',(avgTimeToFill()||'—')+'d','target 35d · funnel in Insights','var(--c-insights)',undefined,'','#/insights')}
  </div>
  ${(()=>{const pros=DB.candidates.filter(c=>c.stage==='prospect'&&(!mineOnly||DB.reqs.some(r=>r.id===c.reqId&&r.hmId===myId)));
    return pros.length?`<div class="card mb16"><div class="card-head"><h3>🔭 Prospect pool (${pros.length})</h3><span class="spacer"></span><span class="tiny faint">sourced ahead of need — one click moves them into a live pipeline</span></div>
    <div class="card-body row wrap" style="gap:8px">${pros.map(c=>{const r=byId(DB.reqs,c.reqId)||{};
      return `<span class="chip" style="padding:7px 11px;gap:8px;cursor:pointer" data-act="openCand" data-arg="${c.id}">${av(c,'xs')} <span class="col" style="gap:0"><b class="tiny" style="font-size:12px">${esc(c.name)}</b><span class="tiny faint">${esc(c.company)} · ${c.years} yrs · for ${esc(r.title||'?')}</span></span>
      <button class="btn xs soft" style="--brand:var(--c-recruit)" data-act="prospectConvert" data-arg="${c.id}" onclick="event.stopPropagation()">→ Pipeline</button></span>`;}).join('')}</div></div>`:'';})()}
  <div class="card mb16"><div class="card-head"><h3>Open requisitions</h3></div>
  <table class="tbl"><thead><tr><th>Role</th><th>Hiring manager</th><th>Pipeline</th><th>Age</th><th>Target</th><th>Priority</th></tr></thead><tbody>
  ${open.map(r=>{const cs=reqCands(r.id);const late=r.target<todayISO();

function reqInsights(r,cs){
  const order=['applied','screening','interview','offer','hired'];
  const reached=st=>cs.filter(c=>order.indexOf(c.stage)>=order.indexOf(st)||(c.stage==='rejected'&&order.indexOf('applied')>=order.indexOf(st))).length;
  const funnel=order.map((s,i)=>({label:STAGE_LABEL[s],v:cs.filter(c=>c.stage==='rejected'?i===0:order.indexOf(c.stage)>=i).length,color:['#c7d2fe','#a5b4fc','#818cf8','#6366f1','#4f46e5'][i]}));
  const inStage=order.slice(0,4).map(s=>{const items=cs.filter(c=>c.stage===s);
    return {s,n:items.length,avg:items.length?Math.round(avg(items.map(c=>between(c.appliedAt,todayISO())))):0};});
  const load={};cs.forEach(c=>c.scorecards.forEach(sc=>{const n=(emp(sc.by)||{}).name;if(n)load[n]=(load[n]||0)+1;}));
  return `<div class="grid g2">
    <div class="card"><div class="card-head"><h3>This req's funnel</h3></div><div class="card-body">${Chart.funnel(funnel)}</div></div>
    <div class="col" style="gap:16px">

      <div class="card"><div class="card-head"><h3>Interviewer load</h3><span class="spacer"></span><button class="btn xs soft" style="--brand:var(--c-recruit)" data-act="nudgeScorecards" data-arg="${r.id}">📝 Nudge missing</button></div><div class="card-body" style="padding-top:8px">
        ${Object.entries(load).sort((a,b)=>b[1]-a[1]).map(([n,c])=>`<div class="row mb8 between"><span class="small">${esc(n)}</span><span class="chip num">${c} scorecard${c===1?'':'s'}</span></div>`).join('')||'<span class="tiny faint">No scorecards yet.</span>'}</div></div>
      <div class="card pad"><div class="row between"><b class="small">EEOC-style report</b><span class="badge b-mute">anonymized</span></div>
        <p class="tiny muted" style="margin-top:7px;line-height:1.7">Voluntary self-ID is collected at apply and never shown on candidates. Aggregates suppress groups under 5 — for this req every cell is currently suppressed (n&lt;5), which is exactly what compliant reporting should do at this volume. Company-level aggregates live in Insights.</p></div>
    </div></div>`;
}

    ${sc?`<span class="row tiny" style="gap:3px;color:#f5a623">${I.star}<b>${sc.toFixed(1)}</b></span>`:`<span class="tiny faint">${rel(c.appliedAt)}</span>`}</div></div>`;
}
window.dragCand=(ev,cid)=>{ev.dataTransfer.setData('text/plain',cid);ev.target.classList.add('dragging');};
window.dropCand=(ev,stage,rid)=>{
  ev.preventDefault();
  const cid=ev.dataTransfer.getData('text/plain');
  $$('.kcol').forEach(k=>k.classList.remove('dragover'));
  if(!cid)return;
  if(stage==='hired'){ACT.openHire(cid);return;}
  moveCand(cid,stage);
};
function moveCand(cid,stage){
  const c=byId(DB.candidates,cid);
  if(!c||c.stage===stage)return;
  const from=c.stage;c.stage=stage;
  c.activity.push({at:todayISO(),by:me().name,text:`Moved ${STAGE_LABEL[from]} → ${STAGE_LABEL[stage]}`});
  if(stage==='offer'&&!c.offer){const r=byId(DB.reqs,c.reqId);
    c.offer={base:Math.round((r.salary[0]+r.salary[1])/2/500)*500,equity:3500,bonusPct:8,startDate:daysAhead(21),status:'draft',
      chain:[{label:'Hiring manager',id:r.hmId,status:'pending'},{label:'Finance',id:'E004',status:'pending'},{label:'CPO',id:'E007',status:'pending'}]};
    /* whoever moved them can clear their own step instantly */
    const own=c.offer.chain.find(s=>s.id===DB.me.employeeId);if(own)own.status='approved';
    c.activity.push({at:todayISO(),by:me().name,text:'Offer drafted — approval chain started (HM → Finance → CPO)'});}
  audit('Candidate stage change',`${c.name}: ${STAGE_LABEL[from]} → ${STAGE_LABEL[stage]}`);
  Store.save();render();
  UI.toast(`<b>${esc(c.name)}</b> moved to ${STAGE_LABEL[stage]}`,'🧲');
}
ACT.moveCandBtn=arg=>{const [cid,stage]=arg.split('|');UI.closeDrawer();moveCand(cid,stage);};
ACT.rejectCand=cid=>{const c=byId(DB.candidates,cid);if(!c)return;
  const prevStage=c.stage,prevLen=c.activity.length;
  c.stage='rejected';
  c.activity.push({at:todayISO(),by:me().name,text:'Candidate released with feedback'});
  Store.save();UI.closeDrawer();render();
  UI.toast(`${esc(c.name)} released — rejection email queued`,'📭',{label:'Undo',fn:()=>{
    c.stage=prevStage;c.activity.length=prevLen;Store.save();render();
    UI.toast(`${esc(c.name)} is back in ${STAGE_LABEL[prevStage]}`,'↩️');}});};

  UI.drawer({
    head:`${av(c,'lg')}<div class="col" style="gap:2px"><div class="row" style="gap:8px"><b style="font-size:16px">${esc(c.name)}</b>${badge(c.stage)}</div>
      <span class="tiny muted">${esc(r.title)} · ${r.id} · applied ${rel(c.appliedAt)}</span></div>`,
    body:`

        <div class="card2 card pad" style="box-shadow:none"><span class="tiny faint">Contact</span>
          <div class="small mt8 row" style="gap:6px">${I.mail}${esc(c.email)}</div>
          <div class="small mt8 row" style="gap:6px">${I.phone}${esc(c.phone)}</div>
          <div class="small mt8 row" style="gap:6px">${I.pin}${esc(c.loc)}</div></div>

          <div class="small mt8">${c.years} years experience</div>
          <div class="small mt8">Source: <b>${esc(c.source)}</b></div></div>
      </div>
      ${c.offer?`<div class="card pad mb16" style="background:linear-gradient(135deg,var(--warn-soft),var(--card));border-color:color-mix(in srgb,var(--warn) 30%,var(--line))">
        <div class="row between"><b class="small">✉️ Offer ${c.offer.status==='extended'?'extended '+rel(c.offer.sentAt||todayISO()):'draft'}</b>${badge(c.offer.status)}</div>
        <div class="grid g3 mt12">
          <span class="col"><span class="tiny faint">Base</span><b class="num">${fmt$(c.offer.base)}</b></span>
          <span class="col"><span class="tiny faint">Bonus</span><b class="num">${c.offer.bonusPct}%</b></span>
          <span class="col"><span class="tiny faint">Start</span><b>${fmtDshort(c.offer.startDate)}</b></span></div>
        ${c.offer.chain?`<div class="mt12">${chainHtml(c.offer.chain)}</div>`:''}
        ${(()=>{const cur=c.offer.chain?chainCurrent(c.offer.chain):null;
          if(c.offer.status!=='draft')return `<button class="btn sm ghost mt12" data-act="genOfferLetter" data-arg="${c.id}">${I.doc} Offer letter PDF</button>`;
          if(cur)return `<div class="row mt12" style="gap:7px">${(cur.id===DB.me.employeeId||isAdmin())?`<button class="btn sm good" data-act="approveOfferStep" data-arg="${c.id}">${I.check} Approve ${cur.label} step${cur.id!==DB.me.employeeId?' (as admin)':''}</button>`:`<span class="tiny faint">Waiting on ${esc((emp(cur.id)||{}).name||cur.label)}</span>`}</div>`;
          return `<div class="row mt12" style="gap:7px"><button class="btn sm primary" data-act="sendOffer" data-arg="${c.id}">Send offer via DocuSign</button><button class="btn sm ghost" data-act="genOfferLetter" data-arg="${c.id}">${I.doc} Preview letter</button></div>`;})()}</div>`:''}
      ${sc.length?`<b class="small">Interview scorecards · avg ${avg(sc.map(s=>s.overall)).toFixed(1)}/5</b>
        ${sc.map(s=>{const by=emp(s.by);return `<div class="card pad mt8" style="box-shadow:none;background:var(--card2)">
          <div class="row between"><span class="row" style="gap:8px">${av(by,'sm')}<b class="small">${esc(by?by.name:'Panelist')}</b></span>
          <span class="row" style="gap:6px">${stars(s.overall)}<span class="badge ${s.rec==='Strong hire'?'b-ok':s.rec==='Hire'?'b-teal':'b-bad'}">${s.rec}</span></span></div>
          <div class="row wrap mt8" style="gap:6px">${Object.entries(s.dims).map(([k,v])=>`<span class="chip" style="font-size:10.5px">${k}: <b>${v}</b></span>`).join('')}</div>
          <div class="small muted mt8">“${esc(s.notes)}”</div></div>`;}).join('')}`:'<div class="faint small">No scorecards yet.</div>'}
      <b class="small" style="display:block;margin-top:16px">Activity</b>
      <div class="timeline mt8" style="--mod:var(--c-recruit)">${[...c.activity].reverse().map(a=>`<div class="tl-item"><span class="small">${esc(a.text)}</span><div class="tiny faint">${esc(a.by)} · ${rel(a.at)}</div></div>`).join('')}</div>`,
    foot:`${c.stage!=='hired'&&c.stage!=='rejected'?`<button class="btn ghost" data-act="rejectCand" data-arg="${c.id}">Release</button>`:''}<span class="spacer"></span>
      ${!['hired','rejected'].includes(c.stage)?`<button class="btn ghost" data-act="candEmail" data-arg="${c.id}">✉️</button>`:''}
      ${c.stage==='prospect'?`<button class="btn soft" style="--brand:var(--c-recruit)" data-act="prospectConvert" data-arg="${c.id}">🔭 → Pipeline</button>`:''}
      ${['screening','interview'].includes(c.stage)?`<button class="btn soft" style="--brand:var(--c-recruit)" data-act="scorecardForm" data-arg="${c.id}">📝 Scorecard</button>`:''}
      ${nextStage?`<button class="btn soft" data-act="moveCandBtn" data-arg="${c.id}|${nextStage}">Advance to ${STAGE_LABEL[nextStage]} ${I.arrowr}</button>`:''}
      ${c.stage==='offer'&&c.offer&&c.offer.status==='extended'?`<button class="btn primary" style="--brand:var(--ok);--brand-deep:#0d9668" data-act="openHire" data-arg="${c.id}">🎉 Mark hired</button>`:c.stage==='offer'?`<span class="tiny faint" style="align-self:center">Hire unlocks once the offer is approved &amp; sent</span>`:''}`
  });
};
ACT.sendOffer=cid=>{const c=byId(DB.candidates,cid);
  if(c.offer.chain&&!chainDone(c.offer.chain)){UI.toast('Offer still needs approvals — see the chain in the card','⛓️');return;}
  c.offer.status='extended';c.offer.sentAt=todayISO();
  c.activity.push({at:todayISO(),by:me().name,text:'Offer extended via DocuSign'});
  audit('Offer extended',c.name);Store.save();ACT.openCand(cid);UI.toast('Offer sent to '+esc(c.name),'✉️');};
ACT.approveOfferStep=cid=>{
  const c=byId(DB.candidates,cid);if(!c||!c.offer||!c.offer.chain)return;
  const cur=chainCurrent(c.offer.chain);if(!cur)return;
  if(cur.id!==DB.me.employeeId&&!isAdmin()){UI.toast('This step belongs to '+esc((emp(cur.id)||{}).name||cur.label),'🔒');return;}
  cur.status='approved';cur.by=DB.me.employeeId;cur.at=todayISO();
  c.activity.push({at:todayISO(),by:me().name,text:'Offer approved — '+cur.label+' step'});
  const next=chainCurrent(c.offer.chain);
  if(next)notify(next.id,'⛓️',`Offer for ${c.name} needs your ${next.label} approval`,'#/recruit/'+c.reqId);
  audit('Offer step approved',c.name+' · '+cur.label);
  Store.save();ACT.openCand(cid);
  UI.toast(next?`${cur.label} approved — next: ${esc((emp(next.id)||{}).name||next.label)}`:'Chain complete — offer is cleared to send 🎉','⛓️');
};

/* ---- THE GOLDEN THREAD: hire → HRIS → onboarding → LMS → goals ---- */
ACT.openHire=cid=>{
  const c=byId(DB.candidates,cid);if(!c)return;
  const r=byId(DB.reqs,c.reqId);
  if(!c.offer||c.offer.status!=='extended'){
    UI.toast('Almost — the offer needs its approvals and a send before hiring. See the chain on the card.','⛓️');
    ACT.openCand(cid);return;}
  const offer=c.offer||{base:Math.round((r.salary[0]+r.salary[1])/2/500)*500,bonusPct:8,equity:3500,startDate:daysAhead(21)};
  UI.closeDrawer();
  UI.modal({title:`Hire ${c.name} 🎉`,sub:'Confirm the details — Mosaic will wire up every module from this one action.',body:`
    <div class="grid g2">
      <div class="field"><label>Title</label><input id="h-title" value="${esc(r.title)}"></div>
      <div class="field"><label>Level</label><input id="h-level" value="${r.level}"></div>
      <div class="field"><label>Manager</label><input value="${esc((emp(r.hmId)||{}).name||'')}" disabled></div>
      <div class="field"><label>Start date</label><input id="h-start" type="date" value="${offer.startDate}"></div>
      <div class="field"><label>Base salary</label><input id="h-base" type="number" value="${offer.base}"></div>

    </div>
    <div class="card pad mt8" style="background:var(--brand-soft);border-color:transparent;box-shadow:none">
      <b class="small">When you confirm, Mosaic will automatically:</b>
      <div class="small mt8" style="line-height:2">
        🪪 Create the employee record in <b>People</b><br>
        ✅ Spin up a 10-task journey in <b>Onboarding</b> (I-9, equipment, buddy…)<br>
        📚 Assign the compliance bundle${r.dept==='eng'?' + lab safety cert':''} in <b>Learning</b><br>
        🎯 Seed 30/60/90-day goals in <b>Performance</b><br>
        🧾 Open benefits enrollment in <b>Pay</b> · 📈 Update <b>Insights</b> headcount<br>
        ✔️ Close requisition <b>${r.id}</b></div></div>`,
    foot:`<button class="btn ghost" data-act="closeModal">Not yet</button><button class="btn primary" style="--brand:var(--ok);--brand-deep:#0d9668" data-act="confirmHire" data-arg="${c.id}">Confirm hire</button>`});
};
ACT.confirmHire=cid=>{
  const c=byId(DB.candidates,cid);if(!c)return;
  const r=byId(DB.reqs,c.reqId);
  const start=$('#h-start').value||daysAhead(14);
  const base=+$('#h-base').value||120000;
  const title=$('#h-title').value||r.title;
  const level=$('#h-level').value||r.level;
  const loc=$('#h-loc').value;
  /* 1 — HRIS record */
  const newId='E'+String(Math.max(...DB.employees.map(e=>+e.id.slice(1)))+1).padStart(3,'0');
  const ne=mkEmp({id:newId,name:c.name,title,level,dept:r.dept,team:r.team,managerId:r.hmId,loc,status:'onboarding',hireDate:start,base});
  addPersonal(ne);
  ne.pto.vacBalance=20;ne.pto.vacUsed=0;
  ne.compHistory=[{date:start,type:'Hired',base,note:'Offer — '+r.id}];
  DB.employees.push(ne);
  /* 2 — candidate + req */
  c.stage='hired';c.activity.push({at:todayISO(),by:me().name,text:'Hired! Employee record '+newId+' created'});
  r.status='filled';r.filledAt=todayISO();r.hiredName=c.name;
  /* 3 — onboarding journey */
  DB.onboarding.push({id:uid('OB'),employeeId:newId,startDate:start,
    buddyId:(reportsOf(r.hmId).find(x=>x.id!==newId)||{}).id||null,
    tasks:OB_TEMPLATE.map((t,k)=>({id:uid('T'),title:t.title,owner:t.owner,due:iso(new Date(new Date(start).getTime()+t.offset*DAY)),cat:t.cat,done:false,doneAt:null}))});
  /* 4 — LMS assignments */
  ['L-101','L-102','L-103','L-104'].concat(r.dept==='eng'?['L-105']:[]).forEach(courseId=>{
    DB.enrollments.push({id:uid('EN'),employeeId:newId,courseId,assignedAt:todayISO(),due:iso(new Date(new Date(start).getTime()+14*DAY)),progress:0,completedAt:null,score:null});
  });
  /* 5 — 30/60/90 goals */
  const parent=DB.goals.find(g=>g.scope==='dept'&&g.ownerId===r.hmId);
  [['First 30: ramp & relationships','Meet the team, ship one starter task, complete onboarding journey',30],
   ['First 60: own a workstream','Take a meaningful piece of '+(parent?parent.title.split(':')[1]||r.team:r.team)+' end-to-end',60],
   ['First 90: full speed','Operating independently with clear next-quarter goals',90]].forEach((g,i)=>{
    DB.goals.push({id:uid('G'),scope:'individual',ownerId:newId,parentId:parent?parent.id:null,title:g[0],desc:g[1],due:iso(new Date(new Date(start).getTime()+g[2]*DAY)),status:'on-track',progress:0,krs:[]});
  });
  /* 6 — benefits shell */
  DB.benefits.push({employeeId:newId,medical:null,dental:null,vision:null,k401:0,dependents:0});
  /* 7 — comms + audit */
  notify(r.hmId,'🎉',`${c.name} accepted! Starts ${fmtDshort(start)} — onboarding journey is live`,'#/onboard');
  notify('E007','🎉',`${c.name} hired for ${r.id} ${r.title} — all systems provisioned`,'#/people/'+newId);
  audit('Hire completed',`${c.name} → ${newId} · ${title} · starts ${start}`);
  chatPost('c-people-updates','🎉 Offer accepted! '+c.name+' joins as '+title+' on '+fmtDshort(start)+'. Onboarding journey is live — say hi when they land!');
  Store.save();UI.closeModal();
  /* 8 — the receipts */
  confetti(80);
  UI.modal({title:'🧩 One action. Six modules. Zero re-entry.',sub:`${c.name} is wired into everything:`,body:`
    <div class="col" style="gap:9px">
      ${[['🪪','People',`Employee <b>${newId}</b> created — profile, comp record, manager chain`,'#/people/'+newId],
        ['✅','Onboarding','10-task journey scheduled around their start date','#/onboard'],
        ['📚','Learning',`${r.dept==='eng'?5:4} compliance courses assigned, due start +14d`,'#/learn'],
        ['🎯','Performance','30/60/90-day goals seeded'+(parent?', laddered to the team goal':''),'#/grow'],
        ['🧾','Benefits','Enrollment window opened','#/benefits'],
        ['📈','Insights',`Headcount +1 · time-to-fill logged at ${between(r.openedAt,todayISO())} days`,'#/insights']]
        .map(x=>`<a class="row card pad hovercard" style="gap:11px;box-shadow:none;background:var(--card2);color:inherit;padding:11px 14px" href="${x[3]}" data-act="closeModalSoft">
        <span style="font-size:17px">${x[0]}</span><span class="col" style="gap:0"><b class="small">${x[1]}</b><span class="tiny muted">${x[2]}</span></span>
        <span class="spacer"></span>${I.chev}</a>`).join('')}
    </div>`,
    foot:`<button class="btn ghost" data-act="genOfferLetter" data-arg="${c.id}">${I.doc} Offer letter PDF</button><button class="btn ghost" data-act="closeModal">Stay here</button><button class="btn primary" data-act="goNewHire" data-arg="${newId}">Meet ${esc(c.name.split(' ')[0])} →</button>`});
  render();
};
ACT.closeModalSoft=()=>UI.closeModal();
ACT.goNewHire=id=>{UI.closeModal();nav('#/people/'+id);};

/* ============================================================
   VIEW: ONBOARDING — journeys & template
   ============================================================ */
Views.onboard=param=>{
  if(param==='on'||param==='off')UIS.journeyTab=param;
  const tab=UIS.journeyTab||'on';
  const mineOnly=myRole()==='manager';
  const myId=DB.me.employeeId;
  let journeys=DB.onboarding.map(ob=>({...ob,emp:emp(ob.employeeId)})).filter(j=>j.emp&&j.emp.status==='onboarding');
  let exits=(DB.offboarding||[]).map(ob=>({...ob,emp:emp(ob.employeeId)})).filter(j=>j.emp&&j.emp.status==='offboarding');
  if(mineOnly){journeys=journeys.filter(j=>j.emp.managerId===myId||mgrChainHas(j.emp,myId));
    exits=exits.filter(j=>j.emp.managerId===myId||mgrChainHas(j.emp,myId));}
  const allTasks=journeys.flatMap(j=>j.tasks).concat(exits.flatMap(j=>j.tasks));
  return `
  <div class="page-head">
    <div style="flex:1"><h1 class="page">Journeys</h1><div class="page-sub">Onboarding starts itself the moment someone is hired; offboarding wires IT, Pay and Insights from one click</div></div>
    <div class="seg"><button class="${tab==='on'?'on':''}" data-act="setJourneyTab" data-arg="on">🧑‍🚀 Onboarding (${journeys.length})</button>
    <button class="${tab==='off'?'on':''}" data-act="setJourneyTab" data-arg="off">👋 Offboarding (${exits.length})</button></div>
  </div>
  <div class="grid g4 mb16">
    ${statCard('Onboarding',journeys.length,'new Meridians ramping','var(--c-onboard)')}
    ${statCard('Offboarding',exits.length,'exits in motion','var(--c-recruit)')}
    ${statCard('Tasks complete',allTasks.filter(t=>t.done).length+'/'+allTasks.length,'across all journeys','var(--c-pay)')}
    ${statCard('Overdue tasks',allTasks.filter(t=>!t.done&&t.due<todayISO()).length,'need a nudge','var(--c-time)')}
  </div>
  ${tab==='on'?`
    ${journeys.length?journeys.map(j=>onboardCard(j)).join(''):'<div class="card empty"><div class="big">🧑‍🚀</div>No active onboarding. Hire someone in Recruiting and watch a journey appear.</div>'}
    ${isAdmin()?`<div class="card mt16"><div class="card-head"><h3>Onboarding template</h3><span class="spacer"></span><span class="tiny faint">applied automatically to every hire · offsets relative to start date</span></div>
      <table class="tbl"><thead><tr><th>Task</th><th>Owner</th><th>When</th><th>Category</th></tr></thead><tbody>
      ${OB_TEMPLATE.map(t=>`<tr><td><b class="small">${esc(t.title)}</b></td><td>${ownerChip(t.owner)}</td>
        <td class="muted num">${t.offset===0?'Day 1':t.offset<0?Math.abs(t.offset)+'d before start':'+'+t.offset+'d'}</td><td class="muted">${t.cat}</td></tr>`).join('')}</tbody></table></div>`:''}`
  :`
    ${exits.length?exits.map(j=>offboardCard(j)).join(''):'<div class="card empty"><div class="big">🕊️</div>No exits in motion. Start one from any profile (Admin persona) — the receipts modal shows everything it touches.</div>'}
    ${isAdmin()?`<div class="card mt16"><div class="card-head"><h3>Offboarding template</h3><span class="spacer"></span><span class="tiny faint">offsets relative to last day · access revocation is automatic via Okta</span></div>
      <table class="tbl"><thead><tr><th>Task</th><th>Owner</th><th>When</th><th>Category</th></tr></thead><tbody>
      ${OFFB_TEMPLATE.map(t=>`<tr><td><b class="small">${esc(t.title)}</b></td><td>${ownerChip(t.owner)}</td>
        <td class="muted num">${t.offset===0?'Last day':t.offset<0?Math.abs(t.offset)+'d before':'+'+t.offset+'d after'}</td><td class="muted">${t.cat}</td></tr>`).join('')}</tbody></table></div>`:''}`}`;
};
ACT.setJourneyTab=a=>{UIS.journeyTab=a;tabSync('onboard',a);render();};
function offboardCard(j){
  const doneN=j.tasks.filter(t=>t.done).length;
  const p=doneN/j.tasks.length*100;
  const mgr=emp(j.emp.managerId);
  const payout=Math.round(j.emp.pto.vacBalance*j.emp.comp.base/260);
  return `<div class="card mb16" style="border-color:color-mix(in srgb,var(--c-recruit) 25%,var(--line))">
    <div class="card-head">${av(j.emp,'lg')}
      <div class="col" style="gap:1px"><a href="#/people/${j.emp.id}" style="color:inherit"><h3>${esc(j.emp.name)}</h3></a>
      <span class="tiny faint">${esc(j.emp.title)} · last day <b style="color:var(--warn)">${fmtD(j.lastDay)}</b> (${rel(j.lastDay)})${mgr?' · manager '+esc(mgr.name):''}</span>
      <span class="row wrap mt8" style="gap:6px"><span class="chip">${esc(j.reason)}</span>${j.regret?'<span class="badge b-warn">Regretted</span>':''}<span class="chip">PTO payout ≈ ${fmt$(payout)}</span></span></div>
      <span class="spacer"></span>${ring(p,56,'var(--c-recruit)')}</div>
    <div class="card-body grid g2" style="gap:6px 22px">
      ${j.tasks.map(t=>{const overdue=!t.done&&t.due<todayISO();
        return `<label class="row" style="gap:9px;padding:5px 0;cursor:pointer">
        <input type="checkbox" ${t.done?'checked':''} onchange="ACT.toggleOffbTask('${j.id}|${t.id}')" style="width:16px;height:16px;accent-color:var(--c-recruit)">
        <span class="col" style="gap:0;flex:1"><span class="small" style="${t.done?'text-decoration:line-through;color:var(--ink3)':''}">${esc(t.title)}</span>
        <span class="tiny ${overdue?'':'faint'}" style="${overdue?'color:var(--bad);font-weight:650':''}">${overdue?'⚠️ overdue — ':''}due ${fmtDshort(t.due)}</span></span>
        ${ownerChip(t.owner)}</label>`;}).join('')}
    </div></div>`;
}

function onboardCard(j){

ACT.toggleObTask=arg=>{
  const [obId,taskId]=arg.split('|');

  const t=byId(ob.tasks,taskId);if(!t)return;
  t.done=!t.done;t.doneAt=t.done?todayISO():null;
  if(t.done&&t.title.includes('E-Verify'))UI.toast('E-Verify case created — employment authorized ✓','🛡️');
  const e=emp(ob.employeeId);
  if(ob.tasks.every(x=>x.done)&&e.status==='onboarding'){
    e.status='active';
    notify(e.managerId,'🎓',`${e.name} completed onboarding — status flipped to Active`,'#/people/'+e.id);
    audit('Onboarding completed',e.name+' → active');
    UI.toast(`<b>${esc(e.name)}</b> finished onboarding — now Active in People 🎓`,'🎉');
  }
  Store.save();render();
};

ACT.enrollCourse=cid=>{
  if(myEnroll(cid))return;
  DB.enrollments.push({id:uid('EN'),employeeId:DB.me.employeeId,courseId:cid,assignedAt:todayISO(),due:null,progress:0,completedAt:null,score:null,selfEnrolled:true});
  Store.save();render();UI.toast('Enrolled in <b>'+esc(courseOf(cid).title)+'</b>','📚');
};
ACT.continueCourse=cid=>{
  let en=myEnroll(cid);
  if(!en){ACT.enrollCourse(cid);en=myEnroll(cid);}
  const c=courseOf(cid);
  const was=en.progress;
  en.progress=clamp(en.progress+34,0,100);
  if(en.progress>=100&&was<100){
    en.completedAt=todayISO();en.score=rint(84,99);
    if(c.expires)en.certExpires=iso(new Date(Date.now()+c.expires*30.4*DAY));
    audit('Course completed',c.title+' · '+en.score+'%');
    UI.toast(`🎓 <b>${esc(c.title)}</b> complete — scored ${en.score}%${c.expires?' · cert issued':''}`,'🏆');
  }else{
    UI.toast(`Progress saved — ${en.progress}% through <b>${esc(c.title)}</b>`,'📖');
  }
  Store.save();render();
};

const CHEER_GREEN='#22c55e';
function parseCheer(s){
  const pts=+((s.match(/\+(\d{1,3})/)||[])[1]||0);
  const tags=[...s.matchAll(/#([a-zA-Z-]+)/g)].map(x=>x[1].toLowerCase());
  const ats=[...s.matchAll(/@([a-zA-Z]+)/g)].map(x=>x[1].toLowerCase());
  const recips=uniq(DB.employees.filter(e=>e.status!=='terminated'&&e.id!==DB.me.employeeId&&ats.some(a=>e.name.toLowerCase().startsWith(a)||e.name.toLowerCase().split(' ').some(w=>w.startsWith(a)))).map(e=>e.id));
  const values=VALUES.filter(v=>tags.some(t=>v.toLowerCase().replace(/[^a-z]/g,'').startsWith(t.replace(/-/g,''))));
  const text=s.replace(/\+\d{1,3}\s?/,'').trim();
  return {pts,recips,values,text,tags};
}

ACT.boostPost=fid=>{

  UI.modal({title:'Boost this cheer 🚀',sub:`Add your own points on top — each of the ${n} recipient${n===1?'':'s'} gets them. You have ${left} to give.`,body:`
    <div class="field"><label>Points to add (each)</label><input type="number" id="boost-pts" value="${Math.min(10,Math.floor(left/n))}" min="1" max="${Math.floor(left/n)||1}"></div>`,
    foot:`<button class="btn ghost" data-act="closeModal">Cancel</button><button class="btn primary" style="--brand:${CHEER_GREEN};--brand-deep:#16a34a" data-act="boostSave" data-arg="${fid}">🚀 Boost</button>`});

ACT.boostSave=fid=>{
  const f=byId(DB.feedback,fid);if(!f)return;
  const pts=clamp(+$('#boost-pts').value||0,1,999);
  const n=fbRecipients(f).length||1;
  if(pts*n>ptsLeft(DB.me.employeeId)){UI.toast('Over your allowance','🪙');return;}
  (f.boosts=f.boosts||[]).push({by:DB.me.employeeId,pts,at:todayISO()});
  fbRecipients(f).forEach(toId=>notify(toId,'🚀',`${me().name} boosted your cheer +${pts} pts`,'#/cheers'));
  Store.save();UI.closeModal();render();
  UI.toast('Boosted 🚀 — points landed instantly','🎉');

function cheersBoards(){
  const since=daysAgo(90);
  const earned={},given={},valCount={};
  DB.feedback.filter(f=>f.at>=since).forEach(f=>{
    const total=(f.pts||0)+sum((f.boosts||[]).map(b=>b.pts));
    fbRecipients(f).forEach(id=>earned[id]=(earned[id]||0)+total);
    if(f.pts)given[f.fromId]=(given[f.fromId]||0)+(f.pts*(fbRecipients(f).length||1));
    (f.boosts||[]).forEach(b=>given[b.by]=(given[b.by]||0)+b.pts*(fbRecipients(f).length||1));
    (f.values||[]).forEach(v=>valCount[v]=(valCount[v]||0)+1);
  });
  const board=(obj,label,emoji)=>`<div class="card"><div class="card-head"><h3>${emoji} ${label} · 90 days</h3></div>
    <div class="card-body" style="padding-top:8px">${Object.entries(obj).sort((a,b)=>b[1]-a[1]).slice(0,8).map(([id,p],i)=>{const e=emp(id);if(!e)return'';
      return `<div class="row mb8" style="gap:9px"><span style="width:22px;font-weight:800;color:var(--ink3)">${i<3?['🥇','🥈','🥉'][i]:i+1}</span>${av(e,'sm')}
      <a href="#/people/${e.id}" class="small" style="font-weight:650;flex:1;color:inherit">${esc(e.name)}</a>
      <span class="chip num">+${p}</span></div>`;}).join('')||'<span class="tiny faint">Nothing yet this quarter.</span>'}</div></div>`;
  return `<div class="grid g3">
    ${board(earned,'Most recognized','🏆')}
    ${board(given,'Most generous','💝')}
    <div class="card"><div class="card-head"><h3>✦ Values in action</h3></div><div class="card-body">
      ${Chart.donut(Object.entries(valCount).map(([v,n],i)=>({label:v,v:n,color:['#22c55e','#6d28d9','#0ea5e9','#f59e0b','#ec4899'][i%5]})),160,0.62,'Recognition by company value')}
      <div class="col mt12" style="gap:5px">${Object.entries(valCount).sort((a,b)=>b[1]-a[1]).map(([v,n],i)=>`<div class="row between"><span class="row tiny" style="gap:6px"><i style="width:9px;height:9px;border-radius:3px;background:${['#22c55e','#6d28d9','#0ea5e9','#f59e0b','#ec4899'][i%5]};display:inline-block"></i>${v}</span><b class="tiny num">${n}</b></div>`).join('')}</div></div></div>
  </div>`;
}

function cheersAnalytics(){
  const act=activeEmps();
  const gave=uniq(DB.feedback.filter(f=>f.at>=monthStart()&&f.pts).flatMap(f=>[f.fromId,...(f.boosts||[]).map(b=>b.by)]));
  const weeks=[3,2,1,0].map(w=>{const from=daysAgo((w+1)*7),to=daysAgo(w*7);
    return {label:w===0?'This wk':w+'w ago',v:DB.feedback.filter(f=>f.at>=from&&f.at<to).length,color:CHEER_GREEN};});
  return `<div class="grid g4 mb16">
    ${statCard('Participation',pct(gave.length,act.length)+'%',gave.length+' of '+act.length+' gave this month',CHEER_GREEN)}

      <div class="col mt12" style="gap:10px">${[['🔁','Allowance reset','1st of each month — unused points expire (use-it-or-lose-it drives habit)'],['📈','North star','% of employees giving monthly · target 60%'],['🧵','Connected','Cheers post to #people-updates, land on profiles, and feed flight-risk recognition signals']].map(x=>`

}

function growTalent(){
  const past=DB.cycles.find(c=>c.stage==='done');
  const pool=myRole()==='manager'?allReportsOf(DB.me.employeeId):DB.employees.filter(e=>e.status==='active');
  const cells={};
  pool.forEach(e=>{
    const r=DB.reviews.find(x=>x.cycleId===past.id&&x.employeeId===e.id&&x.type==='manager');
    if(!r||!r.rating)return;
    const perf=r.rating<=2?0:r.rating===3?1:2;

    (cells[pot+'-'+perf]=cells[pot+'-'+perf]||[]).push(e);

  let grid='';
  for(let pot=2;pot>=0;pot--){for(let perf=0;perf<3;perf++){
    const ppl=cells[pot+'-'+perf]||[];
    grid+=`<div class="nb-cell" style="background:${tones[2-pot][perf]}"><h5>${names[2-pot][perf]} <span class="faint">(${ppl.length})</span></h5>

  return `<div class="card pad">
    <div class="row between wrap mb16"><div><b>Talent map — ${esc(past.name)}</b><div class="tiny faint">Performance (→) × Potential (↑) · ${myRole()==='manager'?'your org':'company-wide'} · visible to managers & People team only</div></div>

    <div class="ninebox">${grid}</div>
    <div class="row between mt12 tiny faint"><span>← lower performance</span><span>higher performance →</span></div></div>`;
}

function calMonth(){
  const t=now();const y=t.getFullYear(),m=t.getMonth();
  const first=new Date(y,m,1),startDow=first.getDay(),dim=new Date(y,m+1,0).getDate();
  const approved=DB.timeoff.filter(x=>x.status==='approved');
  let cells='';
  for(let i=0;i<startDow;i++)cells+='<div class="day off"></div>';
  for(let d=1;d<=dim;d++){
    const dt=iso(new Date(y,m,d,12));
    const hol=DB.holidays.find(h=>h.date===dt);
    const offAll=approved.filter(x=>x.start<=dt&&x.end>=dt);
    const off=offAll.slice(0,2);
    cells+=`<div class="day ${dt===todayISO()?'today':''}"><span class="dnum">${d}</span>
      ${hol?`<div class="ev" style="background:var(--c-engage)" title="${esc(hol.name)}">🎉 ${esc(hol.name.split(' ')[0])}</div>`:''}
      ${off.map(x=>{const e=emp(x.employeeId);return e?`<div class="ev" style="background:${TO_TYPES[x.type].color}" title="${esc(e.name)} — ${TO_TYPES[x.type].label}">${initials(e.name)} · ${TO_TYPES[x.type].label.split(' ')[0]}</div>`:'';}).join('')}

  }
  return `<div class="row between mb12"><b class="small">${t.toLocaleDateString('en-US',{month:'long',year:'numeric'})} — who's out</b>

  <div class="cal">${['S','M','T','W','T','F','S'].map(d=>`<div class="dow">${d}</div>`).join('')}${cells}</div>`;
}

  const n=weekdaysBetween(s.value,e.value<s.value?s.value:e.value);
  out.textContent=n+' working day'+(n===1?'':'s')+(n>5?' — needs manager + People-team approval':'');};
ACT.submitTimeReq=()=>{
  const my=me();
  const start=$('#to-start').value,endRaw=$('#to-end').value;
  const end=endRaw<start?start:endRaw;
  const days=weekdaysBetween(start,end);
  const type=$('#to-type').value;
  const req={id:uid('TO'),employeeId:my.id,type,start,end,days,note:$('#to-note').value.trim(),status:'pending',submittedAt:todayISO()};
  if(days>5&&my.managerId)req.chain=[{label:'Manager',id:my.managerId,status:'pending'},{label:'People team',id:'E021',status:'pending'}];
  DB.timeoff.unshift(req);
  const mgr=emp(my.managerId);
  if(mgr)notify(mgr.id,'🏖️',`${my.name} requested ${days}d ${TO_TYPES[type].label.toLowerCase()} (${fmtDshort(start)}–${fmtDshort(end)})`,'#/time');
  audit('Time-off requested',`${my.name} · ${days}d ${type}`);
  Store.save();UI.closeModal();render();
  UI.toast(`Request sent to <b>${esc(mgr?mgr.name:'your manager')}</b> — it's already in their inbox`,'🏖️');
};
ACT.decideTO=arg=>{
  const [id,decision]=arg.split('|');
  const t=byId(DB.timeoff,id);if(!t)return;
  const e=emp(t.employeeId);
  /* multi-step chain: approve advances; deny ends */
  if(t.chain&&decision==='approved'){
    const cur=chainCurrent(t.chain);
    if(cur){cur.status='approved';cur.by=DB.me.employeeId;cur.at=todayISO();}
    if(!chainDone(t.chain)){
      const next=chainCurrent(t.chain);
      notify(next.id,'⛓️',`${e.name}'s ${t.days}d request cleared step ${t.chain.indexOf(next)} — your sign-off is next`,'#/time');
      notify(e.id,'👍',`Your request passed ${cur.label} approval — now with ${next.label}`,'#/time');
      audit('Time-off step approved',e.name+' · '+cur.label);
      Store.save();render();
      UI.toast(`Step approved — routed to <b>${esc((emp(next.id)||{}).name||next.label)}</b> for final sign-off`,'⛓️');
      return;
    }
  }
  t.status=decision;t.approverId=DB.me.employeeId;t.decidedAt=todayISO();
  if(decision==='approved'){
    if(t.type==='vacation'){e.pto.vacBalance=Math.max(0,e.pto.vacBalance-t.days);e.pto.vacUsed+=t.days;}
    if(t.type==='sick'){e.pto.sickBalance=Math.max(0,e.pto.sickBalance-t.days);e.pto.sickUsed+=t.days;}
  }
  notify(e.id,decision==='approved'?'✅':'❌',`Your ${TO_TYPES[t.type].label.toLowerCase()} request (${fmtDshort(t.start)}–${fmtDshort(t.end)}) was ${decision}`,'#/time');
  audit('Time-off '+decision,e.name+' · '+t.days+'d '+t.type);
  Store.save();render();
  if(decision==='approved')UI.toast(`Approved — <b>${esc(e.name)}</b>'s balance updated & calendar synced`,'✅');
  else UI.toast(`Request denied — ${esc(e.name)} has been notified`,'📭',{label:'Undo',fn:()=>{
    t.status='pending';delete t.approverId;delete t.decidedAt;Store.save();render();
    UI.toast('Denial undone — the request is pending again','↩️');}});
};

        <div class="card-body" style="padding-top:8px">${DB.actionPlans.map(p=>`

}

const insightsPool=()=>isAdmin()?DB.employees.filter(e=>e.status==='active'):[me()].concat(allReportsOf(DB.me.employeeId)).filter(e=>e.status==='active');
function headcountTrend(){
  const labels=[],counts=[];
  for(let i=11;i>=0;i--){
    const d=new Date();d.setMonth(d.getMonth()-i);
    const mEnd=iso(new Date(d.getFullYear(),d.getMonth()+1,0));
    const hc=DB.employees.filter(e=>e.hireDate<=mEnd&&e.status!=='terminated').length
      +DB.former.filter(f=>f.termDate>mEnd).length;
    labels.push(monthName(d.getMonth()));counts.push(hc);
  }
  return {labels,counts};
}
Views.insights=param=>{
  if(param&&['people','talent','learning','pay'].includes(param))UIS.insightsTab=param;
  const tab=UIS.insightsTab;
  const tabs=[['people','People'],['talent','Talent acquisition'],['learning','Learning & growth'],['pay','Compensation']];
  return `
  <div class="page-head"><div style="flex:1"><h1 class="page">Insights</h1>
    <div class="page-sub">Every chart below is computed live from the same records the other modules write to — no exports, no lag</div></div>
    <button class="btn ghost" onclick="UI.toast('Demo: scheduled email digest would configure here','📬')">${I.send} Schedule digest</button></div>
  <div class="tabs">${tabs.map(t=>`<button class="${tab===t[0]?'on':''}" data-act="setInsightsTab" data-arg="${t[0]}">${t[1]}</button>`).join('')}</div>
  ${tab==='people'?insightsPeople():tab==='talent'?insightsTalent():tab==='learning'?insightsLearning():insightsPay()}`;
};
ACT.setInsightsTab=a=>{UIS.insightsTab=a;tabSync('insights',a);render();};
function insightsPeople(){

  const attr=Math.round(terms.length/avg(trend.counts)*1000)/10;
  const regret=terms.filter(t=>t.regret).length;
  const mgrs=DB.employees.filter(e=>reportsOf(e.id).length);

    ${statCard('Attrition (TTM)',attr+'%',regret+' regretted of '+terms.length+' exits','var(--c-recruit)')}
    ${statCard('Span of control',(activeEmps().length/mgrs.length).toFixed(1),'avg directs per manager','var(--c-grow)')}

  </div>
  <div class="grid g23 mb16">
    <div class="card"><div class="card-head"><h3>Headcount — trailing 12 months</h3><span class="spacer"></span><span class="tiny faint">updates the instant a hire lands</span></div>
      <div class="card-body">${Chart.line([{data:trend.counts,color:'var(--c-people)',area:true}],trend.labels,{h:210,alt:'Headcount by month over the trailing 12 months, currently '+trend.counts[11]})}</div></div>
    <div class="card"><div class="card-head"><h3>By department</h3></div><div class="card-body" style="display:grid;place-items:center">
      ${Chart.donut(DEPTS.filter(d=>d.id!=='exec').map(d=>({label:d.name,v:activeEmps().filter(e=>e.dept===d.id).length,color:d.color})),175,0.62,'Headcount split by department')}
      <div class="row wrap mt12 legend" style="justify-content:center">${DEPTS.filter(d=>d.id!=='exec').map(d=>`<span><i style="background:${d.color}"></i>${d.name.split(' ')[0]} ${activeEmps().filter(e=>e.dept===d.id).length}</span>`).join('')}</div></div></div>
  </div>
  <div class="grid g2">
    <div class="card"><div class="card-head"><h3>Tenure mix</h3></div><div class="card-body">${Chart.bars(tenureBuckets,{h:180})}</div></div>
    ${isAdmin()?`<div class="card"><div class="card-head"><h3>Exits — trailing 12 months</h3></div>
      <table class="tbl"><thead><tr><th>Person</th><th>Dept</th><th>Reason</th><th>When</th></tr></thead><tbody>
      ${terms.sort((a,b)=>b.termDate.localeCompare(a.termDate)).slice(0,7).map(f=>`<tr>
        <td><b class="small">${esc(f.name)}</b>${f.regret?' <span class="badge b-warn" style="font-size:10px">regretted</span>':''}</td>
        <td class="muted">${deptName(f.dept)}</td><td class="muted small">${esc(f.reason)}</td><td class="muted">${rel(f.termDate)}</td></tr>`).join('')}</tbody></table></div>`
    :`<div class="card pad"><b class="small">Exits — trailing 12 months</b>
      <p class="small muted mt12">${terms.length} departures company-wide, ${terms.filter(t=>t.regret).length} regretted. Person-level exit details are visible to People admins only.</p></div>`}
  </div>
  <div class="card mt16"><div class="card-head"><h3>🔭 Retention watchlist</h3><span class="spacer"></span><span class="tiny faint">rule-based signals — illustrative, not predictive ML · ${isAdmin()?'company-wide':'your org only'}</span></div>
    <table class="tbl"><thead><tr><th>Person</th><th>Signal</th><th>Why</th><th class="r"></th></tr></thead><tbody>
    ${insightsPool().map(e=>({e,r:flightRisk(e)})).filter(x=>x.r.tier!=='low').sort((a,b)=>b.r.score-a.r.score).slice(0,6).map(x=>`

window.apDeflect=q=>{
  const el=$('#ap-deflect');if(!el)return;
  const ql=(q||'').toLowerCase().split(/\s+/).filter(w=>w.length>3);
  if(!ql.length){el.innerHTML='';return;}
  const hits=DB.kb.map(k=>({k,s:ql.filter(w=>(k.title+' '+k.body).toLowerCase().includes(w)).length})).filter(x=>x.s>0).sort((a,b)=>b.s-a.s).slice(0,2);
  el.innerHTML=hits.length?`<div class="card pad mt8" style="box-shadow:none;background:var(--teal-soft);border-color:transparent;padding:10px 12px">
    <b class="tiny" style="font-size:12px">💡 These might answer it instantly:</b>
    ${hits.map(h=>`<a class="small linklike" style="display:block;margin-top:5px" href="#/help/${h.k.id}" data-act="closeModalSoft">${esc(h.k.title)}</a>`).join('')}</div>`:'';
};
ACT.submitCase=()=>{
  const subject=$('#hc-subject').value.trim()||'Quick question';
  let assigneeId=null;
  if(DB.autoAssign){
    const team=(byId(DB.groups,'g-people')||{members:[]}).members.filter(id=>id!==DB.me.employeeId);
    if(team.length){DB.rrIdx=((DB.rrIdx||0)+1)%team.length;assigneeId=team[DB.rrIdx];}
  }
  const c={id:'HD-'+rint(110,999),employeeId:DB.me.employeeId,subject,cat:$('#hc-cat').value,status:'open',priority:$('#hc-pri').value,assigneeId,createdAt:todayISO(),
    slaDue:iso(new Date(Date.now()+(DB.slaHours||24)*3600000)),firstResponseAt:null,tags:[$('#hc-cat').value],
    messages:[{at:todayISO(),fromId:DB.me.employeeId,text:$('#hc-body').value.trim()||subject}]};
  DB.cases.unshift(c);
  notify(assigneeId||'E021','🎟️',`New ${c.priority} case${assigneeId?' assigned to you':''}: ${subject}`,canSee('askpeople')?'#/askpeople':'#/help');
  audit('Case opened',c.id+' · '+subject+(assigneeId?' → '+(emp(assigneeId)||{}).name:' (unassigned)'));

ACT.replyCase=cid=>{
  const c=byId(DB.cases,cid);const inp=$('#case-reply');
  if(!c||!inp||!inp.value.trim())return;
  const internal=$('#case-internal')&&$('#case-internal').checked;
  c.messages.push({at:todayISO(),fromId:DB.me.employeeId,text:inp.value.trim(),isInternal:!!internal});

/* ============================================================
   DOCUMENT ENGINE — real PDFs, hand-rolled (zero libraries)
   ============================================================ */
const pdfSan=s=>String(s).normalize('NFKD').replace(/[̀-ͯ]/g,'').replace(/[‘’]/g,"'").replace(/[“”]/g,'"').replace(/[–—]/g,'-').replace(/[^\x20-\x7E]/g,'').replace(/\\/g,'\\\\').replace(/\(/g,'\\(').replace(/\)/g,'\\)');
function pdfWrap(t,max){const out=[];String(t).split('\n').forEach(par=>{const words=par.split(/\s+/);let cur='';
  words.forEach(w=>{if((cur+' '+w).trim().length>max){out.push(cur.trim());cur=w;}else cur+=' '+w;});out.push(cur.trim());});
  return out.length?out:[''];}
function makePDF(blocks){
  let y=712,ops='';
  /* letterhead: the four mosaic tiles + wordmark + rule */
  [[0.39,0.40,0.95],[0.94,0.39,0.55],[0.08,0.72,0.65],[0.96,0.62,0.04]].forEach((c,i)=>{
    ops+=`${c[0]} ${c[1]} ${c[2]} rg ${72+(i%2)*11} ${i<2?751:740} 9 9 re f\n`;});
  ops+=`BT /F2 14 Tf 0.07 0.09 0.17 rg 98 747 Td (Mosaic) Tj ET\n`;
  ops+=`BT /F1 8 Tf 0.54 0.56 0.65 rg 98 737 Td (${pdfSan(COMPANY.name+' | '+COMPANY.hq+' | '+COMPANY.domain)}) Tj ET\n`;
  ops+=`0.85 0.86 0.93 RG 1.2 w 72 726 m 540 726 l S\n`;
  blocks.forEach(b=>{
    const size=b.size||10.5,lh=size*1.5;
    const col=b.color||[0.10,0.11,0.18];
    pdfWrap(b.t,Math.floor(470/(size*0.52))).forEach(line=>{
      ops+=`BT /${b.bold?'F2':'F1'} ${size} Tf ${col[0]} ${col[1]} ${col[2]} rg 72 ${Math.round(y)} Td (${pdfSan(line)}) Tj ET\n`;
      y-=lh;});
    y-=(b.gap!=null?b.gap:5);
  });
  ops+=`BT /F1 7.5 Tf 0.6 0.62 0.7 rg 72 48 Td (${pdfSan('Generated by Mosaic for '+COMPANY.name+' on '+fmtD(todayISO())+' - demo document, fictional data')}) Tj ET\n`;
  const objs=[];
  objs[1]='<</Type/Catalog/Pages 2 0 R>>';
  objs[2]='<</Type/Pages/Kids[3 0 R]/Count 1>>';
  objs[3]='<</Type/Page/Parent 2 0 R/MediaBox[0 0 612 792]/Resources<</Font<</F1 4 0 R/F2 5 0 R>>>>/Contents 6 0 R>>';
  objs[4]='<</Type/Font/Subtype/Type1/BaseFont/Helvetica>>';
  objs[5]='<</Type/Font/Subtype/Type1/BaseFont/Helvetica-Bold>>';
  objs[6]='<</Length '+ops.length+'>>\nstream\n'+ops+'endstream';
  let out='%PDF-1.4\n';const offs=[0];
  for(let i=1;i<=6;i++){offs[i]=out.length;out+=i+' 0 obj\n'+objs[i]+'\nendobj\n';}
  const xref=out.length;
  out+='xref\n0 7\n0000000000 65535 f \n';
  for(let i=1;i<=6;i++)out+=String(offs[i]).padStart(10,'0')+' 00000 n \n';
  out+='trailer\n<</Size 7/Root 1 0 R>>\nstartxref\n'+xref+'\n%%EOF';
  return out;
}

/* ============================================================
   FLIGHT RISK — rule-based retention signals (illustrative)
   ============================================================ */
function flightRisk(e){
  if(!e||e.status!=='active')return {score:0,tier:'low',reasons:[]};
  const rs=[];let s=0;
  const cr=e.comp.base/bandFor(e.level,e.dept)[1];
  if(cr<0.9){s+=25;rs.push('Paid '+Math.round((1-cr)*100)+'% below band mid');}
  const gl=DB.goals.filter(g=>g.ownerId===e.id);
  if(gl.some(g=>g.status==='behind')){s+=15;rs.push('Goal behind schedule');}
  else if(gl.some(g=>g.status==='at-risk')){s+=8;rs.push('Goal at risk');}
  const praise=DB.feedback.filter(f=>fbRecipients(f).includes(e.id)).sort((a,b)=>b.at.localeCompare(a.at))[0];
  if(!praise||between(praise.at,todayISO())>60){s+=12;rs.push('No recognition in 60+ days');}
  if(!e.compHistory.some(h=>h.type==='Promotion')&&between(e.hireDate,todayISO())>900){s+=18;rs.push('No growth event in '+tenure(e.hireDate));}
  const sv=DB.surveys.find(x=>x.status==='live');
  if(sv&&!sv.respondedIds.includes(e.id)){s+=7;rs.push('Skipped latest pulse');}
  if(DB.timeoff.some(t=>t.employeeId===e.id&&t.status==='denied'&&between(t.decidedAt||t.start,todayISO())<90)){s+=10;rs.push('PTO denied in last 90d');}
  const mgr=emp(e.managerId);
  if(mgr&&reportsOf(mgr.id).length>8){s+=5;rs.push('Manager has '+reportsOf(mgr.id).length+' directs');}
  s=clamp(s,0,100);
  return {score:s,tier:s>=50?'high':s>=28?'watch':'low',reasons:rs};
}
const riskPill=r=>`<span class="risk-pill risk-${r.tier}" title="Rule-based signal, not a prediction">${r.tier==='high'?'🔥':r.tier==='watch'?'👀':'🌿'} ${r.tier==='high'?'High risk':r.tier==='watch'?'Watch':'Healthy'} · ${r.score}</span>`;

function goalTreeRow(g,depth){

  const color=g.status==='behind'?'var(--bad)':g.status==='at-risk'?'var(--warn)':g.status==='done'?'var(--c-time)':'var(--c-grow)';
  return `<div class="gt-row">${depth?'<span class="gt-elbow"></span>':''}
    ${owner?av(owner,'sm'):`<span class="av sm" style="background:linear-gradient(135deg,var(--brand),#9333ea);font-size:11px">🏁</span>`}
    <span class="col" style="gap:0;flex:1;min-width:0"><b class="small" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(g.title)}</b>
    <span class="tiny faint">${owner?esc(owner.name):'Company OKR'} · due ${fmtDshort(g.due)}</span></span>
    ${badge(g.status)}<span class="gt-bar">${progressBar(g.progress,color)}</span></div>
    ${kids.length?`<div class="gt-kids">${kids.map(k=>goalTreeRow(k,depth+1)).join('')}</div>`:''}`;
}
function goalTree(){
  const roots=DB.goals.filter(g=>g.scope==='company');
  const orphans=DB.goals.filter(g=>g.scope==='individual'&&!g.parentId);
  return `<div class="card pad">
    <div class="row between wrap mb12"><b>Alignment tree — every goal ladders up</b><span class="tiny faint">company → department → individual</span></div>
    ${roots.map(r=>goalTreeRow(r,0)).join('<div class="divider"></div>')}
